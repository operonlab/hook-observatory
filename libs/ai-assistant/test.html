<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant Preview</title>
  <style>
    body {
      margin: 0;
      background: #0f1117;
      color: #e2e4ed;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    h1 { font-size: 1.5rem; opacity: 0.6; }
    p { opacity: 0.4; font-size: 0.9rem; }
    .controls {
      display: flex;
      gap: 8px;
    }
    .controls button {
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: #e2e4ed;
      cursor: pointer;
      font-size: 13px;
    }
    .controls button:hover {
      background: rgba(180, 190, 254, 0.15);
      border-color: rgba(180, 190, 254, 0.3);
    }
  </style>
</head>
<body>
  <h1>AI Assistant Widget Preview</h1>
  <p>點擊右下角的精靈開啟對話面板（後端未連接，僅測試 UI）</p>

  <div class="controls">
    <button onclick="document.querySelector('ai-assistant').open()">Open</button>
    <button onclick="document.querySelector('ai-assistant').close()">Close</button>
    <button onclick="document.querySelector('ai-assistant').say('這是一段測試訊息！**粗體**和`程式碼`都可以渲染。')">Say</button>
  </div>

  <script type="module" src="./dist/ai-assistant.mjs"></script>
  <ai-assistant
    mode="workshop"
    api-url="/api/assistant/chat"
    position="bottom-right"
    mascot-base="./assets/mascot"
    greeting="嗨！我是工坊精靈，有什麼可以幫忙的嗎？"
  ></ai-assistant>
</body>
</html>
