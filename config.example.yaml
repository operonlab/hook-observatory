# hook-dispatcher configuration — EXAMPLE
# Copy this file to config.yaml and edit to match your environment.
# config.yaml is gitignored; config.example.yaml is committed.
#
# Environment override prefix:
#   HOOK_DISPATCHER_ROOT  - point at the dispatcher install dir (preferred)
#   HOOK_OBSERVATORY_ROOT - backward-compat fallback honored by Go binary
#
# (Pre-2026-05-13 the FastAPI dashboard ran out of this same directory and
# read env_prefix/port/host/database_url/auth_enabled/cookie/cors_origins
# from here. Dashboard is archived; those keys are removed below. Runtime
# spool / marker dirs at ~/.hook-observatory/ are kept to preserve local
# event history — rename is a separate decision.)

# ─── Spool (event log) ─────────────────────────────────────────
spool_dir: "~/.hook-observatory/spool"
spool_drain_interval: 2.0
spool_batch_size: 100

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Hook Handler System (below)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ─── Handler toggles ───────────────────────────────────────────
# core: safe for everyone, no external dependencies
# workflow: useful but some need gh CLI / tmux
# integrations: need external services (disabled by default)
handlers:
  core:
    agent_naming: true
    bash_safety: true
    auto_format: true
    secret_scan: true
    skill_security: true
    verify_commit: true
    verify_completion: true
    review_gate: true
    observability: true
    plan_impl_gate: true
    rtk_rewrite: false         # needs `rtk` binary

  workflow:
    pm_autopilot: false        # needs `gh` CLI + github.repo
    context_inject: true
    context_relay: true
    claudemd_suggest: true
    cleanup_versions: true
    utility_watchdog: true

  integrations:
    voice_notify: false        # needs TTS service or edge-tts
    sentinel_notify: false     # needs Sentinel station
    anvil_telemetry: false     # needs Anvil station
    session_channel: false     # needs Session Channel station
    memory_sync: false         # needs Memvault service
    session_pipeline: false    # needs Session Pipeline service
    session_cost: true         # standalone JSONL, no deps
    session_namer: false       # needs Haiku API
    instinct_distiller: false  # needs instinct pipeline
    attitude_signal: false     # needs corrections pipeline
    relay_signal: false        # needs tmux
    schedule_sync: false       # needs schedules/ dir
    external: false            # needs memvault scripts

# ─── Tools ─────────────────────────────────────────────────────
# "auto" = find in PATH; or set explicit absolute path
tools:
  python: auto
  ruff: auto
  biome: auto                  # prefers local node_modules/.bin/
  rtk: auto
  gh: auto
  git: auto

# ─── Dispatcher ────────────────────────────────────────────────
dispatcher:
  blocking_budget_ms: 5000
  hook_timeouts:
    PreToolUse: 20
    PostToolUse: 35
    Stop: 20
    Notification: 20
    SessionStart: 35
    SessionEnd: 20
    SubagentStart: 10
    SubagentStop: 120
    UserPromptSubmit: 20
    PreCompact: 10

# ─── Services (only if corresponding handler enabled) ──────────
services:
  tts_url: "http://127.0.0.1:10201/api/tts/speak"
  anvil_url: "http://127.0.0.1:10301"
  sentinel_url: "http://127.0.0.1:4101/api/sentinel"
  session_channel_url: "http://localhost:10101"
  redis_host: "127.0.0.1"
  redis_port: 6379

# ─── GitHub (for pm_autopilot) ─────────────────────────────────
github:
  repo: ""                     # e.g., "owner/repo"

# ─── TTS (for voice_notify) ───────────────────────────────────
tts:
  voice: "zh-CN-YunjianNeural"
  rate: "+20%"
  volume: 0.4
  subagent_sound: "/System/Library/Sounds/Pop.aiff"
  debounce_seconds: 10
  settle_seconds: 8

# ─── Paths ─────────────────────────────────────────────────────
paths:
  observatory_root: auto       # auto-detect from package location (legacy key name; resolves to hook-dispatcher dir)
  claude_dir: "~/.claude"
  hooks_dir: "~/.claude/hooks"
  data_dir: "~/.claude/data"
  project_root: ""             # protected directory for rm -rf safety check
