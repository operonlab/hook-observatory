<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狀態機儀表板 — Workshop</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242837;
    --border: #2e3347;
    --text: #e1e4ed;
    --text-dim: #8b90a5;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #00b894;
    --orange: #fdcb6e;
    --red: #d63031;
    --blue: #0984e3;
    --cyan: #00cec9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'JetBrains Mono', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  header h1 span { color: var(--accent2); }
  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 500;
  }
  .badge-purple { background: rgba(108,92,231,0.2); color: var(--accent2); }
  .badge-green { background: rgba(0,184,148,0.2); color: var(--green); }
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 1fr auto;
    overflow: hidden;
  }
  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    grid-row: 1 / 3;
  }
  .sidebar-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    padding: 16px 16px 8px;
  }
  .fsm-item {
    padding: 10px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .fsm-item:hover { background: var(--surface2); }
  .fsm-item.active {
    background: var(--surface2);
    border-left-color: var(--accent);
  }
  .fsm-item-key {
    font-size: 13px;
    font-weight: 500;
  }
  .fsm-item-meta {
    font-size: 11px;
    color: var(--text-dim);
  }
  .module-group {
    padding: 8px 16px 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--accent2);
    font-weight: 600;
    margin-top: 4px;
  }
  /* Content Area */
  .content {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .content-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .content-title {
    font-size: 16px;
    font-weight: 600;
  }
  .content-body {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 320px;
    overflow: hidden;
  }
  /* Mermaid Diagram */
  .diagram-area {
    padding: 24px;
    overflow: auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }
  .diagram-area svg { max-width: 100%; height: auto; }
  .mermaid-container {
    background: var(--surface);
    border-radius: 8px;
    padding: 24px;
    min-width: 300px;
    max-width: 800px;
    width: 100%;
  }
  /* Simulator Panel */
  .simulator {
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .sim-section {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .sim-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .sim-select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    width: 100%;
  }
  .sim-select:focus { border-color: var(--accent); }
  .sim-select option { background: var(--surface2); }
  .allowed-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .allowed-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13px;
  }
  .allowed-item:hover {
    background: rgba(108,92,231,0.15);
    border-color: var(--accent);
  }
  .allowed-item .arrow { color: var(--accent2); font-size: 14px; }
  .state-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .state-dot.initial { background: var(--green); }
  .state-dot.final { background: var(--red); }
  .state-dot.normal { background: var(--blue); }
  .no-transitions {
    color: var(--text-dim);
    font-size: 12px;
    font-style: italic;
    padding: 8px 0;
  }
  /* Transition Table */
  .transition-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .transition-table th {
    text-align: left;
    padding: 6px 8px;
    color: var(--text-dim);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
  }
  .transition-table td {
    padding: 6px 8px;
    border-bottom: 1px solid rgba(46,51,71,0.5);
  }
  .transition-table tr:hover td { background: var(--surface2); }
  .state-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 500;
  }
  .state-badge.initial { background: rgba(0,184,148,0.15); color: var(--green); }
  .state-badge.final { background: rgba(214,48,49,0.15); color: var(--red); }
  .state-badge.normal { background: rgba(9,132,227,0.15); color: var(--blue); }
  /* Footer Stats */
  .stats-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    font-size: 12px;
    color: var(--text-dim);
    grid-column: 1 / -1;
  }
  .stat-item { display: flex; align-items: center; gap: 6px; }
  .stat-value { color: var(--text); font-weight: 600; }
  /* History log */
  .history-log {
    max-height: 140px;
    overflow-y: auto;
    font-size: 11px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .history-entry {
    padding: 4px 8px;
    background: rgba(0,0,0,0.2);
    border-radius: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .history-entry .from { color: var(--orange); }
  .history-entry .to { color: var(--green); }
  .history-entry .arrow { color: var(--text-dim); }
  /* Responsive */
  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .content-body { grid-template-columns: 1fr; }
    .simulator { border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <h1><span>FSM</span> 狀態機儀表板</h1>
  <span class="badge badge-purple" id="fsm-count">載入中...</span>
  <span class="badge badge-green" id="data-source">靜態資料</span>
</header>

<div class="main">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="content">
    <div class="content-header">
      <div class="content-title" id="content-title">請選擇一個狀態機</div>
      <div style="display:flex;gap:8px;">
        <button onclick="resetSimulator()" style="background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);border-radius:4px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;">重置</button>
      </div>
    </div>
    <div class="content-body">
      <div class="diagram-area" id="diagram-area">
        <div class="mermaid-container" style="text-align:center;color:var(--text-dim);">
          從左側選擇一個狀態機
        </div>
      </div>
      <div class="simulator" id="simulator">
        <div class="sim-section">
          <div class="sim-label">目前狀態</div>
          <select class="sim-select" id="current-state" onchange="onStateChange()">
            <option value="">—</option>
          </select>
        </div>
        <div class="sim-section">
          <div class="sim-label">可用轉換</div>
          <div class="allowed-list" id="allowed-list">
            <div class="no-transitions">請先選擇上方狀態</div>
          </div>
        </div>
        <div class="sim-section">
          <div class="sim-label">轉換表</div>
          <div id="transition-table-container"></div>
        </div>
        <div class="sim-section">
          <div class="sim-label">模擬歷史</div>
          <div class="history-log" id="history-log"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar">Loading...</div>
</div>

<script>
// Embedded FSM data (fallback when API unavailable)
const EMBEDDED_DATA = [{"key":"auth.user","name":"UserLifecycle","states":["pending","active","suspended","banned"],"initial":["pending"],"final":["banned"],"transitions":{"pending":["active","banned"],"active":["suspended","banned"],"suspended":["banned","active"],"banned":[]},"transition_count":6},{"key":"briefing.briefing","name":"BriefingLifecycle","states":["searching","analyzing","debating","synthesizing","completed","failed"],"initial":["searching"],"final":["completed","failed"],"transitions":{"searching":["analyzing","failed"],"analyzing":["debating","failed"],"debating":["synthesizing","failed"],"synthesizing":["completed","failed"],"completed":[],"failed":[]},"transition_count":8},{"key":"briefing.entry","name":"EntryPhase","states":["raw","analysis","debate","conclusion"],"initial":["raw"],"final":["conclusion"],"transitions":{"raw":["analysis"],"analysis":["debate"],"debate":["conclusion"],"conclusion":[]},"transition_count":3},{"key":"nodeflow.flow","name":"FlowLifecycle","states":["draft","active","paused","archived"],"initial":["draft"],"final":["archived"],"transitions":{"draft":["active"],"active":["paused","archived"],"paused":["active","archived"],"archived":[]},"transition_count":5},{"key":"nodeflow.flow_run","name":"FlowRunLifecycle","states":["pending","running","completed","failed","cancelled"],"initial":["pending"],"final":["completed","failed","cancelled"],"transitions":{"pending":["running","cancelled"],"running":["completed","failed","cancelled"],"completed":[],"failed":[],"cancelled":[]},"transition_count":5},{"key":"nodeflow.node_run","name":"NodeRunLifecycle","states":["pending","running","completed","failed","skipped"],"initial":["pending"],"final":["completed","failed","skipped"],"transitions":{"pending":["running","skipped"],"running":["completed","failed"],"completed":[],"failed":[],"skipped":[]},"transition_count":4},{"key":"finance.transaction","name":"TransactionLifecycle","states":["pending","scheduled","completed","cancelled"],"initial":["pending"],"final":["completed","cancelled"],"transitions":{"pending":["completed","cancelled","scheduled"],"scheduled":["cancelled","pending"],"completed":[],"cancelled":[]},"transition_count":5},{"key":"finance.subscription","name":"SubscriptionLifecycle","states":["active","paused","cancelled"],"initial":["active"],"final":["cancelled"],"transitions":{"active":["paused","cancelled"],"paused":["active","cancelled"],"cancelled":[]},"transition_count":4},{"key":"finance.installment","name":"InstallmentLifecycle","states":["active","completed","cancelled"],"initial":["active"],"final":["completed","cancelled"],"transitions":{"active":["completed","cancelled"],"completed":[],"cancelled":[]},"transition_count":2}];

let fsmData = [];
let activeFsm = null;
let simHistory = [];

// Module color mapping
const MODULE_COLORS = {
  auth: '#e17055',
  briefing: '#0984e3',
  nodeflow: '#6c5ce7',
  finance: '#00b894'
};

function getModuleColor(key) {
  const mod = key.split('.')[0];
  return MODULE_COLORS[mod] || '#636e72';
}

function stateType(fsm, state) {
  if (fsm.initial.includes(state)) return 'initial';
  if (fsm.final.includes(state)) return 'final';
  return 'normal';
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// Build sidebar
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const groups = {};
  fsmData.forEach(fsm => {
    const mod = fsm.key.split('.')[0];
    if (!groups[mod]) groups[mod] = [];
    groups[mod].push(fsm);
  });

  let html = '<div class="sidebar-title">狀態機列表</div>';
  for (const [mod, fsms] of Object.entries(groups)) {
    html += `<div class="module-group" style="color:${MODULE_COLORS[mod] || '#636e72'}">${mod}</div>`;
    fsms.forEach(fsm => {
      const isActive = activeFsm && activeFsm.key === fsm.key;
      html += `<div class="fsm-item ${isActive ? 'active' : ''}" onclick="selectFsm('${fsm.key}')" style="${isActive ? `border-left-color:${getModuleColor(fsm.key)}` : ''}">
        <div class="fsm-item-key">${fsm.name}</div>
        <div class="fsm-item-meta">${fsm.states.length} 個狀態 · ${fsm.transition_count} 個轉換</div>
      </div>`;
    });
  }
  sidebar.innerHTML = html;
}

// Generate Mermaid diagram — simple stateDiagram-v2 (no classDef for v11 compat)
function generateMermaid(fsm, highlightState) {
  let lines = ['stateDiagram-v2'];

  // Initial transitions
  fsm.initial.forEach(s => {
    lines.push(`  [*] --> ${s}`);
  });

  // State transitions
  for (const [from, targets] of Object.entries(fsm.transitions)) {
    targets.forEach(to => {
      lines.push(`  ${from} --> ${to}`);
    });
  }

  // Final states
  fsm.final.forEach(s => {
    lines.push(`  ${s} --> [*]`);
  });

  return lines.join('\n');
}

let renderCount = 0;
async function renderDiagram(fsm, highlightState) {
  const code = generateMermaid(fsm, highlightState);
  const container = document.getElementById('diagram-area');
  renderCount++;
  const id = 'fsm-diagram-' + renderCount;

  try {
    const { svg } = await mermaid.render(id, code);
    container.innerHTML = `<div class="mermaid-container">${svg}</div>`;
  } catch (e) {
    container.innerHTML = `<div class="mermaid-container"><pre style="color:var(--red);font-size:12px;">Render error: ${e.message}\n\nCode:\n${code}</pre></div>`;
  }
}

// Render transition table
function renderTransitionTable(fsm) {
  let html = '<table class="transition-table"><thead><tr><th>來源</th><th>目標</th></tr></thead><tbody>';
  for (const [from, targets] of Object.entries(fsm.transitions)) {
    if (targets.length === 0) continue;
    targets.forEach((to, i) => {
      const fromType = stateType(fsm, from);
      const toType = stateType(fsm, to);
      html += `<tr>
        ${i === 0 ? `<td rowspan="${targets.length}"><span class="state-badge ${fromType}">${from}</span></td>` : ''}
        <td><span class="state-badge ${toType}">${to}</span></td>
      </tr>`;
    });
  }
  html += '</tbody></table>';
  document.getElementById('transition-table-container').innerHTML = html;
}

// Select FSM
function selectFsm(key) {
  activeFsm = fsmData.find(f => f.key === key);
  if (!activeFsm) return;

  simHistory = [];
  document.getElementById('content-title').textContent = `${activeFsm.name} — ${activeFsm.key}`;

  // Update sidebar highlight
  renderSidebar();

  // Populate state selector
  const sel = document.getElementById('current-state');
  sel.innerHTML = '<option value="">— 選擇狀態 —</option>';
  activeFsm.states.forEach(s => {
    const type = stateType(activeFsm, s);
    const label = type === 'initial' ? `${s} (初始)` : type === 'final' ? `${s} (終態)` : s;
    sel.innerHTML += `<option value="${s}">${label}</option>`;
  });

  // Default to initial state
  if (activeFsm.initial.length > 0) {
    sel.value = activeFsm.initial[0];
  }

  renderDiagram(activeFsm, sel.value);
  renderTransitionTable(activeFsm);
  onStateChange();
}

// State change handler
function onStateChange() {
  if (!activeFsm) return;
  const current = document.getElementById('current-state').value;
  const list = document.getElementById('allowed-list');

  if (!current) {
    list.innerHTML = '<div class="no-transitions">請先選擇上方狀態</div>';
    return;
  }

  const allowed = activeFsm.transitions[current] || [];
  if (allowed.length === 0) {
    list.innerHTML = '<div class="no-transitions">無可用轉換（終止狀態）</div>';
  } else {
    list.innerHTML = allowed.map(target => {
      const type = stateType(activeFsm, target);
      return `<div class="allowed-item" onclick="simulateTransition('${current}','${target}')">
        <span class="state-dot ${type}"></span>
        <span class="arrow">→</span>
        <span>${target}</span>
      </div>`;
    }).join('');
  }

  renderDiagram(activeFsm, current);
}

// Simulate transition
function simulateTransition(from, to) {
  simHistory.push({ from, to, time: new Date().toLocaleTimeString() });

  // Update select
  document.getElementById('current-state').value = to;
  onStateChange();

  // Render history
  const log = document.getElementById('history-log');
  log.innerHTML = simHistory.map(h =>
    `<div class="history-entry">
      <span style="color:var(--text-dim);font-size:10px;">${h.time}</span>
      <span class="from">${h.from}</span>
      <span class="arrow">→</span>
      <span class="to">${h.to}</span>
    </div>`
  ).reverse().join('');
}

function resetSimulator() {
  if (!activeFsm) return;
  simHistory = [];
  document.getElementById('history-log').innerHTML = '';
  const sel = document.getElementById('current-state');
  if (activeFsm.initial.length > 0) sel.value = activeFsm.initial[0];
  onStateChange();
}

// Stats
function renderStats() {
  const totalStates = fsmData.reduce((s, f) => s + f.states.length, 0);
  const totalTransitions = fsmData.reduce((s, f) => s + f.transition_count, 0);
  const modules = [...new Set(fsmData.map(f => f.key.split('.')[0]))];

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-item"><span class="stat-value">${fsmData.length}</span> 個狀態機</div>
    <div class="stat-item"><span class="stat-value">${totalStates}</span> 個狀態</div>
    <div class="stat-item"><span class="stat-value">${totalTransitions}</span> 個轉換</div>
    <div class="stat-item"><span class="stat-value">${modules.length}</span> 個模組</div>
    <div class="stat-item" style="margin-left:auto;">
      模組：${modules.map(m => `<span style="color:${MODULE_COLORS[m] || '#636e72'};margin-left:4px;">${m}</span>`).join(' ·')}
    </div>
  `;
  document.getElementById('fsm-count').textContent = `${fsmData.length} 個狀態機`;
}

// Init
async function init() {
  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
      primaryColor: '#6c5ce7',
      primaryTextColor: '#e1e4ed',
      primaryBorderColor: '#a29bfe',
      lineColor: '#636e72',
      secondaryColor: '#2d3436',
      tertiaryColor: '#1a1d27',
    },
    securityLevel: 'loose',
  });

  // Try API first, fallback to embedded
  try {
    const resp = await fetch('/api/admin/_fsm/registry');
    if (resp.ok) {
      fsmData = await resp.json();
      document.getElementById('data-source').textContent = '即時 API';
      document.getElementById('data-source').style.background = 'rgba(0,184,148,0.2)';
    } else {
      throw new Error('API unavailable');
    }
  } catch {
    fsmData = EMBEDDED_DATA;
    document.getElementById('data-source').textContent = '靜態資料';
    document.getElementById('data-source').style.background = 'rgba(253,203,110,0.2)';
    document.getElementById('data-source').style.color = '#fdcb6e';
  }

  renderSidebar();
  renderStats();

  // Auto-select first FSM
  if (fsmData.length > 0) selectFsm(fsmData[0].key);
}

init();
</script>
</body>
</html>
