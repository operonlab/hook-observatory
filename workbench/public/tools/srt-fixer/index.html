<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRT Batch Fixer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2e3348;--text:#e4e6f0;--text2:#8b8fa8;--accent:#6c8aff;--accent2:#4a6aff;--green:#3dd68c;--red:#ff5f6d;--orange:#ffb347;--radius:10px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px}
h1{font-size:1.5rem;font-weight:600;margin-bottom:4px}
.subtitle{color:var(--text2);font-size:.875rem;margin-bottom:24px}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:48px 24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface);margin-bottom:20px}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:rgba(108,138,255,.06)}
.drop-zone p{color:var(--text2);margin-top:8px;font-size:.875rem}
.drop-zone .icon{font-size:2rem;margin-bottom:8px}
input[type=file]{display:none}
.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.btn{padding:8px 18px;border:none;border-radius:6px;font-size:.875rem;cursor:pointer;font-weight:500;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(255,95,109,.1)}
.stats{margin-left:auto;color:var(--text2);font-size:.8rem;display:flex;gap:16px}
.stats span{display:flex;align-items:center;gap:4px}
.file-list{display:flex;flex-direction:column;gap:10px}
.file-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
.file-card.has-issues{border-color:var(--orange)}
.file-card.fixed{border-color:var(--green)}
.file-header{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.file-header:hover{background:var(--surface2)}
.file-name{font-weight:500;flex:1;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:500}
.badge-issues{background:rgba(255,179,71,.12);color:var(--orange)}
.badge-ok{background:rgba(61,214,140,.12);color:var(--green)}
.badge-fixed{background:rgba(108,138,255,.12);color:var(--accent)}
.file-actions{display:flex;gap:6px}
.btn-sm{padding:4px 12px;font-size:.8rem;border-radius:4px}
.file-details{display:none;padding:0 18px 14px;font-size:.85rem;line-height:1.6}
.file-details.open{display:block}
.issue-list{list-style:none;padding:0}
.issue-list li{padding:4px 0;color:var(--text2);display:flex;gap:8px;align-items:flex-start}
.issue-list li::before{content:'';width:6px;height:6px;border-radius:50%;margin-top:7px;flex-shrink:0}
.issue-list li.warn::before{background:var(--orange)}
.issue-list li.info::before{background:var(--accent)}
.issue-list li.fix::before{background:var(--green)}
.issue-group{margin-bottom:10px}
.issue-group-title{font-weight:500;color:var(--text);margin-bottom:4px;font-size:.82rem}
.preview-toggle{color:var(--accent);cursor:pointer;font-size:.8rem;margin-top:6px;display:inline-block}
.preview-toggle:hover{text-decoration:underline}
.preview-box{margin-top:8px;background:var(--bg);border-radius:6px;padding:12px;font-family:'SF Mono',Menlo,monospace;font-size:.78rem;max-height:200px;overflow:auto;white-space:pre-wrap;color:var(--text2);display:none}
.preview-box.open{display:block}
.empty-state{text-align:center;padding:60px 24px;color:var(--text2)}
.empty-state .icon{font-size:3rem;margin-bottom:12px;opacity:.5}
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#000;padding:10px 20px;border-radius:8px;font-size:.875rem;font-weight:500;transform:translateY(80px);opacity:0;transition:all .3s;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
mark{background:rgba(255,179,71,.25);color:var(--orange);padding:0 2px;border-radius:2px}
.config-bar{display:flex;gap:16px;margin-bottom:16px;padding:12px 16px;background:var(--surface);border-radius:var(--radius);font-size:.82rem;flex-wrap:wrap;align-items:center}
.config-bar label{color:var(--text2);display:flex;align-items:center;gap:6px;cursor:pointer}
.config-bar input[type=checkbox]{accent-color:var(--accent)}
</style>
</head>
<body>

<h1>SRT Batch Fixer</h1>
<p class="subtitle">拖入 .srt 檔案，自動偵測並修復常見問題</p>

<div class="drop-zone" id="dropZone">
  <div class="icon">📂</div>
  <div>拖放 .srt 檔案到這裡，或<strong>點擊選取</strong></div>
  <p>支援多檔批次處理</p>
  <input type="file" id="fileInput" accept=".srt" multiple>
</div>

<div class="config-bar" id="configBar" style="display:none">
  <label><input type="checkbox" id="optCiteMarkers" checked> 移除 LLM 標記</label>
  <label><input type="checkbox" id="optNegDuration" checked> 修正負/零持續時間</label>
  <label><input type="checkbox" id="optHourAnomaly" checked> 修正高位時間碼異常</label>
  <label><input type="checkbox" id="optOverlap" checked> 修正重疊時間戳</label>
  <label><input type="checkbox" id="optDuplicates" checked> 移除重複條目</label>
  <label><input type="checkbox" id="optRenumber" checked> 重新編號</label>
  <label><input type="checkbox" id="optEmptyEntries" checked> 移除空白條目</label>
</div>

<div class="toolbar" id="toolbar" style="display:none">
  <button class="btn btn-primary" id="btnFixAll">修復全部</button>
  <button class="btn btn-primary" id="btnDownloadAll" disabled>下載全部修復檔</button>
  <button class="btn btn-danger" id="btnClear">清除</button>
  <div class="stats" id="stats"></div>
</div>

<div class="file-list" id="fileList"></div>

<div class="empty-state" id="emptyState">
  <div class="icon">🎬</div>
  <p>尚未載入任何檔案</p>
</div>

<div class="toast" id="toast"></div>

<script>
const LLM_ARTIFACTS = [/\s*\[cite:\s*\d+\]/g, /\s*\[ref:\s*\d+\]/g, /\s*\[\d+\]/g];

let files = [];

// ── Timestamp utilities ──

function msToTs(ms) {
  const h=Math.floor(ms/3600000); ms%=3600000;
  const m=Math.floor(ms/60000); ms%=60000;
  const s=Math.floor(ms/1000); ms%=1000;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(Math.round(ms)).padStart(3,'0')}`;
}

/** Parse one side of "-->". Handles: HH:MM:SS,mmm / HH:MM:SS.mmm / HH:MM:SS:mmm / MM:SS,mmm / MM:SS.mmm / MM:SS:mmm */
function parseSingleTs(s) {
  s = s.trim();
  // Full: HH:MM:SS[.,:]mmm
  let m = s.match(/^(\d{2}):(\d{2}):(\d{2})[.,:](\d{3})$/);
  if (m) return { ms: +m[1]*3600000 + +m[2]*60000 + +m[3]*1000 + +m[4], fmt:'full' };
  // Short: M?M:SS[.,:]mmm (missing HH:)
  m = s.match(/^(\d{1,2}):(\d{2})[.,:](\d{3})$/);
  if (m) return { ms: +m[1]*60000 + +m[2]*1000 + +m[3], fmt:'short' };
  return null;
}

/** Parse a full timestamp line "start --> end". Returns {startMs, endMs, normalized, meta} or null */
function parseTsLine(line) {
  line = line.trim();
  const parts = line.split(/\s*-->\s*/);
  if (parts.length !== 2) return null;
  const a = parseSingleTs(parts[0]);
  const b = parseSingleTs(parts[1]);
  if (!a || !b) return null;
  const meta = {};
  // Detect dot separator
  if (/\.\d{3}/.test(line)) meta.dotSep = true;
  // Detect short format (missing hours)
  if (a.fmt === 'short' || b.fmt === 'short') meta.shortTs = true;
  // Detect colon ms separator
  if (/:\d{3}(?:\s|$)/.test(parts[0]) || /:\d{3}$/.test(parts[1])) {
    // Only flag if it's actually colon-before-ms (not the normal HH:MM:SS)
    if (/\d:\d{2}:\d{3}/.test(parts[0]) || /\d:\d{2}:\d{3}/.test(parts[1])) meta.colonMs = true;
  }
  // Detect missing seq (will be set by caller)
  return { startMs: a.ms, endMs: b.ms, normalized: `${msToTs(a.ms)} --> ${msToTs(b.ms)}`, meta };
}

function isTsLine(line) { return parseTsLine(line) !== null; }

function estimateDurationMs(textLines) {
  const textLen = textLines.join('').length;
  return Math.max(1500, Math.min(5000, textLen * 150));
}

function buildContextCandidates(rawMs, anchors) {
  const candidates = new Set([rawMs]);
  const secMsPart = ((rawMs % 60000) + 60000) % 60000;
  for (const anchor of anchors) {
    if (!Number.isFinite(anchor)) continue;
    const baseMinute = Math.floor(anchor / 60000);
    for (let delta = -1; delta <= 1; delta++) {
      const totalMinutes = baseMinute + delta;
      if (totalMinutes >= 0) candidates.add(totalMinutes * 60000 + secMsPart);
    }
  }
  return [...candidates].sort((a, b) => a - b);
}

function scoreGap(gapMs) {
  if (!Number.isFinite(gapMs)) return 0;
  if (gapMs < -200) return 2000 + Math.abs(gapMs);
  if (gapMs < 0) return 200 + Math.abs(gapMs) * 2;
  return Math.min(gapMs, 30000) / 15;
}

function scoreRange(startMs, endMs, prevEnd, nextStart, estDuration) {
  if (endMs <= startMs) return Number.POSITIVE_INFINITY;
  const duration = endMs - startMs;
  if (duration < 300 || duration > 12000) return Number.POSITIVE_INFINITY;
  let score = Math.abs(duration - estDuration) / 8;
  if (Number.isFinite(prevEnd)) score += scoreGap(startMs - prevEnd);
  if (Number.isFinite(nextStart)) score += scoreGap(nextStart - endMs);
  return score;
}

function findContextualRepair(entries, index) {
  const curr = entries[index];
  const prev = index > 0 ? entries[index - 1] : null;
  const next = index < entries.length - 1 ? entries[index + 1] : null;
  const prevEnd = prev ? prev.endMs : NaN;
  const nextStart = next ? next.startMs : NaN;
  const estDuration = estimateDurationMs(curr.textLines);
  const rawScore = scoreRange(curr.startMs, curr.endMs, prevEnd, nextStart, estDuration);
  const prevGap = prev ? curr.startMs - prev.endMs : 0;
  const nextGap = next ? next.startMs - curr.endMs : 0;
  const suspicious = curr.endMs <= curr.startMs || prevGap > 15000 || nextGap > 15000;
  if (!suspicious) return null;

  const startCandidates = buildContextCandidates(curr.startMs, [prevEnd, curr.endMs, nextStart]);
  const endCandidates = buildContextCandidates(curr.endMs, [prevEnd, curr.startMs, nextStart]);
  let best = null;

  for (const startMs of startCandidates) {
    if (Number.isFinite(prevEnd) && startMs < prevEnd - 2000) continue;
    for (const endMs of endCandidates) {
      if (Number.isFinite(nextStart) && endMs > nextStart + 2000) continue;
      const score = scoreRange(startMs, endMs, prevEnd, nextStart, estDuration);
      if (!Number.isFinite(score)) continue;
      if (!best || score < best.score) best = { startMs, endMs, score };
    }
  }

  if (!best) return null;
  if (best.startMs === curr.startMs && best.endMs === curr.endMs) return null;
  if (Number.isFinite(rawScore) && rawScore - best.score < 500) return null;
  return best;
}

// ── Parser ──

function parseSRT(text) {
  text = text.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const lines = text.trim().split('\n');
  const entries = [];
  const parseMeta = { hasBOM: /^\uFEFF/.test(text), dotSep:0, shortTs:0, colonMs:0, missingSeq:0, missingBlanks:false };
  let i = 0;

  while (i < lines.length) {
    const line = lines[i].trim();
    if (!line) { i++; continue; }

    let ts = null, hasSeq = false, seq = 0;

    // Pattern A: sequence number + timestamp on next line
    if (/^\d+$/.test(line) && i+1 < lines.length) {
      ts = parseTsLine(lines[i+1].trim());
      if (ts) { seq = parseInt(line); hasSeq = true; i += 2; }
    }
    // Pattern B: timestamp line directly (no seq)
    if (!ts) {
      ts = parseTsLine(line);
      if (ts) { seq = entries.length + 1; i += 1; }
    }
    if (!ts) { i++; continue; }

    if (!hasSeq) parseMeta.missingSeq++;
    if (ts.meta.dotSep) parseMeta.dotSep++;
    if (ts.meta.shortTs) parseMeta.shortTs++;
    if (ts.meta.colonMs) parseMeta.colonMs++;

    // Collect text lines until next entry or blank
    const textLines = [];
    while (i < lines.length) {
      const l = lines[i].trim();
      // Next entry starts?
      if (/^\d+$/.test(l) && i+1 < lines.length && isTsLine(lines[i+1].trim())) break;
      if (isTsLine(l)) break;
      if (!l && textLines.length > 0) { i++; break; }
      if (l) textLines.push(lines[i]);
      i++;
    }

    entries.push({ seq, tsLine: ts.normalized, startMs: ts.startMs, endMs: ts.endMs, textLines });
  }

  // Detect missing blank lines: if raw text has fewer blanks than entries-1
  const blankCount = lines.filter(l => l.trim() === '').length;
  if (blankCount < entries.length - 1) parseMeta.missingBlanks = true;

  return { entries, parseMeta };
}

// ── Analyzer ──

function analyzeSRT(entries, parseMeta) {
  const issues = [];

  // Format problems (normalized during parse, but still count as issues to fix)
  if (parseMeta.dotSep) issues.push({ type:'warn', msg:`${parseMeta.dotSep} 處句號(.)毫秒分隔`, category:'format' });
  if (parseMeta.shortTs) issues.push({ type:'warn', msg:`${parseMeta.shortTs} 處缺少小時位 (MM:SS)`, category:'format' });
  if (parseMeta.colonMs) issues.push({ type:'warn', msg:'冒號(:)誤用為毫秒分隔符', category:'format' });
  if (parseMeta.missingSeq) issues.push({ type:'warn', msg:`${parseMeta.missingSeq} 條缺少序號`, category:'structure' });
  if (parseMeta.missingBlanks) issues.push({ type:'warn', msg:'缺少空行分隔符', category:'structure' });
  if (parseMeta.hasBOM) issues.push({ type:'warn', msg:'含有 BOM 標記', category:'format' });

  // LLM artifacts
  let citeCount = 0;
  for (const e of entries) {
    for (const t of e.textLines) {
      for (const pat of LLM_ARTIFACTS) {
        const matches = t.match(pat);
        if (matches) citeCount += matches.length;
        pat.lastIndex = 0;
      }
    }
  }
  if (citeCount) issues.push({ type:'warn', msg:`發現 ${citeCount} 處 LLM 標記 ([cite:], [ref:], [N])`, category:'artifacts' });

  // Hour anomaly: only flag if <10% of entries have hours>=1 (a few corrupted, not a long video)
  const hourEntries = entries.filter(e => e.startMs >= 3600000 || e.endMs >= 3600000);
  if (hourEntries.length > 0 && hourEntries.length / entries.length < 0.1) {
    issues.push({ type:'warn', msg:`${hourEntries.length} 條小時位異常 (疑似時間碼錯誤，非長影片)`, category:'timestamp' });
  }

  // Negative/zero duration
  for (const e of entries) {
    const dur = e.endMs - e.startMs;
    if (dur < 0) issues.push({ type:'warn', msg:`#${e.seq}: 負持續時間 (${dur}ms) — ${e.tsLine}`, category:'timestamp' });
    else if (dur === 0) issues.push({ type:'warn', msg:`#${e.seq}: 零持續時間 — ${e.tsLine}`, category:'timestamp' });
  }

  // Monotonicity breaks
  for (let i=1; i<entries.length; i++) {
    if (entries[i].startMs < entries[i-1].startMs - 500) {
      issues.push({ type:'warn', msg:`#${entries[i].seq}: 時間倒退 (${msToTs(entries[i].startMs)} < 前一條 ${msToTs(entries[i-1].startMs)})`, category:'timestamp' });
    }
  }

  // Overlapping timestamps (>200ms overlap)
  let overlapCount = 0;
  for (let i=1; i<entries.length; i++) {
    const overlap = entries[i-1].endMs - entries[i].startMs;
    if (overlap > 200) overlapCount++;
  }
  if (overlapCount) issues.push({ type:'warn', msg:`${overlapCount} 處時間重疊 (>200ms)`, category:'timestamp' });

  // Large gaps: useful for spotting likely missing subtitles or demo-only sections
  let largeGapCount = 0;
  for (let i=1; i<entries.length; i++) {
    const gap = entries[i].startMs - entries[i-1].endMs;
    if (gap > 15000) largeGapCount++;
  }
  if (largeGapCount) issues.push({ type:'info', msg:`${largeGapCount} 處大空檔 (>15s)，可能是原始缺字幕或長段無旁白`, category:'timestamp' });

  // Duplicate entries (same text within 2s window)
  let dupCount = 0;
  for (let i=1; i<entries.length; i++) {
    const prevText = entries[i-1].textLines.join(' ').trim();
    const currText = entries[i].textLines.join(' ').trim();
    if (prevText && currText && prevText === currText && Math.abs(entries[i].startMs - entries[i-1].startMs) < 2000) dupCount++;
  }
  if (dupCount) issues.push({ type:'warn', msg:`${dupCount} 條重複字幕 (相同文字+相近時間)`, category:'structure' });

  // Empty text
  const empty = entries.filter(e => e.textLines.every(t => !t.trim()));
  if (empty.length) issues.push({ type:'info', msg:`${empty.length} 個空白字幕條目`, category:'structure' });

  // Very short
  const short = entries.filter(e => { const d=e.endMs-e.startMs; return d>0&&d<100; });
  if (short.length) issues.push({ type:'info', msg:`${short.length} 個極短條目 (<100ms)`, category:'timestamp' });

  // Sequence gaps
  let seqBad = false;
  for (let i=0; i<entries.length; i++) { if (entries[i].seq !== i+1) { seqBad=true; break; } }
  if (seqBad) issues.push({ type:'info', msg:'序號不連續', category:'structure' });

  return issues;
}

// ── Fixer ──

function fixSRT(entries, opts, parseMeta) {
  const fixes = [];
  let result = entries.map(e => ({...e, textLines:[...e.textLines]}));

  // Count parse-time normalizations as fixes
  if (parseMeta) {
    if (parseMeta.dotSep) fixes.push({ type:'fix', msg:`正規化 ${parseMeta.dotSep} 處句號(.)→逗號(,)` });
    if (parseMeta.shortTs) fixes.push({ type:'fix', msg:`補齊 ${parseMeta.shortTs} 處缺少的小時位` });
    if (parseMeta.colonMs) fixes.push({ type:'fix', msg:'正規化冒號(:)毫秒分隔符' });
    if (parseMeta.missingBlanks) fixes.push({ type:'fix', msg:'補齊空行分隔符' });
    if (parseMeta.hasBOM) fixes.push({ type:'fix', msg:'移除 BOM 標記' });
    if (parseMeta.missingSeq) fixes.push({ type:'fix', msg:`補齊 ${parseMeta.missingSeq} 條序號` });
  }

  // Remove LLM artifacts
  if (opts.citeMarkers) {
    let count = 0;
    for (const e of result) {
      e.textLines = e.textLines.map(t => {
        let cleaned = t;
        for (const pat of LLM_ARTIFACTS) {
          pat.lastIndex = 0;
          const before = cleaned;
          cleaned = cleaned.replace(pat, '');
          if (cleaned !== before) count++;
        }
        return cleaned;
      }).filter(t => t.trim());
    }
    if (count) fixes.push({ type:'fix', msg:`移除 ${count} 處 LLM 標記` });
  }

  // Remove empty entries
  if (opts.emptyEntries) {
    const before = result.length;
    result = result.filter(e => e.textLines.some(t => t.trim()));
    const removed = before - result.length;
    if (removed) fixes.push({ type:'fix', msg:`移除 ${removed} 個空白條目` });
  }

  // Fix high-order anomaly: first handle obvious hour overflow, then repair suspicious minute/hour corruption from local context.
  if (opts.hourAnomaly) {
    const hourEntries = result.filter(e => e.startMs >= 3600000 || e.endMs >= 3600000);
    if (hourEntries.length > 0 && hourEntries.length / result.length < 0.1) {
      // Dry-run: check if modulo would maintain monotonic order
      let wouldBreakOrder = false;
      for (let i = 1; i < result.length; i++) {
        const prevStart = result[i-1].startMs >= 3600000 ? result[i-1].startMs % 3600000 : result[i-1].startMs;
        const currStart = result[i].startMs >= 3600000 ? result[i].startMs % 3600000 : result[i].startMs;
        if (currStart < prevStart - 500) { wouldBreakOrder = true; break; }
      }
      if (!wouldBreakOrder) {
        let hourFixes = 0;
        for (const e of result) {
          let changed = false;
          if (e.startMs >= 3600000) { e.startMs = e.startMs % 3600000; changed = true; }
          if (e.endMs >= 3600000) { e.endMs = e.endMs % 3600000; changed = true; }
          if (changed) { e.tsLine = `${msToTs(e.startMs)} --> ${msToTs(e.endMs)}`; hourFixes++; }
        }
        if (hourFixes) fixes.push({ type:'fix', msg:`修正 ${hourFixes} 條小時位異常 (歸零)` });
      }
    }

    let contextualFixes = 0;
    for (let i=0; i<result.length; i++) {
      const repaired = findContextualRepair(result, i);
      if (!repaired) continue;
      result[i].startMs = repaired.startMs;
      result[i].endMs = repaired.endMs;
      result[i].tsLine = `${msToTs(result[i].startMs)} --> ${msToTs(result[i].endMs)}`;
      contextualFixes++;
      fixes.push({ type:'fix', msg:`#${result[i].seq}: 依鄰近段落修正時間碼 → ${result[i].tsLine}` });
    }
    if (contextualFixes) fixes.push({ type:'fix', msg:`修正 ${contextualFixes} 條高位時間碼錯位` });
  }

  // Fix negative/zero durations (after hour fix, since hour fix may resolve some)
  if (opts.negDuration) {
    for (let i=0; i<result.length; i++) {
      const e = result[i];
      if (e.endMs <= e.startMs) {
        const prevEnd = i > 0 ? result[i-1].endMs : 0;
        const nextStart = i < result.length-1 ? result[i+1].startMs : e.startMs + 3000;
        const estDuration = estimateDurationMs(e.textLines);

        if (e.startMs < prevEnd || e.startMs > nextStart || nextStart <= e.startMs) {
          // Start is wrong or nextStart equals start — recalculate both from context
          e.startMs = prevEnd + 100;
          e.endMs = Math.min(e.startMs + estDuration, nextStart > e.startMs ? nextStart : e.startMs + estDuration);
        } else {
          e.endMs = Math.min(e.startMs + estDuration, nextStart);
        }
        // Final safety: ensure positive duration
        if (e.endMs <= e.startMs) e.endMs = e.startMs + estDuration;
        e.tsLine = `${msToTs(e.startMs)} --> ${msToTs(e.endMs)}`;
        fixes.push({ type:'fix', msg:`#${e.seq}: 修正時間碼 → ${e.tsLine}` });
      }
    }
  }

  // Fix monotonicity breaks (truncated timestamps like 00:13,100 that should be 06:13,100)
  if (opts.negDuration) {
    let monoFixes = 0;
    for (let i=1; i<result.length; i++) {
      if (result[i].startMs < result[i-1].startMs - 500) {
        const prevEnd = result[i-1].endMs;
        result[i].startMs = prevEnd + 100;
        if (result[i].endMs <= result[i].startMs) {
          const estDuration = estimateDurationMs(result[i].textLines);
          const nextStart = i < result.length-1 ? result[i+1].startMs : result[i].startMs + estDuration;
          result[i].endMs = Math.min(result[i].startMs + estDuration, nextStart > result[i].startMs ? nextStart : result[i].startMs + estDuration);
        }
        result[i].tsLine = `${msToTs(result[i].startMs)} --> ${msToTs(result[i].endMs)}`;
        monoFixes++;
      }
    }
    if (monoFixes) fixes.push({ type:'fix', msg:`修正 ${monoFixes} 處時間倒退` });
  }

  // Fix overlapping timestamps: truncate previous entry's end to current entry's start
  if (opts.overlap) {
    let overlapFixes = 0;
    for (let i=1; i<result.length; i++) {
      const overlap = result[i-1].endMs - result[i].startMs;
      if (overlap > 200) {
        const newEnd = result[i].startMs;
        // Guard: don't create negative duration
        if (newEnd > result[i-1].startMs) {
          result[i-1].endMs = newEnd;
          result[i-1].tsLine = `${msToTs(result[i-1].startMs)} --> ${msToTs(result[i-1].endMs)}`;
          overlapFixes++;
        }
      }
    }
    if (overlapFixes) fixes.push({ type:'fix', msg:`修正 ${overlapFixes} 處時間重疊` });
  }

  // Remove duplicate entries: same text within 2s window, keep the first
  if (opts.duplicates) {
    const before = result.length;
    result = result.filter((e, i) => {
      if (i === 0) return true;
      const prevText = result[i-1] ? result[i-1].textLines.join(' ').trim() : '';
      const currText = e.textLines.join(' ').trim();
      return !(prevText && currText && prevText === currText && Math.abs(e.startMs - result[i-1].startMs) < 2000);
    });
    const removed = before - result.length;
    if (removed) fixes.push({ type:'fix', msg:`移除 ${removed} 條重複字幕` });
  }

  // Renumber
  if (opts.renumber) {
    let renumbered = false;
    for (let i=0; i<result.length; i++) {
      if (result[i].seq !== i+1) renumbered = true;
      result[i].seq = i+1;
    }
    if (renumbered) fixes.push({ type:'fix', msg:'重新編號' });
  }

  return { entries: result, fixes };
}

function buildSRT(entries) {
  return entries.map(e =>
    `${e.seq}\n${e.tsLine}\n${e.textLines.join('\n')}`
  ).join('\n\n') + '\n';
}

// ── UI ──

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const toolbar = document.getElementById('toolbar');
const configBar = document.getElementById('configBar');
const emptyState = document.getElementById('emptyState');
const btnFixAll = document.getElementById('btnFixAll');
const btnDownloadAll = document.getElementById('btnDownloadAll');
const btnClear = document.getElementById('btnClear');
const statsEl = document.getElementById('stats');
const toast = document.getElementById('toast');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => handleFiles(e.target.files));
btnFixAll.addEventListener('click', fixAll);
btnDownloadAll.addEventListener('click', downloadAll);
btnClear.addEventListener('click', clearAll);

function handleFiles(fileObjs) {
  for (const f of fileObjs) {
    if (!f.name.endsWith('.srt')) continue;
    const reader = new FileReader();
    reader.onload = e => {
      const text = e.target.result;
      const { entries, parseMeta } = parseSRT(text);
      const issues = analyzeSRT(entries, parseMeta);
      files.push({ name:f.name, original:text, entries, parseMeta, issues, fixed:null, fixLog:[] });
      renderAll();
    };
    reader.readAsText(f);
  }
}

function getOpts() {
  return {
    citeMarkers: document.getElementById('optCiteMarkers').checked,
    negDuration: document.getElementById('optNegDuration').checked,
    hourAnomaly: document.getElementById('optHourAnomaly').checked,
    overlap: document.getElementById('optOverlap').checked,
    duplicates: document.getElementById('optDuplicates').checked,
    renumber: document.getElementById('optRenumber').checked,
    emptyEntries: document.getElementById('optEmptyEntries').checked,
  };
}

function applyFix(f) {
  const opts = getOpts();
  const { entries, fixes } = fixSRT(f.entries, opts, f.parseMeta);
  f.fixed = buildSRT(entries);
  f.fixLog = fixes;
  // Re-analyze fixed output to count actually resolved issues
  const { entries: fEntries, parseMeta: fMeta } = parseSRT(f.fixed);
  const remaining = analyzeSRT(fEntries, fMeta);
  const origWarns = f.issues.filter(i => i.type === 'warn').length;
  const remainWarns = remaining.filter(i => i.type === 'warn').length;
  f.resolvedCount = origWarns - remainWarns;
  f.remainingIssues = remaining.filter(i => i.type === 'warn');
}

function fixAll() {
  for (const f of files) applyFix(f);
  btnDownloadAll.disabled = false;
  renderAll();
  showToast('全部修復完成');
}

function fixSingle(idx) {
  applyFix(files[idx]);
  btnDownloadAll.disabled = !files.some(f => f.fixed);
  renderAll();
  showToast(`${files[idx].name} 修復完成`);
}

function downloadSingle(idx) {
  const f = files[idx];
  const content = f.fixed || buildSRT(f.entries);
  const name = f.fixed ? f.name.replace('.srt','_fixed.srt') : f.name;
  downloadText(content, name);
}

function downloadAll() {
  files.forEach((f,i) => {
    setTimeout(() => {
      const content = f.fixed || buildSRT(f.entries);
      const name = f.fixed ? f.name.replace('.srt','_fixed.srt') : f.name;
      downloadText(content, name);
    }, i * 200);
  });
}

function downloadText(text, filename) {
  const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function clearAll() {
  files = [];
  btnDownloadAll.disabled = true;
  fileInput.value = '';
  renderAll();
}

function renderAll() {
  const hasFiles = files.length > 0;
  toolbar.style.display = hasFiles ? 'flex' : 'none';
  configBar.style.display = hasFiles ? 'flex' : 'none';
  emptyState.style.display = hasFiles ? 'none' : 'block';

  const totalIssues = files.reduce((s,f) => s + f.issues.filter(i=>i.type==='warn').length, 0);
  const totalResolved = files.reduce((s,f) => s + (f.resolvedCount||0), 0);
  const totalEntries = files.reduce((s,f) => s + f.entries.length, 0);
  statsEl.innerHTML = `
    <span>${files.length} 個檔案</span>
    <span>${totalEntries} 條字幕</span>
    ${totalIssues ? `<span style="color:var(--orange)">${totalIssues} 個問題</span>` : ''}
    ${totalResolved ? `<span style="color:var(--green)">${totalResolved} 已修復</span>` : ''}
  `;

  fileList.innerHTML = files.map((f,i) => {
    const warnCount = f.issues.filter(x=>x.type==='warn').length;
    const hasIssues = warnCount > 0;
    const cls = f.fixed ? 'fixed' : (hasIssues ? 'has-issues' : '');
    const badge = f.fixed
      ? `<span class="badge badge-fixed">${f.resolvedCount} 已修復</span>${f.remainingIssues && f.remainingIssues.length ? ` <span class="badge badge-issues">${f.remainingIssues.length} 殘留</span>` : ''}`
      : hasIssues
        ? `<span class="badge badge-issues">${warnCount} 個問題</span>`
        : `<span class="badge badge-ok">OK</span>`;

    const issueHtml = f.issues.length ? f.issues.map(x =>
      `<li class="${x.type}">${x.msg}</li>`
    ).join('') : '';

    const fixHtml = f.fixLog.length ? f.fixLog.map(x =>
      `<li class="fix">${x.msg}</li>`
    ).join('') : '';

    return `
    <div class="file-card ${cls}">
      <div class="file-header" onclick="toggleDetails(${i})">
        <span class="file-name">${f.name}</span>
        <span style="color:var(--text2);font-size:.8rem">${f.entries.length} 條</span>
        ${badge}
        <div class="file-actions">
          ${!f.fixed ? `<button class="btn btn-outline btn-sm" onclick="event.stopPropagation();fixSingle(${i})">修復</button>` : ''}
          <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();downloadSingle(${i})">${f.fixed?'下載修復檔':'下載'}</button>
        </div>
      </div>
      <div class="file-details" id="details-${i}">
        ${issueHtml ? `<div class="issue-group"><div class="issue-group-title">偵測到的問題</div><ul class="issue-list">${issueHtml}</ul></div>` : ''}
        ${fixHtml ? `<div class="issue-group"><div class="issue-group-title">已修復</div><ul class="issue-list">${fixHtml}</ul></div>` : ''}
        ${!issueHtml && !fixHtml ? '<div style="color:var(--text2);padding:4px 0">此檔案格式正常</div>' : ''}
        <span class="preview-toggle" onclick="togglePreview(${i})">預覽修復結果</span>
        <div class="preview-box" id="preview-${i}">${f.fixed ? escapeHtml(f.fixed.slice(0,2000)) : escapeHtml(buildSRT(f.entries).slice(0,2000))}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleDetails(i) {
  document.getElementById(`details-${i}`).classList.toggle('open');
}
function togglePreview(i) {
  document.getElementById(`preview-${i}`).classList.toggle('open');
}
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}
</script>
</body>
</html>
