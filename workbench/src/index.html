<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e1e2e" />
    <meta name="description" content="Workshop - Your personal workspace" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Workshop</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((reg) => {
              console.log("SW registered:", reg.scope);
              // Detect SW update: when new SW activates, reload to avoid
              // stale JS chunks referencing deleted hashed assets (404)
              reg.addEventListener("updatefound", () => {
                const nw = reg.installing;
                if (!nw) return;
                nw.addEventListener("statechange", () => {
                  if (nw.state === "activated" && navigator.serviceWorker.controller) {
                    console.log("SW updated — reloading for new version");
                    window.location.reload();
                  }
                });
              });
            })
            .catch((err) => console.log("SW registration failed:", err));
        });
      }
    </script>
  </body>
</html>
