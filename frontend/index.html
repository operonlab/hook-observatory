<html lang="zh-Hant">

    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="icon-192.svg" />

    <script>
      // Service Worker 註冊
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js").catch((err) => {
            console.warn("SW registration failed:", err);
          });
        });
      }
    </script>
