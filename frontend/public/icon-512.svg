<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#0a0a0e"/>
  <!-- 衛星碟形天線 -->
  <g transform="translate(256,256)">
    <!-- 碟面 -->
    <ellipse cx="0" cy="-48" rx="128" ry="75" fill="none" stroke="#89b4fa" stroke-width="10" opacity="0.9"/>
    <ellipse cx="0" cy="-48" rx="85" ry="48" fill="none" stroke="#89b4fa" stroke-width="6" opacity="0.5"/>
    <!-- 支架 -->
    <line x1="0" y1="-48" x2="0" y2="96" stroke="#89b4fa" stroke-width="10" stroke-linecap="round"/>
    <!-- 底座 -->
    <rect x="-54" y="96" width="108" height="16" rx="8" fill="#89b4fa" opacity="0.7"/>
    <!-- 訊號波 -->
    <path d="M 58,-96 Q 102,-140 144,-96" fill="none" stroke="#89b4fa" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
    <path d="M 80,-118 Q 134,-172 186,-118" fill="none" stroke="#89b4fa" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
  </g>
</svg>
