## Komodo Core + MongoDB (Mac Hub)
## Usage: cd infra/komodo && docker compose up -d
##
## Required env vars (set in .env or export before running):
##   KOMODO_PASSKEY       — shared secret for Core <-> Periphery auth
##   KOMODO_ADMIN_USER    — initial admin username
##   KOMODO_ADMIN_PASS    — initial admin password
##   MAC_TAILSCALE_IP     — Mac's Tailscale IP (e.g. 100.x.x.x)

services:
  komodo-mongo:
    image: mongo:7
    container_name: komodo-mongo
    restart: unless-stopped
    volumes:
      - komodo-mongo-data:/data/db
    ports:
      - "127.0.0.1:27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 3

  komodo-core:
    image: ghcr.io/moghtech/komodo-core:latest
    container_name: komodo-core
    restart: unless-stopped
    depends_on:
      komodo-mongo:
        condition: service_healthy
    ports:
      - "127.0.0.1:9120:9120"
    environment:
      ## Core connects to Mongo via Docker network name
      KOMODO_DATABASE_ADDRESS: "komodo-mongo:27017"
      ## Auth — override via .env file, never hardcode
      KOMODO_PASSKEY: "${KOMODO_PASSKEY}"
      KOMODO_LOCAL_AUTH: "true"
      KOMODO_INIT_ADMIN_USERNAME: "${KOMODO_ADMIN_USER}"
      KOMODO_INIT_ADMIN_PASSWORD: "${KOMODO_ADMIN_PASS}"
      ## Networking
      KOMODO_HOST: "http://${MAC_TAILSCALE_IP:-127.0.0.1}:9120"
      KOMODO_PORT: "9120"
      ## General
      KOMODO_TITLE: "Workshop Fleet"
      KOMODO_ENABLE_NEW_USERS: "false"
      KOMODO_LOGGING_LEVEL: "info"
    volumes:
      - komodo-data:/data
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  komodo-mongo-data:
  komodo-data:
