# ws-infra — Workshop Infrastructure Stack
# Usage: docker compose -p ws-infra up -d
# All foundation services for the Workshop platform.
# Container names follow compose convention: ws-infra-{service}-1

services:
  postgres:
    image: postgres:16
    restart: always
    mem_limit: 512m
    environment:
      POSTGRES_USER: joneshong
      POSTGRES_PASSWORD: dev_12345
      POSTGRES_DB: workshop
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joneshong -d workshop"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    mem_limit: 256m
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  lgtm:
    image: grafana/otel-lgtm:latest
    profiles: ["observability"]
    restart: always
    mem_limit: 768m
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "127.0.0.1:3100:3000"   # Grafana UI
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP
    volumes:
      - lgtm-data:/data
      - ./lgtm/loki-config.yaml:/otel-lgtm/loki-config.yaml:ro
      - ./lgtm/tempo-config.yaml:/otel-lgtm/tempo-config.yaml:ro
      - ./lgtm/run-prometheus.sh:/otel-lgtm/run-prometheus.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    restart: always
    mem_limit: 256m
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # Web Console
    volumes:
      - rustfs-data:/data
      - rustfs-logs:/logs
    environment:
      RUSTFS_ROOT_USER: rustfsadmin
      RUSTFS_ROOT_PASSWORD: rustfsadmin
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -o /dev/null -w '%{http_code}' http://localhost:9000/ | grep -q 403"]
      interval: 10s
      timeout: 5s
      retries: 5

  filebrowser:
    image: filebrowser/filebrowser:v2
    restart: always
    mem_limit: 128m
    ports:
      - "127.0.0.1:8850:80"
    volumes:
      - filebrowser-data:/srv
      - filebrowser-db:/database
    environment:
      FB_BASEURL: /apps/files
      FB_DATABASE: /database/filebrowser.db
      FB_ROOT: /srv
      FB_NOAUTH: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/apps/files/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  bark:
    image: finab/bark-server:latest
    restart: always
    mem_limit: 128m
    ports:
      - "127.0.0.1:8090:8080"
    volumes:
      - bark-data:/data
    environment:
      TZ: Asia/Taipei
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    mem_limit: 512m
    ports:
      - "127.0.0.1:6333:6333"   # REST API
      - "127.0.0.1:6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
      - ./qdrant/config.yaml:/qdrant/config/production.yaml
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ntfy: disabled — Bark + Web Push only (volumes preserved)
  # image: binwiederhier/ntfy:latest
  # To re-enable: uncomment this block + ntfy-cache/ntfy-data volumes

volumes:
  pg-data:
  redis-data:
  lgtm-data:
  rustfs-data:
  rustfs-logs:
  filebrowser-data:
  filebrowser-db:
  bark-data:
    external: true
  # ntfy-cache:  # preserved on disk, not managed
  qdrant-data:
  # ntfy-data:   # preserved on disk, not managed
