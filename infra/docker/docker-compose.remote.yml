# Workshop Remote Services — 跑在 Windows WSL2 (Komodo managed)
# Usage: docker compose -p ws-remote --env-file .env.remote -f docker-compose.remote.yml up -d
# Credentials: .env.remote (gitignored, not checked in)

services:
  agent-metrics:
    build:
      context: ../../stations/agent-metrics
      dockerfile: Dockerfile
    container_name: ws-remote-agent-metrics
    ports:
      - "10103:10103"
    environment:
      - AGENT_METRICS_HOST=0.0.0.0
      - AGENT_METRICS_PORT=10103
      - AGENT_METRICS_DATABASE_URL=${AGENT_METRICS_DATABASE_URL}
      - AGENT_METRICS_REDIS_URL=${AGENT_METRICS_REDIS_URL}
      - AGENT_METRICS_HOOK_URL=${AGENT_METRICS_HOOK_URL}
      - AGENT_METRICS_LITELLM_BASE_URL=${AGENT_METRICS_LITELLM_BASE_URL}
      - AGENT_METRICS_LITELLM_DATABASE_URL=${AGENT_METRICS_LITELLM_DATABASE_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10103/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes: {}
