# Workshop Remote Services — 跑在 Windows WSL2 (Komodo managed)
# Usage: docker compose -p ws-remote -f docker-compose.remote.yml up -d
# Managed by Komodo Core on Mac, Periphery Agent on Windows WSL2.

services:
  agent-metrics:
    build:
      context: ../../stations/agent-metrics
      dockerfile: Dockerfile
    container_name: ws-remote-agent-metrics
    ports:
      - "10103:10103"
    environment:
      - AGENT_METRICS_HOST=0.0.0.0
      - AGENT_METRICS_PORT=10103
      - AGENT_METRICS_DATABASE_URL=${AGENT_METRICS_DATABASE_URL:-postgresql://joneshong:REDACTED@REDACTED_IP:5432/workshop}
      - AGENT_METRICS_REDIS_URL=${AGENT_METRICS_REDIS_URL:-redis://REDACTED_IP:6379/0}
      - AGENT_METRICS_HOOK_URL=${AGENT_METRICS_HOOK_URL:-http://REDACTED_IP:10100/api/hooks}
      - AGENT_METRICS_LITELLM_BASE_URL=${AGENT_METRICS_LITELLM_BASE_URL:-http://REDACTED_IP:4000}
      - AGENT_METRICS_LITELLM_DATABASE_URL=${AGENT_METRICS_LITELLM_DATABASE_URL:-postgresql://joneshong:REDACTED@REDACTED_IP:5432/litellm_spend}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10103/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes: {}
