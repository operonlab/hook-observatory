### 環境修正：確保 Homebrew 在 PATH 中（TPM 插件需要呼叫 tmux）
if-shell '[ -d /opt/homebrew/bin ]' \
  'set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"'

### 一般
set -g mouse on
set -g history-limit 10000
set -g focus-events on
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows off
set -s escape-time 0
setw -g automatic-rename off
set -g allow-rename off          # 禁止程式透過 escape sequence 改 window 名稱

# 色彩/相容
set -g default-terminal "tmux-256color"
# 先清除再設定，避免 source-file 時重複累積
set -s terminal-overrides ''
set -as terminal-overrides ",xterm-256color:Tc"
set -as terminal-overrides ",*:Smulx=\\E[4::%p1%dm"   # 底線樣式支援
set -as terminal-overrides ",*:Se=\\E[2 q"             # 游標形狀重置

# OSC 8 超連結（Claude Code / 現代 CLI 的可點擊 URL）
set -as terminal-features ',xterm-256color:hyperlinks'
set -g allow-passthrough on

### Prefix 與綁定
set -g prefix C-b
unbind C-a
bind C-b send-prefix

unbind -T prefix d
bind   -T prefix d detach-client
bind   -T prefix c run-shell "~/workshop/shell/tmux/new_window_from_8.sh"
bind   -T prefix & kill-window
bind   -T prefix x kill-pane
bind   -T prefix h split-window -h
bind   -T prefix v split-window -v
bind   -T prefix q display-panes
bind   -T prefix m run-shell "if [ \"$(tmux show -gv mouse)\" = \"on\" ]; then tmux set -g mouse off; tmux display-message 'Mouse: OFF (Terminal select enabled)'; else tmux set -g mouse on; tmux display-message 'Mouse: ON (tmux capture enabled)'; fi"
bind   -T prefix M run-shell "~/workshop/shell/tmux/layout-toggle.sh grid"  # merge/unmerge 2x2 四象限
bind   -T prefix G run-shell "~/workshop/shell/tmux/layout-toggle.sh cols"  # merge/unmerge 4 直排欄位
bind   -T prefix W run-shell "~/workshop/shell/tmux/normalize_fixed_windows.sh"
bind   -T prefix D choose-client

# 無 prefix 的方向鍵切換窗格
bind -n C-Left  select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up    select-pane -U
bind -n C-Down  select-pane -D

# Vim 風格窗格大小調整
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 重載設定
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# 強制完整重繪（殘影急救鍵）
bind R refresh-client \; display-message "Screen refreshed!"

### 狀態列（由 catppuccin 主題接管，保留 position 設定）
set -g status-position bottom
# 以下被 catppuccin 覆蓋，保留註解供參考
# set -g status-bg colour235
# set -g status-fg colour136
# set -g status-left  '#[fg=green]#S #[default]'
# set -g status-right '#(~/.tmux/plugins/tmux-continuum/scripts/continuum_save.sh)Prefix:#{prefix} Mouse:#{?mouse,ON,OFF} | %Y-%m-%d %H:%M'
# set -g status-left-length 20
# set -g status-right-length 100

### 預設 session 保護
if-shell '[ -z "#{session_name}" ] && ! tmux has-session -t default 2>/dev/null' \
  'new-session -d -s default' ''

### 插件：TPM
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'catppuccin/tmux'

# Resurrect & Continuum
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Catppuccin 主題
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_modules_right 'date_time'
set -g @catppuccin_date_time_text '[%Y] %m/%d %H:%M'
set -g @catppuccin_window_current_text ' #W'
set -g @catppuccin_window_text ' #W'
# 覆蓋 catppuccin 預設 Powerline 分隔符（U+E0B6 是 Ambiguous width，Apple Terminal CJK locale 下會渲染為 2 格）
set -g @catppuccin_status_left_separator ' '
set -g @catppuccin_status_right_separator ' '
set -g @catppuccin_status_middle_separator ' '

# tmux-fzf（prefix + F 開啟模糊搜尋）
TMUX_FZF_LAUNCH_KEY="F"

# 與 macOS 剪貼簿整合（tmux 3.2+）
set -g set-clipboard on
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# 預載 catppuccin mocha 色票（同步），確保 @thm_* 在 TPM 非同步載入前就可用
source -q ~/.tmux/plugins/tmux/themes/catppuccin_mocha_tmux.conf

# 初始化 TPM（catppuccin 接管 Row 1 的 windows + date_time）
run '~/.tmux/plugins/tpm/tpm'

# ─── 滑鼠複製：不捲到底部（覆寫 tmux-yank 預設）───
# copy-pipe-no-clear = 複製到剪貼簿 + 留在原位 + 保持選取高亮
# 按 q 退出 copy mode，按 Escape 取消選取但留在 copy mode
bind-key -T copy-mode    MouseDragEnd1Pane    send-keys -X copy-pipe-no-clear "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane    send-keys -X copy-pipe-no-clear "pbcopy"
bind-key -T copy-mode    DoubleClick1Pane     select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-no-clear "pbcopy"
bind-key -T copy-mode-vi DoubleClick1Pane     select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-no-clear "pbcopy"
bind-key -T copy-mode    TripleClick1Pane     select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-no-clear "pbcopy"
bind-key -T copy-mode-vi TripleClick1Pane     select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-no-clear "pbcopy"
# root table: 非 copy-mode 下雙擊/三擊也不跳走
bind-key -T root DoubleClick1Pane  select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H ; send-keys -X select-word ; run-shell -d 0.3 ; send-keys -X copy-pipe-no-clear "pbcopy" }
bind-key -T root TripleClick1Pane  select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H ; send-keys -X select-line ; run-shell -d 0.3 ; send-keys -X copy-pipe-no-clear "pbcopy" }

# ─── 右鍵選單：停用滑鼠觸發，改用 Alt+Q 鍵盤觸發 ───
# 問題：iTerm2 + mouse on → 右鍵被 tmux 攔截，Alt+右鍵 modifier 不傳遞
# 解法：unbind 所有右鍵 → Alt+Q 叫出自訂選單（需 iTerm2 Left Option = Esc+）
unbind -T root MouseDown3Pane
unbind -T root MouseDown3Status
unbind -T root MouseDown3StatusLeft
unbind -T root M-MouseDown3Pane
unbind -T root M-MouseDown3Status
unbind -T root M-MouseDown3StatusLeft

bind-key -n M-q display-menu -T "#[align=centre]#{window_index}:#{window_name}" -x W -y S \
    "Horizontal Split"  h "split-window -h -c '#{pane_current_path}'" \
    "Vertical Split"    v "split-window -v -c '#{pane_current_path}'" \
    "" \
    "Swap Up"           u "swap-pane -U" \
    "Swap Down"         d "swap-pane -D" \
    "#{?window_zoomed_flag,Unzoom,Zoom}" z "resize-pane -Z" \
    "" \
    "Kill Pane"         x "kill-pane" \
    "Kill Window"       X "kill-window" \
    "Respawn Pane"      r "respawn-pane -k" \
    "" \
    "New Window"        n "run-shell '~/workshop/shell/tmux/new_window_from_8.sh'" \
    "Rename Window"     R "command-prompt -F -I '#W' { rename-window -t '#{window_id}' '%%' }" \
    "Choose Session"    s "choose-tree -Zs" \
    "" \
    "#{?pane_marked,Unmark,Mark}" m "select-pane -m" \
    "#{?mouse,Mouse OFF,Mouse ON}" M "run-shell \"if [ \\\"$(tmux show -gv mouse)\\\" = \\\"on\\\" ]; then tmux set -g mouse off; tmux display-message 'Mouse: OFF'; else tmux set -g mouse on; tmux display-message 'Mouse: ON'; fi\""

# ─── 雙行 Status Bar（必須在 TPM/catppuccin 之後）───
# Row 1: catppuccin 管理 — 左：session + windows｜右：date_time
# Row 2: 系統監控 — 右對齊：NET | CPU | MEM | CC | DISK

set -g status 2

# 清除可能殘留的第三行 status bar
set -gu 'status-format[2]'

# Row 2: 左＝三服務 Quota（CC/CX/GM）｜右＝系統監控（NET/CPU/MEM/DISK）
# Data source: agent-metrics → /tmp/agent-metrics-sysmon.json (5s cache)
# Provider: ~/workshop/stations/system-monitor/tmux_status.sh (shell+jq, replaces Python to avoid 13× interpreter overhead)
set -g 'status-format[1]' '#[align=left bg=#{@thm_mantle}]#[fg=#{@thm_subtext_1},bg=#{@thm_mantle}]CLAUDE #[fg=#{@thm_sky},bg=#{@thm_mantle}]#[fg=#{@thm_crust},bg=#{@thm_sky}] 5H #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #(~/workshop/stations/system-monitor/tmux_status.sh cc-5h) #[fg=#{@thm_surface_0},bg=#{@thm_mantle}] #[fg=#{@thm_blue},bg=#{@thm_mantle}]#[fg=#{@thm_crust},bg=#{@thm_blue}] 7D #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #(~/workshop/stations/system-monitor/tmux_status.sh cc-7d) #[fg=#{@thm_surface_0},bg=#{@thm_mantle}] #(~/workshop/stations/system-monitor/tmux_status.sh ex-segment)  #[fg=#{@thm_subtext_1},bg=#{@thm_mantle}]CODEX #[fg=#{@thm_pink},bg=#{@thm_mantle}]#[fg=#{@thm_crust},bg=#{@thm_pink}] 5H #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #(~/workshop/stations/system-monitor/tmux_status.sh cx-5h) #[fg=#{@thm_surface_0},bg=#{@thm_mantle}] #[fg=#{@thm_maroon},bg=#{@thm_mantle}]#[fg=#{@thm_crust},bg=#{@thm_maroon}] 7D #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #(~/workshop/stations/system-monitor/tmux_status.sh cx-7d) #[fg=#{@thm_surface_0},bg=#{@thm_mantle}]  #[fg=#{@thm_subtext_1},bg=#{@thm_mantle}]GEMINI #[fg=#{@thm_lavender},bg=#{@thm_mantle}]#[fg=#{@thm_crust},bg=#{@thm_lavender}] Fl #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #(~/workshop/stations/system-monitor/tmux_status.sh gm-flash) #[fg=#{@thm_surface_0},bg=#{@thm_mantle}] #[fg=#{@thm_sapphire},bg=#{@thm_mantle}]#[fg=#{@thm_crust},bg=#{@thm_sapphire}] Pro #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #(~/workshop/stations/system-monitor/tmux_status.sh gm-pro) #[fg=#{@thm_surface_0},bg=#{@thm_mantle}]#[align=right]#[fg=#{@thm_teal},bg=#{@thm_mantle}]#[fg=#{@thm_crust},bg=#{@thm_teal}] NET #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #(~/workshop/stations/system-monitor/tmux_status.sh net) #[fg=#{@thm_surface_0},bg=#{@thm_mantle}] #[fg=#{@thm_green},bg=#{@thm_mantle}]#[fg=#{@thm_crust},bg=#{@thm_green}] CPU #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #(~/workshop/stations/system-monitor/tmux_status.sh cpu) #[fg=#{@thm_surface_0},bg=#{@thm_mantle}] #[fg=#{@thm_yellow},bg=#{@thm_mantle}]#[fg=#{@thm_crust},bg=#{@thm_yellow}] MEM #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #(~/workshop/stations/system-monitor/tmux_status.sh mem) #[fg=#{@thm_surface_0},bg=#{@thm_mantle}] #[fg=#{@thm_peach},bg=#{@thm_mantle}]#[fg=#{@thm_crust},bg=#{@thm_peach}] DISK #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #(~/workshop/stations/system-monitor/tmux_status.sh disk) #[fg=#{@thm_surface_0},bg=#{@thm_mantle}]'

# Row 1 右側：日期時間 pill（與 Row 2 同風格）
set -gF status-right "#[fg=#{@thm_sapphire},bg=#{@thm_mantle}]#[fg=#{@thm_crust},bg=#{@thm_sapphire}] TIME #[fg=#{@thm_fg},bg=#{@thm_surface_0}] %Y/%m/%d %H:%M #[fg=#{@thm_surface_0},bg=#{@thm_mantle}]"
set -g status-right-length 120

# 刷新間隔 5 秒（網速和記憶體需要即時性）
set -g status-interval 5

# Safety: 強制套用 catppuccin status-style（@thm_* 已由 source -q 預載）
set -gF status-style "bg=#{@thm_mantle},fg=#{@thm_fg}"
