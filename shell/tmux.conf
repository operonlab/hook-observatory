### 環境修正：確保 Homebrew 在 PATH 中（TPM 插件需要呼叫 tmux）
if-shell '[ -d /opt/homebrew/bin ]' \
  'set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"'

### 一般
set -g mouse on
set -g history-limit 10000
set -g focus-events on
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows off
set -s escape-time 0
setw -g automatic-rename off
set -g allow-rename off          # 禁止程式透過 escape sequence 改 window 名稱

# 色彩/相容
set -g default-terminal "tmux-256color"
# 先清除再設定，避免 source-file 時重複累積
set -s terminal-overrides ''
set -as terminal-overrides ",xterm-256color:Tc"
set -as terminal-overrides ",*:Smulx=\\E[4::%p1%dm"   # 底線樣式支援
set -as terminal-overrides ",*:Se=\\E[2 q"             # 游標形狀重置

# OSC 8 超連結（Claude Code / 現代 CLI 的可點擊 URL）
set -as terminal-features ',xterm-256color:hyperlinks'
set -g allow-passthrough on

# Extended keys（Shift+Enter 等 kitty keyboard protocol；Ghostty/iTerm2/Kitty/WezTerm 原生支援）
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# DEC mode 2026 同步輸出（已停用）— tmux 3.6a 開啟後，copy-mode 快速 scroll 會出現
# partial repaint 殘影（上下 frame 疊印）。閃爍 vs 殘影權衡下，關掉 sync 讓 scroll 乾淨。
# 若想恢復：取消下一行註解。
# set -as terminal-features ',*:sync'

### Prefix 與綁定
set -g prefix C-b
unbind C-a
bind C-b send-prefix

unbind -T prefix d
bind   -T prefix d detach-client
bind   -T prefix c run-shell "~/workshop/shell/tmux/new_window_from_8.sh"
bind   -T prefix & kill-window
bind   -T prefix x kill-pane
bind   -T prefix h split-window -h
bind   -T prefix v split-window -v
bind   -T prefix q display-panes
bind   -T prefix m run-shell "if [ \"$(tmux show -gv mouse)\" = \"on\" ]; then tmux set -g mouse off; tmux display-message 'Mouse: OFF (Terminal select enabled)'; else tmux set -g mouse on; tmux display-message 'Mouse: ON (tmux capture enabled)'; fi"
bind   -T prefix M run-shell "~/workshop/shell/tmux/layout-toggle.sh grid"  # merge/unmerge 2x2 四象限
bind   -T prefix G run-shell "~/workshop/shell/tmux/layout-toggle.sh cols"  # merge/unmerge 4 直排欄位
# Layout 密度切換：cw≈180 / 4-pane 每 pane 只 88-90 cols 太擠時切 main-vertical
# 避開 prefix+1..9（tmux 預設 select-window）。e=even, E=Expanded-main
# prefix+e = 復原 4-pane even-horizontal
# prefix+E = 中央寬 60% main + 左右窄（主要工作 pane 拿到 ~108 cols）
bind   -T prefix e select-layout even-horizontal
bind   -T prefix E select-layout main-vertical \; resize-pane -t 1 -x 60%
bind   -T prefix W run-shell "~/workshop/shell/tmux/normalize_fixed_windows.sh"
bind   -T prefix D choose-client

# cmux sidebar 開合 / focus pane 會 resize tmux client，自動重新均分 pane 大小（2026-05-07）
# 注意：H/J/K/L 手動 resize 會在下次 client-resized 時被抵銷，是預期的 trade-off
#
# Adaptive client mode：透過 detect-client.sh 偵測父進程是否含 cmux，自動切換
#   - cmux：window-size manual + ww=cw-1 + status trailing 2 字（補償 cmux 0.63.2
#           off-by-one render bug，避免最右 ~1 col cell 被視窗邊吃掉）
#   - other (ghostty/iterm2/外部)：window-size latest + status trailing 0 字
#     （走 tmux 預設，無需 cmux workaround）
# 由 adapt-client.sh 在 client-attached/detached 時套用，狀態存 /tmp/tmux-client-mode
#
# Why debounce：cmux 0.63.2 在 focus pane 時會連續 emit 多個 client_width
# （353→328→330→353→...→356），中間狀態若立刻 resize-window 會把 window_width
# 鎖在錯誤值。debounce 250ms 等 size 穩定後才平分。
set-hook -g client-attached 'run-shell -b "~/workshop/shell/tmux/adapt-client.sh"'
set-hook -g client-detached 'run-shell -b "~/workshop/shell/tmux/adapt-client.sh"'
set-hook -g client-resized 'run-shell -b "echo \"[$(date +%H:%M:%S)] resize-event cw=#{client_width} ww=#{window_width}\" >> /tmp/tmux-resize.log; ~/workshop/shell/tmux/debounce-rebalance.sh"'
# 新建 window 也要走同一條 rebalance 路徑（否則 cmux mode 下 window-size manual + default-size 80x24 會讓新 window 卡在 80x24）
set-hook -g window-linked 'run-shell -b "echo \"[$(date +%H:%M:%S)] window-linked w=#{window_index} cw=#{client_width}\" >> /tmp/tmux-resize.log; ~/workshop/shell/tmux/debounce-rebalance.sh"'

# 無 prefix 的方向鍵切換窗格
bind -n C-Left  select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up    select-pane -U
bind -n C-Down  select-pane -D

# Vim 風格窗格大小調整
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 重載設定
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# 強制完整重繪（殘影急救鍵）
bind R refresh-client \; display-message "Screen refreshed!"

### 狀態列（由 catppuccin 主題接管，保留 position 設定）
set -g status-position bottom
