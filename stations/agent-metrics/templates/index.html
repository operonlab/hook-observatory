<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Metrics — 監控儀表板</title>
  <meta name="theme-color" content="#1e1e2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AgentMetrics">
  <link rel="stylesheet" href="static/css/dashboard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1>Agent Metrics</h1>
      <span class="header-info" id="sys-info">v{{ version }}</span>
    </div>
    <div class="header-right">
      <span id="last-updated">—</span>
      <div class="toggle-wrap" id="auto-refresh-toggle" title="自動更新">
        <div class="toggle-track active" id="toggle-track">
          <div class="toggle-thumb"></div>
        </div>
        <span>自動</span>
      </div>
    </div>
  </header>

  <!-- Tab Bar -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="quotas">配額</button>
    <button class="tab-btn" data-tab="usage">用量</button>
  </nav>

  <!-- ═══ Tab: 配額 ═══ -->
  <div class="tab-panel active" id="panel-quotas">
    <div class="container">
      <div class="card">
        <div class="card-title">LLM 配額使用量</div>
        <div class="quota-grid" id="quota-grid">
          <div class="empty">載入中...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Tab: 用量 ═══ -->
  <div class="tab-panel" id="panel-usage">
    <div class="container">
      <div class="two-col">
        <!-- Claude 綜合 -->
        <div class="card">
          <div class="card-title">Claude (CCusage)</div>
          <div id="claude-budget-info"><div class="empty">載入中...</div></div>
          <div class="table-wrap" style="margin-top:0.75rem">
            <table class="data-table">
              <thead><tr><th>模型 (30 天)</th><th style="text-align:right">花費</th></tr></thead>
              <tbody id="claude-model-tbody"><tr><td colspan="2" class="empty">載入中...</td></tr></tbody>
            </table>
          </div>
        </div>
        <!-- LiteLLM 綜合 -->
        <div class="card">
          <div class="card-title">LiteLLM (預付)</div>
          <div id="litellm-budget-info"><div class="empty">載入中...</div></div>
          <div class="table-wrap" style="margin-top:0.75rem">
            <table class="data-table">
              <thead><tr><th>供應商</th><th style="text-align:right">儲值</th><th style="text-align:right">剩餘</th><th style="text-align:right">已用</th><th style="text-align:right">使用率</th></tr></thead>
              <tbody id="litellm-model-tbody"><tr><td colspan="5" class="empty">載入中...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="static/js/charts.js"></script>
  <script src="static/js/app.js"></script>
</body>
</html>
