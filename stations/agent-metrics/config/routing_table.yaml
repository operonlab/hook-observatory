# CLI Routing Table — maps task categories to CLI agents per budget tier.
# Tiers: budget (minimize cost), primary (balanced), power (maximize quality)

cli_routing:
  code_generation:   { primary: codex,  budget: gemini, power: claude }
  code_review:       { primary: claude, budget: codex,  power: claude }
  debugging:         { primary: claude, budget: gemini, power: claude }
  refactoring:       { primary: codex,  budget: codex,  power: claude }
  architecture:      { primary: claude, budget: claude, power: claude }
  testing:           { primary: codex,  budget: codex,  power: claude }
  long_doc_analysis: { primary: gemini, budget: gemini, power: gemini }
  frontend:          { primary: gemini, budget: gemini, power: claude }
  backend:           { primary: codex,  budget: codex,  power: claude }
  security:          { primary: claude, budget: claude, power: claude }
  research:          { primary: gemini, budget: gemini, power: gemini }

# Pipeline templates — pre-defined multi-phase workflows
pipeline_templates:
  code_generation:
    - { id: plan,      cli: claude, role: "Plan architecture and design" }
    - { id: implement, cli: codex,  role: "Implement the design" }
    - { id: review,    cli: claude, role: "Review implementation quality" }
  debugging:
    - { id: diagnose,  cli: claude, role: "Diagnose the root cause" }
    - { id: fix,       cli: claude, role: "Implement the fix" }
    - { id: test,      cli: codex,  role: "Write and run tests" }
  code_review:
    - { id: claude-review, cli: claude, role: "Review for quality and logic" }
    - { id: codex-review,  cli: codex,  role: "Review for reliability" }
  refactoring:
    - { id: refactor,  cli: codex,  role: "Execute the refactoring" }
    - { id: review,    cli: claude, role: "Review the changes" }
  security:
    - { id: claude-audit, cli: claude, role: "Security audit perspective 1" }
    - { id: codex-audit,  cli: codex,  role: "Security audit perspective 2" }
  architecture:
    - { id: design,    cli: claude, role: "High-level architecture design" }
    - { id: detail,    cli: claude, role: "Detailed component design" }

# Bilingual keyword mapping for task category detection
category_keywords:
  code_generation: [build, create, implement, write, "add feature", "new feature", generate, 建立, 建置, 實作, 寫, 開發, 產生, 新增]
  code_review: [review, check, audit, inspect, PR, "pull request", 審查, 檢查, 看一下]
  debugging: [fix, bug, error, broken, "not working", crash, debug, 修, 修復, 修正, 錯誤, 壞了, 除錯]
  refactoring: [refactor, "clean up", restructure, optimize, reorganize, 重構, 整理, 優化, 簡化, 重新架構]
  architecture: [design, plan, architect, "system design", architecture, 設計, 規劃, 架構]
  testing: [test, spec, coverage, TDD, "unit test", e2e, 測試, 測試覆蓋, 單元測試, 整合測試]
  long_doc_analysis: [analyze, summarize, document, pdf, report, 分析, 摘要, 總結, 文件, 報告]
  frontend: [UI, component, React, CSS, layout, frontend, 前端, 介面, 元件, 頁面, 表單]
  backend: [API, server, database, endpoint, backend, REST, 後端, 伺服器, 資料庫]
  security: [vulnerability, XSS, "SQL injection", auth, security, 安全, 漏洞, 認證, 授權]
  research: [research, compare, investigate, explore, survey, 研究, 比較, 調查, 探索]

# ── Tier Routing — execution backend selection ──────────────────
# Three tiers: headless (subprocess), relay (local tmux pane pool), fleet (remote node)

tier_routing:
  # Signal → tier mapping (highest priority, keyword-detected)
  signals:
    gpu: fleet
    mcp: relay
    browser: relay
    multi_file: fleet

  # Category → default tier (when no signal detected)
  defaults:
    code_generation: headless
    code_review: headless
    debugging: relay
    refactoring: fleet
    architecture: headless
    testing: headless
    long_doc_analysis: headless
    frontend: relay
    backend: headless
    security: headless
    research: headless

  # Fallback chain when preferred tier is unavailable
  fallback:
    fleet: [relay, headless]
    relay: [headless]
    headless: []

# Bilingual keywords for tier signal detection
tier_keywords:
  gpu: [GPU, CUDA, RTX, Florence, "3090", 模型訓練, 推論, inference, embedding, finetune, vram]
  mcp: [MCP, skill, 技能, memvault, intelflow, capture, paper, recall, 記憶]
  browser: [Playwright, 瀏覽器, scrape, 截圖, screenshot, PWA, headless browser]
  multi_file: [重構, refactor, migration, "across modules", 全面修改, 大改, "multi-file"]
