[package]
name = "sentinel-rs"
version = "0.1.0"
edition = "2021"
description = "Workshop sentinel — Rust + SQLite rewrite of stations/sentinel"
license = "MIT"

[[bin]]
name = "sentinel-rs"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = { version = "0.7", features = ["macros"] }
tower-http = { version = "0.5", features = ["cors", "trace", "fs"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "migrate", "macros", "chrono", "uuid"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
redis = { version = "0.27", features = ["tokio-comp", "aio"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
uuid = { version = "1", features = ["v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tokio-util = { version = "0.7", features = ["rt"] }
async-stream = "0.3"
figment = { version = "0.10", features = ["yaml", "env"] }
thiserror = "1"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
dashmap = "6"
futures = "0.3"
workshop-sqlite-pool = { path = "../../libs/rust-sqlite-pool" }

[dev-dependencies]
tempfile = "3"
mockito = "1"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
