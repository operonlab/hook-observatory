<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 背景：Catppuccin Mocha base -->
  <rect width="512" height="512" rx="80" fill="#1e1e2e"/>

  <!-- 外環：CPU 儀表盤 -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#313244" stroke-width="24"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#cba6f7" stroke-width="24"
    stroke-dasharray="754 1005" stroke-linecap="round"
    transform="rotate(-90 256 256)"/>

  <!-- 內環：記憶體 -->
  <circle cx="256" cy="256" r="116" fill="none" stroke="#313244" stroke-width="18"/>
  <circle cx="256" cy="256" r="116" fill="none" stroke="#89b4fa" stroke-width="18"
    stroke-dasharray="510 729" stroke-linecap="round"
    transform="rotate(-90 256 256)"/>

  <!-- 中心脈搏點 -->
  <circle cx="256" cy="256" r="32" fill="#a6e3a1" opacity="0.9"/>
  <circle cx="256" cy="256" r="16" fill="#1e1e2e"/>

  <!-- 刻度線 (12 點) -->
  <g stroke="#45475a" stroke-width="3" opacity="0.6">
    <line x1="256" y1="76" x2="256" y2="90"/>
    <line x1="346" y1="103" x2="339" y2="115"/>
    <line x1="409" y1="166" x2="397" y2="173"/>
    <line x1="436" y1="256" x2="422" y2="256"/>
    <line x1="409" y1="346" x2="397" y2="339"/>
    <line x1="346" y1="409" x2="339" y2="397"/>
    <line x1="256" y1="436" x2="256" y2="422"/>
    <line x1="166" y1="409" x2="173" y2="397"/>
    <line x1="103" y1="346" x2="115" y2="339"/>
    <line x1="76" y1="256" x2="90" y2="256"/>
    <line x1="103" y1="166" x2="115" y2="173"/>
    <line x1="166" y1="103" x2="173" y2="115"/>
  </g>
</svg>
