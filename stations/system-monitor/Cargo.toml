[package]
name = "system-monitor"
version = "0.1.0"
edition = "2021"
rust-version = "1.80"
description = "Workshop system-monitor — host resource & process monitor (sysinfo + axum)"

[[bin]]
name = "system-monitor"
path = "src/main.rs"

[lib]
name = "system_monitor"
path = "src/lib.rs"

[dependencies]
workshop-log = { path = "../../libs/workshop-log-rs" }
# HTTP / async
axum = { version = "0.7", features = ["macros"] }
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
async-stream = "0.3"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "fs", "trace"] }
futures-core = "0.3"
futures-util = "0.3"

# System collection
sysinfo = "0.32"
sysctl = "0.6"
battery = "0.7"
nix = { version = "0.31", features = ["signal", "process"] }
walkdir = "2"
plist = "1"

# HTTP client (reporter LLM, healthcheck)
reqwest = { version = "0.12", features = ["json", "rustls-tls", "stream"], default-features = false }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Templates
askama = { version = "0.12", features = ["with-axum"] }
askama_axum = "0.4"

# Logging / errors
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
thiserror = "1"

# Time / utils
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
regex = "1"
once_cell = "1"

# Redis pub/sub for notifier
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"] }

# Workshop shared crates
workshop-port-registry = { path = "../../libs/port-registry" }

[dev-dependencies]
tokio-test = "0.4"
wiremock = "0.6"
pretty_assertions = "1"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = "symbols"
