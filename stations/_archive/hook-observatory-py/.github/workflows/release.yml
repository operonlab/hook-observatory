name: Release Installer

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: dmg
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact: dmg
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        working-directory: installer
        run: pnpm install

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: installer
          tagName: ${{ github.ref_name }}
          releaseName: "Hook Observatory Installer ${{ github.ref_name }}"
          releaseBody: |
            ## Hook Observatory Installer ${{ github.ref_name }}

            ### Downloads
            - **macOS (Apple Silicon)**: `.dmg` (aarch64)
            - **macOS (Intel)**: `.dmg` (x86_64)
            - **Windows**: `.exe` (x86_64)

            ### Installation
            Download the installer for your platform and run it. The installer will:
            1. Check dependencies (Python 3.12+, Claude Code, git)
            2. Let you choose which safety hooks to enable
            3. Configure tool paths
            4. Install hooks into Claude Code

            Restart Claude Code after installation.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
