<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- 背景：Catppuccin Mocha base -->
  <rect width="192" height="192" rx="32" fill="#1e1e2e"/>

  <!-- 外環：CPU 儀表盤 -->
  <circle cx="96" cy="96" r="60" fill="none" stroke="#313244" stroke-width="10"/>
  <circle cx="96" cy="96" r="60" fill="none" stroke="#cba6f7" stroke-width="10"
    stroke-dasharray="283 377" stroke-linecap="round"
    transform="rotate(-90 96 96)"/>

  <!-- 內環：記憶體 -->
  <circle cx="96" cy="96" r="44" fill="none" stroke="#313244" stroke-width="8"/>
  <circle cx="96" cy="96" r="44" fill="none" stroke="#89b4fa" stroke-width="8"
    stroke-dasharray="193 276" stroke-linecap="round"
    transform="rotate(-90 96 96)"/>

  <!-- 中心脈搏點 -->
  <circle cx="96" cy="96" r="12" fill="#a6e3a1" opacity="0.9"/>
  <circle cx="96" cy="96" r="6" fill="#1e1e2e"/>
</svg>
