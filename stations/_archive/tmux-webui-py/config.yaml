host: "127.0.0.1"
port: 9527
poll_interval: 0.4
metrics_interval: 5.0
capture_lines: 150
theme: "catppuccin-mocha"

# Quick Actions — always visible, absolute essentials
quick_actions:
  - { label: "Esc", key: "Escape" }
  - { label: "Tab", key: "Tab" }
  - { label: "C-c", key: "C-c" }
  - { label: "Enter", key: "Enter" }

# Extra Keys — toggleable second row
# Modifiers use FSM: tap=armed(3s), double-tap=locked
# Shell chars: only ones hard to reach on mobile keyboard
extra_keys:
  modifiers: ["Ctrl", "Alt", "Cmd"]
  controls: ["C-d", "C-z", "C-l", "⇧Tab"]
  shell_chars: ["|", "~", "`", "\\"]
