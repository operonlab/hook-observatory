[project]
name = "session-channel"
version = "0.2.0"
description = "Cross-pane, cross-CLI pub-sub bus over tmux + Redis Streams"
readme = "README.md"
license = { text = "MIT" }
authors = [
    { name = "Jones Hong" },
]
requires-python = ">=3.12"
keywords = [
    "tmux",
    "redis-streams",
    "pubsub",
    "agent-orchestration",
    "multi-cli",
    "claude-code",
    "codex",
    "gemini",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: MacOS :: MacOS X",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Distributed Computing",
]
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "redis[hiredis]>=5.0.0",
    "itsdangerous>=2.2.0",
    "jinja2>=3.1.0",
    "immutables>=0.20",
    "prometheus-client>=0.25.0",
    "httpx>=0.28.1",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "fakeredis>=2.20",
    "freezegun>=1.4",
    "ruff>=0.7",
]

[project.urls]
Homepage = "https://github.com/operonlab/session-channel"
Issues = "https://github.com/operonlab/session-channel/issues"
Repository = "https://github.com/operonlab/session-channel"

[project.scripts]
channel = "cli.channel:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["cli", "wrappers", "scripts"]
include = [
    "main.py",
    "config.py",
    "config.yaml",
    "routes.py",
    "store.py",
    "auth.py",
    "templates/*",
]
