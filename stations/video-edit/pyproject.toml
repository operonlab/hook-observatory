[project]
name = "video-edit"
version = "0.1.0"
description = "Video Edit — MLT-based non-linear video editing station"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "pydantic>=2.10",
    "pydantic-settings>=2.7",
    "httpx>=0.28",
    "structlog>=24.4",
    "click>=8.1",
    "lxml>=5.0",
]

[project.scripts]
video-edit = "video_edit.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/video_edit"]

[tool.ruff]
target-version = "py312"
line-length = 100
