<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Hook Observatory</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="icon-192.svg" />
    <link rel="apple-touch-icon" href="icon-192.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-surface-0 text-white antialiased" style="font-family: 'Inter', sans-serif">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Service Worker 註冊
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js").then((reg) => {
            if (Notification.permission === "granted") {
              (async () => {
                try {
                  const existing = await reg.pushManager.getSubscription();
                  if (existing) return;
                  const res = await fetch("/v2/api/notification/vapid-key");
                  if (!res.ok) return;
                  const { public_key } = await res.json();
                  const padding = "=".repeat((4 - public_key.length % 4) % 4);
                  const raw = atob((public_key + padding).replace(/-/g, "+").replace(/_/g, "/"));
                  const key = new Uint8Array([...raw].map(c => c.charCodeAt(0)));
                  const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: key });
                  const j = sub.toJSON();
                  await fetch("/v2/api/notification/subscriptions", {
                    method: "POST", credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ endpoint: sub.endpoint, keys: { p256dh: j.keys.p256dh, auth: j.keys.auth }, app_scope: "/v2/apps/hook/" }),
                  });
                } catch(e) { console.warn("[Push]", e); }
              })();
            }
          }).catch((err) => {
            console.warn("SW registration failed:", err);
          });
        });
      }
    </script>
  </body>
</html>
