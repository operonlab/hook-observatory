<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="tmux">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/apps/tmux/manifest.json">
<link rel="apple-touch-icon" href="/apps/tmux/icon-192.png">
<link rel="stylesheet" href="static/css/main.css?v={{ git_hash }}">
<title>tmux Web Controller</title>
</head>
<body>
<div id="app">
  <header>
    <h1>tmux web controller</h1>
    <div class="header-controls">
      <span id="status"><span class="dot"></span> disconnected</span>
      <select id="sessions" class="session-select"><option value="">--</option></select>
      <select id="layout-select" title="Layout preset">
        <option value="2x2">2x2 Grid</option>
        <option value="4col">4 Columns</option>
        <option value="auto" selected>Auto</option>
        <option value="1+2">1 + 2</option>
        <option value="3col">3 Columns</option>
        <option value="1x1">Single</option>
      </select>
      <button class="btn btn-sm" id="reset-layout" title="Reset resize weights">reset</button>
      <button class="btn btn-sm" id="tts-toggle" onclick="window.toggleTTS()" title="TTS">&#x1F50A;</button>
    </div>
  </header>

  <div class="win-tabs" id="win-tabs"></div>
  <div id="pane-container">
    <div class="welcome">select a tmux session to connect</div>
  </div>
  <div class="tmux-status" id="tmux-status"></div>

  <!-- Mobile bottom pane tab bar -->
  <div class="mobile-pane-tabs" id="mobile-pane-tabs"></div>

  <footer>
    <div class="footer-top">
      <div class="quick-actions">
        <button type="button" class="qbtn" data-key="Escape" title="Escape">Esc<span class="qico">&#x238B;</span></button>
        <button type="button" class="qbtn" data-key="Tab" title="Tab">Tab<span class="qico">&#x21E5;</span></button>
        <button type="button" class="qbtn" data-key="BTab" title="Shift+Tab">&#8679;Tab<span class="qico">&#x21E4;</span></button>
        <button type="button" class="qbtn" data-key="C-c" title="Interrupt">C-c<span class="qico">&#x2303;</span></button>
        <button type="button" class="qbtn" data-key="BSpace" title="Delete">Del<span class="qico">&#x232B;</span></button>
        <button type="button" class="qbtn" data-key="Enter" title="Enter">Enter<span class="qico">&#x23CE;</span></button>
        <div class="arrow-pad arrow-pad-mini" id="quick-arrow-pad"><div class="arrow-pad-label">&#8982;</div></div>
        <button class="qbtn qbtn-ek-toggle" id="ek-toggle" title="Toggle extra keys">&#9776;</button>
      </div>
      <button class="exit-fullscreen" id="exit-fullscreen" title="Exit fullscreen">&#x26F6; exit</button>
      <span class="focused-label" id="focused-label">no pane</span>
    </div>
    <div class="extra-keys" id="extra-keys">
      <!-- Row 1: Modifiers (FSM: tap=armed, double-tap=locked) -->
      <button class="ek mod" data-mod="C" title="Ctrl (tap=once, double-tap=lock)">Ctrl</button>
      <button class="ek mod" data-mod="M" title="Alt/Option">Alt</button>
      <button class="ek mod" data-mod="S" title="Cmd/Super">Cmd</button>
      <div class="ek-sep"></div>
      <!-- Row 2: Control shortcuts -->
      <button class="ek" data-ctrl="d" title="Ctrl+D (EOF/exit)" style="color:var(--red)">C-d</button>
      <button class="ek" data-ctrl="z" title="Ctrl+Z (suspend)" style="color:var(--cyan)">C-z</button>
      <button class="ek" data-ctrl="l" title="Ctrl+L (clear)" style="color:var(--green)">C-l</button>
      <button class="ek" data-ek="BTab" title="Shift+Tab">⇧Tab</button>
      <div class="ek-sep"></div>
      <!-- Row 3: Shell chars (only ones hard to reach on mobile keyboard) -->
      <button class="ek" data-ek="|">|</button>
      <button class="ek" data-ek="~">~</button>
      <button class="ek" data-ek="`">`</button>
      <button class="ek" data-ek="\">\</button>
      <div class="ek-sep"></div>
      <!-- Arrow pad (swipe) -->
      <div class="arrow-pad" id="arrow-pad"><div class="arrow-pad-label">&#8982;</div></div>
    </div>
    <div class="ac-wrap">
      <div class="ac-list" id="ac-list"></div>
      <div class="input-row">
        <input type="file" id="file-input" accept="image/*,application/pdf,text/*,.json,.csv,.log,.md,.py,.js,.ts,.sh" multiple hidden>
        <button class="upload-btn" id="upload-btn" title="Upload file" disabled>&#x1F4CE;</button>
        <button class="relay-toggle" id="relay-toggle" title="Auto-Relay: OFF">&#x21C4;</button>
        <textarea id="input" rows="1" placeholder="Type a message..." disabled></textarea>
        <button id="send-btn" disabled>Send</button>
      </div>
    </div>
  </footer>
</div>

<!-- TTS indicator (toast) -->
<div class="tts-indicator" id="tts-indicator"></div>

<!-- Gesture feedback indicator -->
<div class="gesture-indicator" id="gesture-indicator"></div>

<!-- JS modules (order matters: terminal first, then keys, then others, app last) -->
<script src="static/js/terminal.js?v={{ git_hash }}"></script>
<script src="static/js/metrics.js?v={{ git_hash }}"></script>
<script src="static/js/app.js?v={{ git_hash }}"></script>
<script src="static/js/keys.js?v={{ git_hash }}"></script>
<script src="static/js/autocomplete.js?v={{ git_hash }}"></script>
<script src="static/js/gestures.js?v={{ git_hash }}"></script>
<script>
if('serviceWorker' in navigator){
  // Auto-reload when a new SW takes control (cache busted)
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshing) return;
    refreshing = true;
    location.reload();
  });
  navigator.serviceWorker.register('sw.js').then((reg) => {
    // Force update check on load — ensures new SW is detected quickly
    reg.update();
    reg.addEventListener('updatefound', () => {
      const nw = reg.installing;
      if (nw) nw.addEventListener('statechange', () => {
        if (nw.state === 'activated' && navigator.serviceWorker.controller) location.reload();
      });
    });
    if (Notification.permission === 'granted') {
      (async () => {
        try {
          const existing = await reg.pushManager.getSubscription();
          if (existing) return;
          const res = await fetch('/api/notification/vapid-key');
          if (!res.ok) return;
          const { public_key } = await res.json();
          const padding = '='.repeat((4 - public_key.length % 4) % 4);
          const raw = atob((public_key + padding).replace(/-/g, '+').replace(/_/g, '/'));
          const key = new Uint8Array([...raw].map(c => c.charCodeAt(0)));
          const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: key });
          const j = sub.toJSON();
          await fetch('/api/notification/subscriptions', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ endpoint: sub.endpoint, keys: { p256dh: j.keys.p256dh, auth: j.keys.auth }, app_scope: '/apps/tmux/' }),
          });
        } catch(e) { console.warn('[Push]', e); }
      })();
    }
  });
}
</script>
</body>
</html>
