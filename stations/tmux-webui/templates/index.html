<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/v2/apps/tmux/manifest.json">
<link rel="apple-touch-icon" href="/v2/apps/tmux/icon-192.svg">
<link rel="stylesheet" href="static/css/main.css?v=2">
<title>tmux Web Controller</title>
</head>
<body>
<div id="app">
  <header>
    <h1>tmux web controller</h1>
    <div class="header-controls">
      <span id="status"><span class="dot"></span> disconnected</span>
      <select id="sessions" class="session-select"><option value="">--</option></select>
      <select id="layout-select" title="Layout preset">
        <option value="2x2">2x2 Grid</option>
        <option value="4col">4 Columns</option>
        <option value="auto" selected>Auto</option>
        <option value="1+2">1 + 2</option>
        <option value="3col">3 Columns</option>
        <option value="1x1">Single</option>
      </select>
      <button class="btn btn-sm" id="reset-layout" title="Reset resize weights">reset</button>
    </div>
  </header>

  <div class="win-tabs" id="win-tabs"></div>
  <div id="pane-container">
    <div class="welcome">select a tmux session to connect</div>
  </div>
  <div class="tmux-status" id="tmux-status"></div>

  <!-- Mobile bottom pane tab bar -->
  <div class="mobile-pane-tabs" id="mobile-pane-tabs"></div>

  <footer>
    <div class="footer-top">
      <div class="quick-actions">
        <button class="qbtn" data-key="Escape" title="Escape">Esc<span class="qico">&#x238B;</span></button>
        <button class="qbtn" data-key="Tab" title="Tab">Tab<span class="qico">&#x21E5;</span></button>
        <button class="qbtn" data-key="BTab" title="Shift+Tab">&#8679;Tab<span class="qico">&#x21E4;</span></button>
        <button class="qbtn" data-key="C-c" title="Interrupt">C-c<span class="qico">&#x2303;</span></button>
        <button class="qbtn" data-key="DC" title="Delete">Del<span class="qico">&#x232B;</span></button>
        <button class="qbtn" data-key="Enter" title="Enter">Enter<span class="qico">&#x23CE;</span></button>
        <div class="arrow-pad arrow-pad-mini" id="quick-arrow-pad"><div class="arrow-pad-label">&#8982;</div></div>
        <button class="qbtn qbtn-ek-toggle" id="ek-toggle" title="Toggle extra keys">&#9776;</button>
      </div>
      <button class="exit-fullscreen" id="exit-fullscreen" title="Exit fullscreen">&#x26F6; exit</button>
      <span class="focused-label" id="focused-label">no pane</span>
    </div>
    <div class="extra-keys" id="extra-keys">
      <!-- Modifier keys -->
      <button class="ek mod" data-mod="C">&#x2303; Ctrl</button>
      <button class="ek mod" data-mod="M">&#x2325; Alt</button>
      <button class="ek mod" data-mod="S">&#x2318; Cmd</button>
      <div class="ek-sep"></div>
      <!-- Common keys -->
      <button class="ek" data-ek="Tab">Tab</button>
      <div class="ek-sep"></div>
      <!-- Dev chars (V2: added /, ., :, ;) -->
      <button class="ek" data-ek="/" style="font-size:14px">/</button>
      <button class="ek" data-ek="." style="font-size:14px">.</button>
      <button class="ek" data-ek=":" style="font-size:14px">:</button>
      <button class="ek" data-ek=";" style="font-size:14px">;</button>
      <button class="ek" data-ek="|">|</button>
      <button class="ek" data-ek="-">-</button>
      <button class="ek" data-ek="_">_</button>
      <button class="ek" data-ek="~">~</button>
      <button class="ek" data-ek="BSpace">&#9003;</button>
      <div class="ek-sep"></div>
      <!-- Ctrl combos (standalone) -->
      <button class="ek" data-ek="BTab" title="Shift+Tab" style="font-size:10px">⇧Tab</button>
      <button class="ek" data-ctrl="c" title="Ctrl+C" style="color:var(--yellow);font-size:10px">C-c</button>
      <button class="ek" data-ctrl="d" title="Ctrl+D" style="color:var(--red);font-size:10px">C-d</button>
      <button class="ek" data-ctrl="z" title="Ctrl+Z" style="color:var(--cyan);font-size:10px">C-z</button>
      <button class="ek" data-ctrl="l" title="Ctrl+L" style="color:var(--green);font-size:10px">C-l</button>
      <div class="ek-sep"></div>
      <!-- Arrow pad (swipe direction) -->
      <div class="arrow-pad" id="arrow-pad"><div class="arrow-pad-label">&#8982;</div></div>
    </div>
    <div class="ac-wrap">
      <div class="ac-list" id="ac-list"></div>
      <div class="input-row">
        <input type="file" id="file-input" accept="image/*,application/pdf,text/*,.json,.csv,.log,.md,.py,.js,.ts,.sh" hidden>
        <button class="upload-btn" id="upload-btn" title="Upload file" disabled>&#x1F4CE;</button>
        <button class="relay-toggle" id="relay-toggle" title="Auto-Relay: OFF">&#x21C4;</button>
        <textarea id="input" rows="1" placeholder="Type a message..." disabled></textarea>
        <button id="send-btn" disabled>Send</button>
      </div>
    </div>
  </footer>
</div>

<!-- Gesture feedback indicator -->
<div class="gesture-indicator" id="gesture-indicator"></div>

<!-- JS modules (order matters: terminal first, then keys, then others, app last) -->
<script src="static/js/terminal.js?v=2"></script>
<script src="static/js/metrics.js?v=2"></script>
<script src="static/js/app.js?v=2"></script>
<script src="static/js/keys.js?v=2"></script>
<script src="static/js/autocomplete.js?v=2"></script>
<script src="static/js/gestures.js?v=2"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}</script>
</body>
</html>
