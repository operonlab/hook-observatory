[project]
name = "session-archiver"
version = "0.1.0"
description = "Cold/hot tiered compression service for Claude Code sessions"
requires-python = ">=3.12"
dependencies = [
    "structlog>=24.0",
    "pydantic>=2.10",
    "psycopg[binary]>=3.2",
    "zstandard>=0.23",
    "httpx>=0.27",
    "boto3>=1.35",
]

[project.scripts]
session-archiver = "session_archiver.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/session_archiver"]
