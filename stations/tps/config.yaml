env_prefix: "TPS"
port: 4114
host: "127.0.0.1"

# Provider cascade (priority order)
providers:
  - name: deepl
    priority: 1
    enabled: true
  - name: google
    priority: 2
    enabled: true

# Daily budget (USD) — tracked via Redis counter
daily_budget_usd: 5.0

# Redis cache TTL for translations (seconds) — 30 days
cache_ttl: 2592000

# Redis URL (shared workshop Redis)
redis_url: "redis://127.0.0.1:6379/0"
