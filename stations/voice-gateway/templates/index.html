<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice Center</title>
  <style>
    :root { --bg: #0a0a0a; --card: #141414; --border: #222; --text: #e0e0e0; --dim: #666; --green: #6ee7b7; --yellow: #f59e0b; --blue: #3b82f6; --purple: #a78bfa; --red: #f87171; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

    /* Header */
    .header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .header h1 { font-size: 15px; font-weight: 600; white-space: nowrap; }
    .header-controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .control-group { display: flex; gap: 4px; align-items: center; }
    .control-group .label { font-size: 10px; color: var(--dim); text-transform: uppercase; margin-right: 6px; }
    .pill { padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--dim); cursor: pointer; font-size: 11px; transition: all 0.15s; }
    .pill.active { background: #1a3a2a; color: var(--green); border-color: #2d5a3d; }
    .pill:hover { border-color: #444; }
    select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; font-size: 11px; }

    /* Status bar */
    .status-bar { display: flex; gap: 6px; padding: 10px 16px; flex-wrap: wrap; align-items: stretch; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 5px; padding: 6px 10px; min-width: 90px; }
    .stat .label { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat .val { font-size: 16px; font-weight: 600; margin-top: 1px; }
    .idle { color: var(--dim); } .listening { color: var(--yellow); } .processing { color: var(--blue); } .responding { color: var(--green); }

    /* Audio level meter */
    .meter-wrap { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 150px; }
    .meter { flex: 1; height: 18px; background: #111; border-radius: 3px; overflow: hidden; position: relative; }
    .meter-fill { height: 100%; background: var(--green); transition: width 0.1s; border-radius: 3px; }
    .meter-fill.speech { background: var(--yellow); }
    .meter-label { font-size: 10px; color: var(--dim); min-width: 40px; text-align: right; }

    /* VAD dot */
    .vad-dot { width: 10px; height: 10px; border-radius: 50%; background: #333; display: inline-block; vertical-align: middle; transition: background 0.15s; }
    .vad-dot.on { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }

    /* Waveform canvas */
    #waveform { width: 100%; height: 60px; display: block; }

    /* Tabs */
    .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 16px; }
    .tab { padding: 6px 14px; cursor: pointer; font-size: 12px; color: var(--dim); border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab.active { color: var(--text); border-bottom-color: var(--green); }
    .tab:hover { color: #aaa; }
    .tab-content { display: none; padding: 12px 16px; max-height: calc(100vh - 280px); overflow-y: auto; }
    .tab-content.active { display: block; }

    /* Log */
    .log { background: #111; border: 1px solid var(--border); border-radius: 5px; padding: 8px; font-family: 'SF Mono', 'Menlo', monospace; font-size: 11px; max-height: 250px; overflow-y: auto; }
    .log-entry { padding: 1px 0; border-bottom: 1px solid #1a1a1a; line-height: 1.4; }
    .log-entry .ts { color: #444; } .log-entry .ev { color: var(--green); }

    /* Transcript */
    .tx-entry { background: var(--card); border: 1px solid var(--border); border-radius: 5px; padding: 8px; margin-bottom: 6px; }
    .tx-entry .text { font-size: 14px; line-height: 1.4; }
    .tx-entry .text.partial { color: #888; font-style: italic; }
    .tx-entry .meta { font-size: 10px; color: var(--dim); margin-top: 4px; display: flex; gap: 10px; }
    .badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; }
    .badge-client { background: #2d2050; color: var(--purple); }
    .badge-server { background: #1a3a2a; color: var(--green); }

    /* Engine card */
    .engine { background: var(--card); border: 1px solid var(--border); border-radius: 5px; padding: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    .engine .name { font-weight: 600; }
    .engine .tag { font-size: 10px; color: var(--dim); }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
    .stats-grid .stat { text-align: center; }
    .stats-grid .val { font-size: 22px; }

    /* Info box */
    .info { font-size: 11px; color: var(--dim); background: #111; border: 1px solid var(--border); border-radius: 4px; padding: 8px; }
  </style>
</head>
<body>

<div class="header">
  <h1>Voice Center</h1>
  <div class="header-controls">
    <div class="control-group">
      <span class="label">Path</span>
      <button class="pill" data-mode="client" onclick="setMode('client')">Client</button>
      <button class="pill active" data-mode="" onclick="setMode(null)">Auto</button>
      <button class="pill" data-mode="server" onclick="setMode('server')">Server</button>
    </div>
    <div class="control-group">
      <span class="label">Mic</span>
      <select id="deviceSelect" onchange="selectDevice(this.value)"><option>Loading...</option></select>
    </div>
  </div>
</div>

<!-- Status bar -->
<div class="status-bar">
  <div class="stat"><div class="label">State</div><div class="val" id="state">--</div></div>
  <div class="stat"><div class="label">Duration</div><div class="val" id="stateDur">--</div></div>
  <div class="stat"><div class="label">Path</div><div class="val" id="path">--</div></div>
  <div class="stat"><div class="label">VAD</div><div class="val"><span class="vad-dot" id="vadDot"></span> <span id="vadLabel">--</span></div></div>
  <div class="stat"><div class="label">Events</div><div class="val" id="evtCount">0</div></div>
  <div class="stat"><div class="label">STT</div><div class="val" id="sttStat">--</div></div>
  <div class="stat meter-wrap">
    <div class="label">Level</div>
    <div class="meter"><div class="meter-fill" id="meterFill" style="width:0%"></div></div>
    <div class="meter-label" id="meterVal">-∞</div>
  </div>
</div>

<!-- Waveform -->
<canvas id="waveform"></canvas>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('pipeline',this)">Pipeline</div>
  <div class="tab" onclick="switchTab('engines',this)">STT Engines</div>
  <div class="tab" onclick="switchTab('transcript',this)">Transcript</div>
  <div class="tab" onclick="switchTab('stats',this)">Statistics</div>
</div>

<div class="tab-content active" id="tab-pipeline"><div class="log" id="log"></div></div>

<div class="tab-content" id="tab-engines"><div id="engineList"><div class="info">Loading...</div></div></div>

<div class="tab-content" id="tab-transcript"><div id="txList"><div class="info">Say the wake word to start.</div></div></div>

<div class="tab-content" id="tab-stats">
  <div class="stats-grid" id="statsGrid">
    <div class="stat"><div class="label">Transcriptions</div><div class="val" id="sTxCount">0</div></div>
    <div class="stat"><div class="label">Avg Latency</div><div class="val" id="sAvgLat">--</div></div>
    <div class="stat"><div class="label">Total Audio</div><div class="val" id="sTotalAudio">0s</div></div>
    <div class="stat"><div class="label">Transitions</div><div class="val" id="sTransitions">0</div></div>
    <div class="stat"><div class="label">Wakewords</div><div class="val" id="sWakewords">0</div></div>
    <div class="stat"><div class="label">Uptime</div><div class="val" id="sUptime">--</div></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let evtCount = 0, currentMode = null;

// ── Statistics tracking ──
const stats = { txCount: 0, totalLatency: 0, totalAudioMs: 0, wakewords: 0, startTime: Date.now() };

function updateStatsUI() {
  $('sTxCount').textContent = stats.txCount;
  $('sAvgLat').textContent = stats.txCount ? Math.round(stats.totalLatency / stats.txCount) + 'ms' : '--';
  $('sTotalAudio').textContent = (stats.totalAudioMs / 1000).toFixed(1) + 's';
  $('sWakewords').textContent = stats.wakewords;
  const up = Math.floor((Date.now() - stats.startTime) / 1000);
  $('sUptime').textContent = up < 60 ? up + 's' : Math.floor(up / 60) + 'm';
}

// ── Waveform ──
const waveCanvas = $('waveform');
const waveCtx = waveCanvas.getContext('2d');
const waveHistory = new Float32Array(300).fill(0); // ~60s at 5Hz
let waveIdx = 0;

function resizeWaveform() {
  waveCanvas.width = waveCanvas.clientWidth * (window.devicePixelRatio || 1);
  waveCanvas.height = 60 * (window.devicePixelRatio || 1);
  waveCtx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
}
resizeWaveform();
window.addEventListener('resize', resizeWaveform);

function drawWaveform() {
  const w = waveCanvas.clientWidth, h = 60;
  waveCtx.clearRect(0, 0, w, h);
  waveCtx.fillStyle = '#111';
  waveCtx.fillRect(0, 0, w, h);

  const len = waveHistory.length;
  const barW = w / len;
  for (let i = 0; i < len; i++) {
    const idx = (waveIdx + i) % len;
    const v = waveHistory[idx];
    const barH = v * h * 2; // scale: 0.5 peak = full height
    const isRecent = i > len - 10;
    waveCtx.fillStyle = v > 0.05 ? (isRecent ? '#f59e0b' : '#6ee7b744') : '#1a1a1a';
    waveCtx.fillRect(i * barW, h - barH, Math.max(barW - 0.5, 1), barH);
  }
  requestAnimationFrame(drawWaveform);
}
drawWaveform();

// ── Audio level + VAD via SSE ──
function handleAudioLevel(d) {
  const peak = d.peak || 0;
  const rmsDb = d.rms_db || -60;
  const isSpeech = d.is_speech || false;

  // Meter
  const pct = Math.min(peak * 200, 100); // 0.5 = 100%
  const fill = $('meterFill');
  fill.style.width = pct + '%';
  fill.className = 'meter-fill' + (isSpeech ? ' speech' : '');
  $('meterVal').textContent = rmsDb > -50 ? rmsDb.toFixed(0) + 'dB' : '-∞';

  // VAD dot
  $('vadDot').className = 'vad-dot' + (isSpeech ? ' on' : '');
  $('vadLabel').textContent = isSpeech ? 'speech' : 'silence';

  // Waveform history
  waveHistory[waveIdx % waveHistory.length] = peak;
  waveIdx++;
}

// ── Status polling ──
async function refreshStatus() {
  try {
    const d = await (await fetch('status')).json();
    $('state').textContent = d.state;
    $('state').className = 'val ' + d.state.toLowerCase();
    $('stateDur').textContent = d.time_in_state_s.toFixed(0) + 's';
    $('path').textContent = d.active_mode;
    $('path').style.color = d.active_mode === 'client' ? '#a78bfa' : '#6ee7b7';
    $('evtCount').textContent = d.events_published;
    $('sTransitions').textContent = d.transitions;
  } catch {}
}

async function refreshSTT() {
  try {
    const d = await (await fetch('api/stt/health')).json();
    $('sttStat').textContent = d.status === 'ok' ? 'online' : 'offline';
    $('sttStat').style.color = d.status === 'ok' ? '#6ee7b7' : '#f87171';
  } catch { $('sttStat').textContent = 'err'; }
}

async function loadEngines() {
  const el = $('engineList');
  try {
    const d = await (await fetch('api/stt/engines')).json();
    const list = d.engines || d;
    if (Array.isArray(list)) {
      el.innerHTML = list.map(e => {
        const name = typeof e === 'string' ? e : e.name;
        return `<div class="engine"><span class="name">${name}</span><span class="tag">${d.default === name ? 'default' : ''}</span></div>`;
      }).join('');
    } else { el.innerHTML = '<div class="info">' + JSON.stringify(d) + '</div>'; }
  } catch { el.innerHTML = '<div class="info">STT unreachable</div>'; }
}

async function loadDevices() {
  const sel = $('deviceSelect');
  try {
    const d = await (await fetch('api/voice/devices')).json();
    sel.innerHTML = d.devices.map(dev =>
      `<option value="${dev.index}" ${dev.is_default ? 'selected' : ''}>${dev.name} (${dev.sample_rate}Hz)</option>`
    ).join('');
  } catch { sel.innerHTML = '<option>No devices</option>'; }
}

function selectDevice(idx) {
  // TODO: implement device switching via PUT /api/voice/config
  console.log('Device selected:', idx);
}

// ── Mode switcher ──
async function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.pill[data-mode]').forEach(b => {
    b.classList.toggle('active', (b.dataset.mode || null) === (mode || ''));
  });
  await fetch('api/voice/mode', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ mode }),
  });
  refreshStatus();
}

// ── Tabs ──
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  $('tab-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'engines') loadEngines();
  if (name === 'stats') updateStatsUI();
}

// ── SSE ──
function addLog(data) {
  if (data.type === 'voice.audio.level') return; // don't flood log
  const log = $('log');
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `<span class="ts">${new Date().toLocaleTimeString()}</span> <span class="ev">${data.type}</span> ${JSON.stringify(data).slice(0, 150)}`;
  log.prepend(div);
  if (log.children.length > 80) log.lastChild.remove();
}

function addTranscript(data) {
  const list = $('txList');
  if (list.querySelector('.info')) list.innerHTML = '';
  const src = data.source_path || 'server';
  const lat = data.latency_ms ? data.latency_ms + 'ms' : '';
  const dur = data.audio_duration_ms ? (data.audio_duration_ms / 1000).toFixed(1) + 's' : '';
  const div = document.createElement('div');
  div.className = 'tx-entry';
  div.innerHTML = `<div class="text">${data.text}</div><div class="meta"><span class="badge badge-${src}">${src}</span><span>${data.engine || ''}</span><span>${lat}</span><span>${dur}</span><span>${new Date().toLocaleTimeString()}</span></div>`;
  list.prepend(div);
  if (list.children.length > 30) list.lastChild.remove();

  // Stats
  stats.txCount++;
  if (data.latency_ms) stats.totalLatency += data.latency_ms;
  if (data.audio_duration_ms) stats.totalAudioMs += data.audio_duration_ms;
}

const evtSource = new EventSource('api/voice/stream');
evtSource.onmessage = (e) => {
  const data = JSON.parse(e.data);
  if (data.type === 'heartbeat') return;
  evtCount++;

  if (data.type === 'voice.audio.level') {
    handleAudioLevel(data);
    return;
  }

  addLog(data);

  if (data.type === 'voice.state.changed') {
    $('state').textContent = data.to || '';
    $('state').className = 'val ' + (data.to || '').toLowerCase();
  }
  if (data.type === 'voice.transcript.completed' && data.text) {
    addTranscript(data);
    updateStatsUI();
  }
  if (data.type === 'voice.wakeword.detected') {
    stats.wakewords++;
  }
};

// ── Client-side KWS (sherpa-onnx WASM) ──
let clientKws = null;
let clientStream = null;
let clientAudioCtx = null;
let clientMediaStream = null;
let clientRecorder = null;
let clientActive = false;

let wasmLoaded = false;
let wasmLoading = false;

async function startClientKWS() {
  if (clientActive) return;
  if (wasmLoading) { addLog({ type: 'client.status', message: 'WASM still loading, please wait...' }); return; }

  // Load WASM module (once)
  if (!clientKws && !wasmLoaded) {
    wasmLoading = true;
    addLog({ type: 'client.status', message: 'Loading WASM KWS (~22MB)...' });
    try {
      await loadScript('static/sherpa-onnx-kws.js');

      // Emscripten Module config — must set BEFORE loading the main JS
      window.Module = {
        locateFile: (path) => 'static/' + path,
        print: (t) => console.log('[wasm]', t),
        printErr: (t) => console.warn('[wasm]', t),
      };

      await new Promise((resolve, reject) => {
        window.Module.onRuntimeInitialized = () => { wasmLoaded = true; resolve(); };
        loadScript('static/sherpa-onnx-wasm-kws-main.js').catch(reject);
        setTimeout(() => reject(new Error('WASM load timeout (60s)')), 60000);
      });

      clientKws = createKws(window.Module, {
        featConfig: { samplingRate: 16000, featureDim: 80 },
        modelConfig: {
          transducer: {
            encoder: './encoder-epoch-12-avg-2-chunk-16-left-64.onnx',
            decoder: './decoder-epoch-12-avg-2-chunk-16-left-64.onnx',
            joiner: './joiner-epoch-12-avg-2-chunk-16-left-64.onnx',
          },
          tokens: './tokens.txt',
          provider: 'cpu',
          numThreads: 1,
          debug: 0,
          modelingUnit: 'cjkchar',
        },
        maxActivePaths: 4,
        keywordsScore: 1.0,
        keywordsThreshold: 0.25,
        keywords: 'n ǐ h ǎo zh ù sh ǒu @你好助手\nh ēi zh ù sh ǒu @嘿助手',
      });
      addLog({ type: 'client.ready', message: 'WASM KWS loaded' });
    } catch (e) {
      addLog({ type: 'client.error', message: 'WASM load failed: ' + e.message });
      wasmLoading = false;
      return;
    }
    wasmLoading = false;
  }

  // Start browser microphone — use native sample rate, downsample in JS
  try {
    const rawStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
    clientAudioCtx = new AudioContext();  // native rate (usually 44100 or 48000)
    const nativeRate = clientAudioCtx.sampleRate;
    addLog({ type: 'client.mic', message: `Mic opened at ${nativeRate}Hz` });
    clientMediaStream = clientAudioCtx.createMediaStreamSource(rawStream);
    clientStream = clientKws.createStream();

    // Post-wakeword recording state
    let recording = false;
    let recordBuffer = [];
    let lastSpeechTime = 0;
    const SILENCE_THRESHOLD = 0.03;
    const SILENCE_DURATION_MS = 1500;
    const MIN_SPEECH_MS = 500;
    const MAX_RECORD_MS = 30000;

    const bufferSize = 4096;
    clientRecorder = clientAudioCtx.createScriptProcessor(bufferSize, 1, 1);
    clientRecorder.onaudioprocess = function(e) {
      const rawSamples = e.inputBuffer.getChannelData(0);
      // Downsample native rate → 16kHz
      const ratio = nativeRate / 16000;
      const outLen = Math.floor(rawSamples.length / ratio);
      const samples = new Float32Array(outLen);
      for (let i = 0; i < outLen; i++) samples[i] = rawSamples[Math.round(i * ratio)];

      const now = Date.now();
      const peak = Math.max(...samples.map(Math.abs));

      // Audio level display
      const rmsDb = 20 * Math.log10(Math.max(Math.sqrt(samples.reduce((a,b) => a+b*b, 0)/samples.length), 1e-10));
      handleAudioLevel({ peak, rms_db: rmsDb, is_speech: peak > SILENCE_THRESHOLD });

      if (recording) {
        // ── RECORDING phase: accumulate audio, detect silence ──
        recordBuffer.push(new Float32Array(samples));
        if (peak > SILENCE_THRESHOLD) lastSpeechTime = now;

        const silenceMs = now - lastSpeechTime;
        const recordMs = recordBuffer.length * (outLen / 16000) * 1000;

        if ((silenceMs > SILENCE_DURATION_MS && recordMs > MIN_SPEECH_MS) || recordMs > MAX_RECORD_MS) {
          // Speech ended — send to STT
          recording = false;
          const audioData = mergeBuffers(recordBuffer);
          recordBuffer = [];

          fetch('api/voice/events', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: 'voice.speech.captured', payload: { audio_duration_ms: Math.round(audioData.length / 16000 * 1000), source_path: 'client' } }),
          });
          addLog({ type: 'voice.speech.captured', source_path: 'client', duration: Math.round(audioData.length / 16) + 'ms' });

          // Convert to WAV and send for transcription
          const wavBlob = float32ToWav(audioData, 16000);
          sendToSTT(wavBlob);
        }
      } else {
        // ── KWS phase: detect wake word ──
        clientStream.acceptWaveform(16000, samples);
        while (clientKws.isReady(clientStream)) {
          clientKws.decode(clientStream);
          const result = clientKws.getResult(clientStream);
          if (result.keyword && result.keyword.length > 0) {
            // Wake word detected → start recording
            fetch('api/voice/events', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ type: 'voice.wakeword.detected', payload: { keyword: result.keyword, source_path: 'client', confidence: 1.0 } }),
            });
            addLog({ type: 'voice.wakeword.detected', keyword: result.keyword, source_path: 'client' });
            stats.wakewords++;
            clientKws.reset(clientStream);

            // Start recording
            recording = true;
            recordBuffer = [];
            lastSpeechTime = now;
            addLog({ type: 'client.recording', message: 'Recording speech...' });
          }
        }
      }
    };

    clientMediaStream.connect(clientRecorder);
    clientRecorder.connect(clientAudioCtx.destination);
    clientActive = true;
    addLog({ type: 'client.started', message: 'Browser KWS active — say "你好助手"' });
  } catch (e) {
    addLog({ type: 'client.error', message: 'Mic access denied: ' + e.message });
  }
}

function stopClientKWS() {
  if (!clientActive) return;
  if (clientRecorder) { clientRecorder.disconnect(); clientRecorder = null; }
  if (clientMediaStream) { clientMediaStream.disconnect(); clientMediaStream = null; }
  if (clientAudioCtx) { clientAudioCtx.close(); clientAudioCtx = null; }
  if (clientStream) { clientStream.free(); clientStream = null; }
  clientActive = false;
  addLog({ type: 'client.stopped', message: 'Browser KWS stopped' });
}

// ── Audio helpers ──
function mergeBuffers(buffers) {
  let totalLen = 0;
  for (const b of buffers) totalLen += b.length;
  const result = new Float32Array(totalLen);
  let offset = 0;
  for (const b of buffers) { result.set(b, offset); offset += b.length; }
  return result;
}

function float32ToWav(samples, sampleRate) {
  const buf = new ArrayBuffer(44 + samples.length * 2);
  const view = new DataView(buf);
  view.setUint32(0, 0x46464952, true);  // RIFF
  view.setUint32(4, 36 + samples.length * 2, true);
  view.setUint32(8, 0x45564157, true);  // WAVE
  view.setUint32(12, 0x20746d66, true); // fmt
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);          // PCM
  view.setUint16(22, 1, true);          // mono
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  view.setUint32(36, 0x61746164, true); // data
  view.setUint32(40, samples.length * 2, true);
  for (let i = 0; i < samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(44 + i * 2, s * 32767, true);
  }
  return new Blob([view], { type: 'audio/wav' });
}

async function sendToSTT(wavBlob) {
  addLog({ type: 'client.stt', message: 'Sending to STT...' });
  try {
    const r = await fetch('api/voice/transcribe', { method: 'POST', body: wavBlob });
    const result = await r.json();
    const text = (result.text || '').trim();
    if (text) {
      addLog({ type: 'voice.transcript.completed', text, source_path: 'client', engine: result.engine });
      addTranscript({ text, source_path: 'client', engine: result.engine, latency_ms: result.latency_ms, audio_duration_ms: result.audio_duration_ms });
      stats.txCount++;
      if (result.latency_ms) stats.totalLatency += result.latency_ms;
      if (result.audio_duration_ms) stats.totalAudioMs += result.audio_duration_ms;
      updateStatsUI();
    } else {
      addLog({ type: 'client.stt', message: 'No speech detected: ' + JSON.stringify(result) });
    }
  } catch (e) {
    addLog({ type: 'client.error', message: 'STT failed: ' + e.message });
  }
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

// Override setMode to start/stop client KWS
const _origSetMode = setMode;
setMode = async function(mode) {
  await _origSetMode(mode);
  if (mode === 'client') {
    startClientKWS();
  } else {
    stopClientKWS();
  }
};

// ── Init ──
refreshStatus();
refreshSTT();
loadDevices();
setInterval(refreshStatus, 5000);
setInterval(refreshSTT, 15000);
setInterval(updateStatsUI, 10000);
