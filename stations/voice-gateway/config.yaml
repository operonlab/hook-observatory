port: 4113
host: "127.0.0.1"
language: "zh-TW"
keywords:
  - "你好助手"
  - "嘿助手"
  - "hey assistant"
sensitivity: 0.5

# Server pipeline (Path B)
server:
  enabled: true
  sample_rate: 16000
  chunk_ms: 30
  vad_model: "models/silero_vad.onnx"
  vad_threshold: 0.5
  kws_model_dir: "models/sherpa-onnx-kws-zipformer-wenetspeech-3.3M-2024-01-01"
  stt_ws_url: "ws://127.0.0.1:4108/transcribe/stream"
  stt_engine: "mlx-whisper"

# Client config (Path A, served via GET /api/voice/config)
client:
  whisper_model: "tiny"
  webgpu_preferred: true

# Redis
redis_url: "redis://127.0.0.1:6379/0"
stream_prefix: "ws:voice:"

# State machine timeouts
listening_timeout_s: 10.0
processing_silence_s: 1.5
processing_timeout_s: 30.0
responding_timeout_s: 15.0
min_speech_for_stt_s: 0.5
