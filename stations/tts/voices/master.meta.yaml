# Voice meta — Schema v2 (2026-05-20)
# 升級重點：
#   - 結構化分類 tag（language / gender / style / age_range / author）
#   - processed[] 記錄 audio-ops 處理紀錄
#   - variants[] 列出多個 sample-rate 版本與對應 engine 偏好
#   - 與物理路徑解耦：voice_id 是邏輯名，CLI 用 --voice=master 不變

voice_id: master
display_name: 少爺
author: Jones Hong
recorded_at: ~2026-05-17

# ─── classification tags ───
language: zh-TW
gender: male
style: [conversational, technical]
age_range: 30-40

# ─── source ───
source:
  raw: outputs/tts-finetune-test/v3/ref/master_ref.m4a
  intermediate_refs:
    - outputs/tts-finetune-test/v3/ref/master_ref_16k.wav    # 23.8s 完整版
    - outputs/tts-finetune-test/v3/ref/master_ref_5s_22k.wav
    - outputs/tts-finetune-test/v3/ref/master_ref_8s_16k.wav

# ─── audio-ops processing log ───
# 注意：當前 voices/master.wav 與 voices/master_16k_8s.wav 是從 source 衍生，
# 但**尚未跑過 denoise / vad_trim / normalize** 強化。
# 計畫在 Phase 3 補強後更新此欄位。
processed:
  - { op: ffmpeg_resample, params: { target_sr: 16000, channels: 1 }, applied: true }
  - { op: denoise,        params: { model: dfsmn-vad }, applied: true }
  - { op: vad_trim,       params: { threshold: 0.5, min_silence: 0.5 }, applied: true }
  - { op: normalize,      params: { target_db: -3.0 }, applied: true }

# ─── variants (不同 sample rate 給不同 engine) ───
# 注意：當前 voices/master.wav 實際是 16kHz/5s（並非舊 meta 寫的 22kHz）
variants:
  - file: master.wav
    sample_rate: 16000
    channels: 1
    duration_s: 5.0
    preferred_engines: [indextts2_base, indextts2_jmica, index_tts]
    note: 預設 voice（station list_voices 掃到的就是這個）
  - file: master_16k_8s.wav
    sample_rate: 16000
    channels: 1
    duration_s: 8.0
    preferred_engines: [indextts2_base, indextts2_jmica, vibevoice]
    note: 8 秒版本，IndexTTS-2 / VibeVoice 推薦

  - file: master_enhanced.wav
    sample_rate: 16000
    channels: 1
    duration_s: 4.18
    preferred_engines: [indextts2_base, indextts2_jmica, vibevoice, index_tts]
    note: audio-ops enhanced (highpass + afftdn + silenceremove + loudnorm)
    enhanced: true

# ─── transcript ───
# 注意：master.transcript 內容必須匹配實際 wav 的語音內容（Qwen3TTS / IndexTTS zero-shot 強依賴）
transcript_file: master.transcript

# ─── engine compatibility notes ───
notes: |
  - cosyvoice zero_shot 同語言模式可空 ref_text；cross-lingual 模式需要 ref_text
  - qwen3tts zero-shot 必填 ref_text
  - indextts2 / vibevoice / cosyvoice cross-lingual 不需要 ref_text
  - 當 ref_text 與 ref_audio 不匹配，Qwen3TTS 會輸出 garbled
  - 若需 22kHz 版本（cosyvoice_v3_native / cosyvoice_v3_vllm 偏好），
    請改用 source.intermediate_refs 中的 master_ref_5s_22k.wav，
    或於 Phase 3 跑 audio-ops 後產生 master_22k_5s.wav variant
