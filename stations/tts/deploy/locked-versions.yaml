# TTS Engine Locked Versions — strict reproducibility manifest.
#
# Philosophy: TTS upstream 更新頻率低、不一定相容。鎖死當前已驗證版本，
# 「不跟上游」— upstream 更新時手動 git diff 後決定是否 cherry-pick.
#
# 對應 INTEGRATION-PLAN.md + 少爺 2026-05-19 決策（Plan B: 2 venv group + lockfile）.
#
# Bootstrap on a fresh machine:
#   bash stations/tts/deploy/win-gpu/bootstrap-repos.sh
#   bash stations/tts/deploy/win-gpu/bootstrap-venvs.sh

version: 1
captured: "2026-05-19"
captured_from: win-gpu / WSL2 Ubuntu

# =============================================================================
# Source code repos (cloned per engine; "lab/<name>" on Windows side)
# =============================================================================
repos:
  cosyvoice:
    upstream: https://github.com/FunAudioLLM/CosyVoice.git
    pinned_commit: ace7c47f41bbd303aa6bf1ea80e6f9fbd595cd40
    pinned_date: "2026-03-16"
    target_dir_windows: "C:/Users/User/workshop/lab/cosyvoice"
    target_dir_mac: "~/workshop/lab/cosyvoice"
    patches:
      - patches/cosyvoice-length-regulator.patch
    venv: tts-trio
    notes: |
      少爺自己加了 `inference()` method 進 cosyvoice/flow/length_regulator.py
      支援 v3 token_overlap 切段推理。patch file 必 apply.

  indextts:
    upstream: https://github.com/index-tts/index-tts.git
    pinned_commit: bde7d0bdf0bd36a7d6df9783e49c696c6bcc014d
    pinned_date: "2025-10-10"
    target_dir_windows: "C:/Users/User/workshop/lab/indextts"
    target_dir_mac: null  # IndexTTS 只跑 win-gpu (uv venv lab/indextts/.venv)
    patches: []
    venv: tts-trio
    notes: |
      Windows native uv venv lab/indextts/.venv 用 Python 3.10 + transformers 4.51.3.
      base ckpt + jmica fine-tune ckpt 共用同一 source code (差別只在 checkpoint_dir).
      LFS dirty 不影響執行；少爺手動 reset 可清.

  vibevoice:
    upstream_original: https://github.com/vibevoice-community/VibeVoice.git
    upstream: https://github.com/JonesHong/VibeVoice.git  # 2026-05-19 forked 防 community fork 消失
    pinned_commit: 493b186f5b973477cadab0f93f4a5dd290cc9125
    pinned_date: "2026-01-23"
    target_dir_windows: null  # WSL 內 only
    target_dir_wsl: "/home/joneshong/VibeVoice"
    patches: []
    venv: tts-trio
    notes: |
      Original community fork (vibevoice-community/VibeVoice) 已 fork 到 JonesHong/VibeVoice.
      若 community fork 消失，bootstrap 自動拉 JonesHong fork.

# =============================================================================
# Model artifacts (HuggingFace download, not git repo)
# =============================================================================
models:
  cosyvoice_v3:
    huggingface_repo: FunAudioLLM/Fun-CosyVoice3-0.5B
    target_dir: "lab/cosyvoice/pretrained_models/Fun-CosyVoice3-0.5B"
    venv: tts-trio
    download_method: hf-cli or modelscope
    notes: 模型約 5GB；走 hf-cli download 或 modelscope.

  indextts2_base:
    huggingface_repo: IndexTeam/IndexTTS-2-Base
    target_dir: "lab/indextts/checkpoints/"
    venv: tts-trio
    contents: [config.yaml, gpt.pth, s2mel.pth, bigvgan_generator.pth, bpe.model, feat1.pt, feat2.pt, wav2vec2bert_stats.pt]

  indextts2_jmica:
    source: "Jmica fine-tune (custom dataset)"
    target_dir: "lab/indextts/checkpoints_ja/"
    venv: tts-trio
    notes: 少爺自家訓練；無公開 HF；備份保存策略需另寫.

  vibevoice_1_5b:
    huggingface_repo: microsoft/VibeVoice-1.5B
    target_dir: "/home/joneshong/vibevoice_models/VibeVoice-1.5B"
    venv: tts-trio
    notes: 在 WSL home 內，9p 共享 Mac 看不到.

  qwen3tts_0_6b_base:
    huggingface_repo: Qwen/Qwen3-TTS-12Hz-0.6B-Base
    pinned_revision: main  # FIXME: pin to specific revision once stabilized
    target_dir: "/home/joneshong/qwen3tts_models/Qwen3-TTS-12Hz-0.6B-Base"
    venv: tts-qwen3
    notes: 唯一支援韓文的 engine.

# =============================================================================
# Python venv groups (uv-managed, hardlink-shared via ~/.cache/uv)
# =============================================================================
venvs:
  tts-trio:
    path_wsl: "/home/joneshong/.venvs/cosyvoice_vllm"   # legacy 名稱，內容 = tts-trio
    python: "3.10"
    serves: [cosyvoice, indextts (WSL test only), vibevoice]
    pinned_packages:
      transformers: "==4.51.3"          # IndexTTS sweet spot + vllm 相容 + vibevoice 相容
      vllm: "==0.9.0"
      accelerate: "==1.6.0"
      torch: ">=2.4,<2.8"               # cosyvoice babbling 在 2.8+ (少爺記憶)
      opencc-python-reimplemented: "*"
      pykakasi: "*"
    notes: |
      已驗證 in production 2026-05-19；
      transformers 4.57.3 會破壞 vllm (aimv2 衝突 + IndexTTS QuantizedCacheConfig 移除).

  tts-qwen3:
    path_wsl: "/home/joneshong/.venvs/tts-qwen3"
    python: "3.10"
    serves: [qwen3tts]
    pinned_packages:
      transformers: "@git+https://github.com/huggingface/transformers.git"  # >=4.58 含 qwen3_tts
      torch: ">=2.4,<2.8"
      accelerate: "*"
      soundfile: "*"
      safetensors: "*"
    notes: |
      qwen3tts 的 model_type=qwen3_tts 需要 transformers main branch (4.58+) 才支援.
      跟 tts-trio 隔離；磁碟 uv hardlink 共用 torch/cuda，多花 200-300 MB.

  indextts-win:
    path_windows: "C:/Users/User/workshop/lab/indextts/.venv"
    python: "3.10"
    serves: [indextts2_base, indextts2_jmica]   # production path
    pinned_packages:
      transformers: "==4.51.3"
    notes: |
      Windows native uv venv，跟 WSL tts-trio 各自獨立.
      因 IndexTTS Windows 端已驗證穩定，暫不搬 WSL.
