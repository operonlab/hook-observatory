<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<title>Workshop TTS — Stream Player</title>
<style>
  body { font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
         max-width: 760px; margin: 32px auto; padding: 0 16px; color: #1c1c1e; }
  h1 { font-weight: 600; font-size: 18px; margin: 0 0 18px; }
  label { display: block; font-size: 12px; color: #6e6e73; margin: 12px 0 4px; }
  textarea, input, select, button {
    font: inherit; padding: 8px 10px; border: 1px solid #d2d2d7;
    border-radius: 6px; background: #fff; color: inherit;
  }
  textarea { width: 100%; height: 120px; resize: vertical; }
  .row { display: flex; gap: 10px; margin: 12px 0; flex-wrap: wrap; }
  .row > * { flex: 1; min-width: 110px; }
  button { background: #007aff; color: #fff; border-color: #007aff; cursor: pointer; padding: 9px 16px; }
  button:disabled { background: #c7c7cc; border-color: #c7c7cc; cursor: not-allowed; }
  button.secondary { background: #e8e8ed; color: #1c1c1e; border-color: #d2d2d7; }
  .status { background: #f5f5f7; border-radius: 8px; padding: 12px 14px; margin-top: 16px;
            font-family: ui-monospace, Menlo, monospace; font-size: 12px; white-space: pre-wrap; }
  .seg-list { display: grid; grid-template-columns: 30px 80px 1fr; gap: 4px 10px; margin-top: 8px;
              font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
  .seg-list .seg-state { font-weight: 600; }
  .seg-pending { color: #c7c7cc; }
  .seg-arrived { color: #34c759; }
  .seg-playing { color: #007aff; }
  .seg-done    { color: #6e6e73; }
  .meter { background: #e8e8ed; height: 6px; border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .meter > div { background: #007aff; height: 100%; transition: width 0.1s linear; }
</style>
</head>
<body>
<h1>Workshop TTS — SSE Stream Player</h1>

<label>Base URL (e.g. http://127.0.0.1:10201 or via Tailscale to win-gpu)</label>
<input id="base-url" value="http://127.0.0.1:10201" />

<label>Text (long paragraphs supported — server segments automatically)</label>
<textarea id="text">今天我們要聊一個很重要的話題，就是開源語音合成技術的最新進展。從去年開始，零樣本聲音克隆技術突飛猛進，現在我們只需要短短幾秒鐘的參考音訊，就可以合成出非常接近本人的聲音。這個技術背後其實非常複雜，需要結合深度神經網絡、聲學模型、以及語言模型三大部分。</textarea>

<div class="row">
  <div>
    <label>Engine</label>
    <select id="engine">
      <option value="auto" selected>auto</option>
      <option value="vibevoice">vibevoice (zh/en)</option>
      <option value="cosyvoice_v3_native">cosyvoice_v3_native</option>
      <option value="qwen3tts_gpu">qwen3tts_gpu</option>
    </select>
  </div>
  <div>
    <label>Lang</label>
    <select id="lang">
      <option value="zh" selected>zh</option>
      <option value="en">en</option>
      <option value="ja">ja</option>
      <option value="ko">ko</option>
    </select>
  </div>
  <div>
    <label>Voice</label>
    <input id="voice" value="master" />
  </div>
</div>

<div class="row">
  <button id="play-btn">Stream &amp; Play</button>
  <button id="stop-btn" class="secondary" disabled>Stop</button>
  <button id="download-btn" class="secondary" disabled>Download WAV</button>
</div>

<div class="meter"><div id="meter-bar" style="width:0"></div></div>

<div class="status" id="status">idle.</div>
<div class="seg-list" id="seg-list"></div>

<script>
const $ = (id) => document.getElementById(id);
const log = (msg) => { $('status').textContent += "\n" + msg; };
const resetLog = (msg) => { $('status').textContent = msg; };

let audioCtx = null;
let scheduledTime = 0;            // next AudioBuffer start time on the AudioContext clock
let currentBuffers = [];          // ordered AudioBuffer queue (for download)
let activeSources = [];           // currently scheduled BufferSourceNodes (for Stop)
let abortController = null;
let totalSamples = 0;
let sampleRate = 24000;
let expectedDurS = 0;

function f32ToAudioBuffer(pcm, sr) {
  const buf = audioCtx.createBuffer(1, pcm.length, sr);
  buf.copyToChannel(pcm, 0);
  return buf;
}

function bytesFromB64(b64) {
  const bin = atob(b64);
  const u8 = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return u8;
}

function scheduleBuffer(buf, atTime) {
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  src.start(atTime);
  src.onended = () => { activeSources = activeSources.filter(s => s !== src); };
  activeSources.push(src);
  return src;
}

function setSegRow(idx, state, label) {
  let row = document.querySelector(`#seg-row-${idx}`);
  if (!row) {
    const list = $('seg-list');
    const a = document.createElement('div'); a.id = `seg-row-${idx}`; a.textContent = idx;
    const b = document.createElement('div'); b.className = 'seg-state'; b.id = `seg-state-${idx}`;
    const c = document.createElement('div'); c.id = `seg-text-${idx}`;
    list.append(a, b, c);
    row = a;
  }
  const stateEl = document.querySelector(`#seg-state-${idx}`);
  const textEl = document.querySelector(`#seg-text-${idx}`);
  stateEl.textContent = state;
  stateEl.className = 'seg-state seg-' + state.toLowerCase();
  if (label !== undefined) textEl.textContent = label;
}

async function startStream() {
  if (abortController) return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  currentBuffers = []; activeSources = []; totalSamples = 0; scheduledTime = 0;
  $('seg-list').innerHTML = '';
  resetLog('connecting…');
  $('play-btn').disabled = true; $('stop-btn').disabled = false; $('download-btn').disabled = true;
  $('meter-bar').style.width = '0';

  const baseUrl = $('base-url').value.trim().replace(/\/$/, '');
  const body = JSON.stringify({
    text: $('text').value, lang: $('lang').value,
    voice_id: $('voice').value, engine: $('engine').value,
  });

  abortController = new AbortController();
  let resp;
  try {
    resp = await fetch(baseUrl + '/v2/synthesize/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body, signal: abortController.signal,
    });
  } catch (e) {
    resetLog('fetch failed: ' + e.message); cleanup(); return;
  }
  if (!resp.ok) {
    const detail = await resp.text();
    resetLog(`HTTP ${resp.status}: ${detail.slice(0, 300)}`); cleanup(); return;
  }

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';
  let eventName = null, dataBuf = '';
  let preRoll = 0, playbackStarted = false, t0 = performance.now();
  let totalSegments = 1;

  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    let nl;
    while ((nl = buf.indexOf('\n')) !== -1) {
      const line = buf.slice(0, nl).replace(/\r$/, '');
      buf = buf.slice(nl + 1);
      if (line.startsWith('event: ')) eventName = line.slice(7).trim();
      else if (line.startsWith('data: ')) dataBuf = line.slice(6);
      else if (line === '' && eventName && dataBuf) {
        const payload = JSON.parse(dataBuf);
        const wall = ((performance.now() - t0) / 1000).toFixed(2);

        if (eventName === 'meta') {
          sampleRate = payload.sample_rate;
          preRoll = payload.pre_roll_sec || 0;
          expectedDurS = payload.expected_total_dur_s || 0;
          totalSegments = payload.total_segments;
          resetLog(`[+${wall}s] meta — engine=${payload.engine} sr=${sampleRate} segs=${totalSegments} pre_roll=${preRoll}s safe_rtf=${payload.safe_rtf}`);
          (payload.seg_chunks || []).forEach((c, i) => setSegRow(i, 'pending', c.length > 50 ? c.slice(0, 50) + '…' : c));
        }
        else if (eventName === 'audio') {
          const idx = payload.chunk_idx;
          const pcmBytes = bytesFromB64(payload.audio_b64);
          const pcm = new Float32Array(pcmBytes.buffer, pcmBytes.byteOffset, pcmBytes.byteLength / 4);
          const buffer = f32ToAudioBuffer(pcm, sampleRate);
          currentBuffers.push(buffer);
          totalSamples += pcm.length;
          log(`[+${wall}s] audio[${idx}] dur=${payload.duration_s}s`);

          if (!playbackStarted && idx === 0) {
            // Hold for pre_roll then press play
            const startAt = audioCtx.currentTime + preRoll;
            log(`  → buffering pre_roll=${preRoll}s, playback at t+${(startAt - audioCtx.currentTime).toFixed(2)}s`);
            scheduledTime = startAt;
            playbackStarted = true;
          }
          // Schedule this buffer immediately after the previously scheduled tail
          const src = scheduleBuffer(buffer, scheduledTime);
          src.onended = () => setSegRow(idx, 'done');
          // Mark as playing when its start time comes
          const playWhen = scheduledTime;
          setTimeout(() => setSegRow(idx, 'playing'), Math.max(0, (playWhen - audioCtx.currentTime) * 1000));
          setSegRow(idx, 'arrived');
          scheduledTime += buffer.duration;
          updateMeter();
        }
        else if (eventName === 'done') {
          log(`[+${wall}s] done — chunks=${payload.total_chunks} total_dur=${payload.total_duration_s}s wall=${payload.wall_s}s`);
          $('download-btn').disabled = false;
        }
        else if (eventName === 'error') {
          log('error: ' + JSON.stringify(payload));
        }
        eventName = null; dataBuf = '';
      }
    }
  }
  cleanup();
}

function updateMeter() {
  if (!expectedDurS) return;
  const got = totalSamples / sampleRate;
  $('meter-bar').style.width = Math.min(100, (got / expectedDurS) * 100) + '%';
}

function stopStream() {
  if (abortController) abortController.abort();
  activeSources.forEach(s => { try { s.stop(); } catch {} });
  activeSources = [];
  cleanup();
  resetLog('stopped.');
}

function cleanup() {
  abortController = null;
  $('play-btn').disabled = false; $('stop-btn').disabled = true;
}

function downloadWav() {
  if (currentBuffers.length === 0) return;
  // Concat all buffers into one Float32Array
  const total = currentBuffers.reduce((s, b) => s + b.length, 0);
  const data = new Float32Array(total);
  let off = 0;
  for (const b of currentBuffers) { data.set(b.getChannelData(0), off); off += b.length; }
  // Build a 16-bit PCM WAV
  const sr = sampleRate;
  const blob = encodeWav(data, sr);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `tts_stream_${Date.now()}.wav`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function encodeWav(f32, sr) {
  const len = f32.length;
  const buf = new ArrayBuffer(44 + len * 2);
  const v = new DataView(buf);
  const w = (off, str) => { for (let i = 0; i < str.length; i++) v.setUint8(off + i, str.charCodeAt(i)); };
  w(0, 'RIFF'); v.setUint32(4, 36 + len * 2, true); w(8, 'WAVE');
  w(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true);
  v.setUint16(22, 1, true); v.setUint32(24, sr, true);
  v.setUint32(28, sr * 2, true); v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  w(36, 'data'); v.setUint32(40, len * 2, true);
  let off = 44;
  for (let i = 0; i < len; i++) {
    const s = Math.max(-1, Math.min(1, f32[i]));
    v.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7fff, true);
    off += 2;
  }
  return new Blob([buf], { type: 'audio/wav' });
}

$('play-btn').onclick = startStream;
$('stop-btn').onclick = stopStream;
$('download-btn').onclick = downloadWav;
</script>
</body>
</html>
