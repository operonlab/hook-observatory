[project]
name = "tts"
version = "0.3.0"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn>=0.34",
    "httpx>=0.27",
    # mlx-audio is Apple Silicon only — guard with platform marker so the
    # station venv builds on win-gpu without crashing pip resolution.
    'mlx-audio>=0.3; platform_system == "Darwin" and platform_machine == "arm64"',
    "pyyaml>=6.0",
    "pydantic>=2.0",
    "starlette>=0.40",
    "python-json-logger>=2.0,<4.0",
    "soundfile>=0.12",
    "numpy>=1.26",
    # Traditional → Simplified Chinese conversion for zh-CN voices.
    # Pure-Python build avoids C++ toolchain on arm64.
    "opencc-python-reimplemented>=0.1.7",
]
