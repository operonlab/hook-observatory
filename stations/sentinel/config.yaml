env_prefix: "SENTINEL"

port: 4101
host: "127.0.0.1"
database_url: "postgresql+asyncpg://joneshong:REDACTED@localhost/workshop"
secret_key: "change-me-in-production"
session_cookie_name: "workshop_session"
session_max_age: 604800  # 7 days
login_url: "/login"

# Spool settings
spool_dir: "/opt/homebrew/var/log/workshop/sentinel"
spool_drain_interval: 5.0
spool_batch_size: 50

# Check intervals (seconds)
check_light_interval: 30.0
check_deep_interval: 600.0
check_intervention_delay: 300.0
check_repair_timeout: 600.0

lock_dir: "/opt/homebrew/var/run/workshop/sentinel"
