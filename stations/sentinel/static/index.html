<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#08090d">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="服務哨兵">
    <meta name="description" content="Workshop 服務健康監測與即時狀態追蹤">
    <title>服務哨兵 — Workshop</title>
    <link rel="manifest" href="static/manifest.json">
    <link rel="icon" type="image/png" href="static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="static/icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/status.css">
</head>
<body>
    <div class="app">

        <!-- Header -->
        <header class="header">
            <div class="header__inner">
                <div class="header__brand">
                    <div class="header__icon-wrap">
                        <svg class="header__shield" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6l-8-4z" fill="currentColor"/>
                            <path d="M9 12l2 2 4-4" stroke="#08090d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="header__titles">
                        <h1 class="header__title">服務哨兵</h1>
                        <span class="header__subtitle">Workshop Sentinel</span>
                    </div>
                </div>
                <div class="header__meta">
                    <span class="header__update" id="last-update">更新中…</span>
                    <div class="header__pulse-wrap" id="pulse">
                        <div class="pulse-ring"></div>
                        <div class="pulse-dot"></div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Tab Bar -->
        <nav class="tab-bar">
            <button class="tab-btn active" data-tab="status">服務監控</button>
            <button class="tab-btn" data-tab="services">服務管理</button>
            <button class="tab-btn" data-tab="guardian">Guardian</button>
        </nav>

        <!-- Tab: 服務監控 -->
        <div class="tab-panel active" id="panel-status">

        <!-- Overall Banner -->
        <section class="banner-wrap anim-item" style="--i:0">
            <div id="overall-banner" class="banner banner--loading">
                <div class="banner__indicator">
                    <div class="banner__dot"></div>
                </div>
                <span class="banner__text">正在檢查系統狀態…</span>
            </div>
        </section>

        <!-- Dashboard Grid -->
        <div class="dashboard">

            <!-- Left: Services -->
            <section class="panel anim-item" style="--i:1">
                <div class="panel__header">
                    <h2 class="panel__title">服務狀態</h2>
                    <span class="panel__count mono" id="service-count"></span>
                </div>
                <div id="services-container" class="services">
                    <div class="skeleton-row"></div>
                    <div class="skeleton-row"></div>
                    <div class="skeleton-row"></div>
                    <div class="skeleton-row"></div>
                    <div class="skeleton-row"></div>
                </div>
            </section>

            <!-- Right Column -->
            <div class="right-col">

                <!-- 90-Day Uptime -->
                <section class="panel anim-item" style="--i:2">
                    <div class="panel__header">
                        <h2 class="panel__title">正常運行時間</h2>
                        <span class="panel__badge mono">90 天</span>
                    </div>
                    <div id="timelines-container" class="timelines">
                        <div class="skeleton-timeline"></div>
                    </div>
                    <div class="timeline-legend">
                        <span class="legend-item">
                            <span class="legend-dot legend-dot--operational"></span>正常
                        </span>
                        <span class="legend-item">
                            <span class="legend-dot legend-dot--degraded"></span>降級
                        </span>
                        <span class="legend-item">
                            <span class="legend-dot legend-dot--outage"></span>中斷
                        </span>
                        <span class="legend-item">
                            <span class="legend-dot legend-dot--no_data"></span>無資料
                        </span>
                    </div>
                </section>

                <!-- Recent Incidents -->
                <section class="panel anim-item" style="--i:3">
                    <div class="panel__header">
                        <h2 class="panel__title">近期事件</h2>
                    </div>
                    <div id="incidents-container">
                        <div class="empty-state">
                            <div class="empty-state__icon">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <span class="empty-state__text">目前沒有事件記錄</span>
                        </div>
                    </div>
                </section>

            </div>
        </div>

        </div><!-- /panel-status -->

        <!-- Tab: 服務管理 -->
        <div class="tab-panel" id="panel-services">
            <div class="tab-content">
                <div class="panel">
                    <div class="panel__header">
                        <h2 class="panel__title">服務管理</h2>
                        <span class="panel__count mono" id="mgmt-svc-count"></span>
                    </div>
                    <div class="svc-filter-row">
                        <div class="svc-filter" id="mgmt-cat-filter">
                            <button class="filter-btn active" data-cat="all">全部</button>
                            <button class="filter-btn" data-cat="workshop">workshop</button>
                            <button class="filter-btn" data-cat="jonathan">jonathan</button>
                            <button class="filter-btn" data-cat="pulso">pulso</button>
                            <button class="filter-btn" data-cat="infra">infra</button>
                            <button class="filter-btn" data-cat="third-party">third-party</button>
                        </div>
                        <div class="svc-filter" id="mgmt-src-filter">
                            <button class="filter-btn active" data-src="all">全部來源</button>
                            <button class="filter-btn" data-src="plist">plist</button>
                            <button class="filter-btn" data-src="launcher">launcher</button>
                            <button class="filter-btn" data-src="docker">docker</button>
                        </div>
                    </div>
                    <div class="svc-table-wrap">
                        <table class="svc-table" id="mgmt-svc-table">
                            <thead>
                                <tr>
                                    <th class="col-expand"></th>
                                    <th class="col-name">名稱</th>
                                    <th class="col-type">類型</th>
                                    <th class="col-schedule">排程</th>
                                    <th class="col-status">狀態</th>
                                    <th class="col-actions">操作</th>
                                </tr>
                            </thead>
                            <tbody id="mgmt-svc-tbody">
                                <tr><td colspan="6" class="empty-state"><span class="empty-state__text">載入中…</span></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div><!-- /panel-services -->

        <!-- Tab: Guardian -->
        <div class="tab-panel" id="panel-guardian">
            <div class="tab-content">
                <div class="panel">
                    <div class="panel__header">
                        <h2 class="panel__title">Memory Guardian 日誌</h2>
                        <button class="guardian-trigger-btn" id="guardian-trigger">手動觸發</button>
                    </div>
                    <div class="svc-table-wrap">
                        <table class="svc-table" id="guardian-table">
                            <thead>
                                <tr>
                                    <th class="col-time">時間</th>
                                    <th class="col-level">等級</th>
                                    <th class="col-pressure">壓力值</th>
                                    <th class="col-killed">終止數</th>
                                    <th class="col-freed">釋放</th>
                                    <th class="col-detail">詳情</th>
                                </tr>
                            </thead>
                            <tbody id="guardian-tbody">
                                <tr><td colspan="6" class="empty-state"><span class="empty-state__text">載入中…</span></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div><!-- /panel-guardian -->

        <!-- Footer -->
        <footer class="footer">
            <svg class="footer__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6l-8-4z" fill="currentColor" opacity="0.4"/>
            </svg>
            <span class="mono">Workshop Sentinel v0.1.0</span>
            <span class="footer__sep">·</span>
            <span class="mono" id="footer-uptime"></span>
        </footer>

    </div>

    <!-- Tooltip -->
    <div id="tooltip" class="tooltip" role="tooltip" aria-hidden="true"></div>

    <script src="static/js/status.js"></script>
</body>
</html>
