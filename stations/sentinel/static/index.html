<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0c0e14">
    <meta name="mobile-web-app-capable" content="yes">
    <title>服務哨兵 — Workshop</title>
    <link rel="manifest" href="static/manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <link rel="stylesheet" href="static/css/status.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header__inner">
                <div class="header__brand">
                    <span class="header__icon">🛡️</span>
                    <h1 class="header__title">服務哨兵</h1>
                </div>
                <div class="header__meta">
                    <span class="header__update" id="last-update">更新中…</span>
                    <span class="header__pulse" id="pulse"></span>
                </div>
            </div>
        </header>

        <!-- Overall Banner -->
        <section class="banner-wrap">
            <div id="overall-banner" class="banner banner--loading">
                <div class="banner__dot"></div>
                <span class="banner__text">正在檢查系統狀態…</span>
            </div>
        </section>

        <!-- Dashboard Grid -->
        <div class="dashboard">
            <!-- Left: Services -->
            <section class="panel">
                <div class="panel__header">
                    <h2 class="panel__title">服務狀態</h2>
                    <span class="panel__count" id="service-count"></span>
                </div>
                <div id="services-container" class="services">
                    <div class="skeleton-row"></div>
                    <div class="skeleton-row"></div>
                    <div class="skeleton-row"></div>
                    <div class="skeleton-row"></div>
                    <div class="skeleton-row"></div>
                </div>
            </section>

            <!-- Right: Timeline + Incidents -->
            <div class="right-col">
                <section class="panel">
                    <div class="panel__header">
                        <h2 class="panel__title">正常運行時間</h2>
                        <span class="panel__badge">90 天</span>
                    </div>
                    <div id="timelines-container" class="timelines">
                        <div class="skeleton-timeline"></div>
                    </div>
                    <div class="timeline-legend">
                        <span class="legend-item"><span class="legend-dot legend-dot--operational"></span>正常</span>
                        <span class="legend-item"><span class="legend-dot legend-dot--degraded"></span>降級</span>
                        <span class="legend-item"><span class="legend-dot legend-dot--outage"></span>中斷</span>
                        <span class="legend-item"><span class="legend-dot legend-dot--no_data"></span>無資料</span>
                    </div>
                </section>

                <section class="panel">
                    <div class="panel__header">
                        <h2 class="panel__title">近期事件</h2>
                    </div>
                    <div id="incidents-container">
                        <div class="empty-state">
                            <span class="empty-state__icon">✓</span>
                            <span class="empty-state__text">目前沒有事件記錄</span>
                        </div>
                    </div>
                </section>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <span>Workshop Sentinel v0.1.0</span>
            <span class="footer__sep">·</span>
            <span id="footer-uptime"></span>
        </footer>
    </div>

    <!-- Tooltip -->
    <div id="tooltip" class="tooltip"></div>

    <script src="static/js/status.js"></script>
</body>
</html>
