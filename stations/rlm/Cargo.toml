[package]
name = "rlm"
version = "0.1.0"
edition = "2021"
description = "Recursive Language Model engine — Rust implementation"

[[bin]]
name = "rlm"
path = "src/main.rs"

[dependencies]
workshop-log = { path = "../../libs/workshop-log-rs" }
tokio = { version = "1", features = ["full"] }
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
futures = "0.3"

[profile.release]
opt-level = 3
lto = true
strip = true
