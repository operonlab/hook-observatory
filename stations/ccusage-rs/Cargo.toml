[package]
name = "ccusage-rs"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "ccusage-rs"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
simd-json = "0.14"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rayon = "1.10"
ignore = "0.4"
comfy-table = "7"
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.10"
anyhow = "1"
dirs = "6"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
