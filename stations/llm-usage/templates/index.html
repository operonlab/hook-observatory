<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1e1e2e">
<title>LLM 用量儀表板</title>
<link rel="stylesheet" href="static/css/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="app">
  <header>
    <div class="header-left">
      <h1>LLM 用量儀表板</h1>
      <span class="period" id="period"></span>
    </div>
    <div class="header-right">
      <span class="updated" id="updated"></span>
      <button class="btn" id="refresh-btn" title="刷新">&#8635; 刷新</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="overview">總覽</button>
    <button class="tab" data-tab="trends">趨勢</button>
    <button class="tab" data-tab="models">模型分析</button>
  </nav>

  <!-- Tab 1: 總覽 -->
  <section class="tab-panel active" id="panel-overview">
    <div class="card-row">
      <div class="card">
        <h3>訂閱方案</h3>
        <div class="card-value" id="sub-total">&mdash;</div>
        <div class="card-detail" id="sub-list"></div>
      </div>
      <div class="card">
        <h3>API 花費</h3>
        <div class="card-value" id="api-spend">&mdash;</div>
        <div class="budget-bar-wrap">
          <div class="budget-bar" id="budget-bar"></div>
        </div>
        <div class="card-detail" id="budget-detail"></div>
      </div>
      <div class="card">
        <h3>總計</h3>
        <div class="card-value" id="total-cost">&mdash;</div>
        <div class="card-detail" id="total-split"></div>
      </div>
    </div>

    <div class="card-row">
      <div class="card wide">
        <h3>配額狀態</h3>
        <div class="quota-grid" id="quota-grid"></div>
      </div>
    </div>

    <div class="card-row">
      <div class="card wide">
        <h3>快取效率</h3>
        <div class="cache-grid" id="cache-grid"></div>
      </div>
    </div>
  </section>

  <!-- Tab 2: 趨勢 -->
  <section class="tab-panel" id="panel-trends">
    <div class="days-selector">
      <button class="day-btn" data-days="7">7d</button>
      <button class="day-btn" data-days="14">14d</button>
      <button class="day-btn active" data-days="30">30d</button>
      <button class="day-btn" data-days="90">90d</button>
    </div>
    <div class="trend-stats" id="trend-stats"></div>
    <div class="card-row">
      <div class="card chart-card">
        <h3>每日花費</h3>
        <canvas id="chart-daily"></canvas>
      </div>
      <div class="card chart-card">
        <h3>累計花費</h3>
        <canvas id="chart-cumulative"></canvas>
      </div>
    </div>
  </section>

  <!-- Tab 3: 模型分析 -->
  <section class="tab-panel" id="panel-models">
    <div class="card-row">
      <div class="card chart-card">
        <h3>模型花費 (Top 8)</h3>
        <canvas id="chart-by-model"></canvas>
      </div>
      <div class="card chart-card">
        <h3>供應商分佈</h3>
        <canvas id="chart-by-provider"></canvas>
      </div>
    </div>
    <div class="card wide">
      <h3>模型明細</h3>
      <div class="table-wrap">
        <table id="model-table">
          <thead>
            <tr>
              <th>模型</th>
              <th>供應商</th>
              <th class="num">請求數</th>
              <th class="num">輸入 Token</th>
              <th class="num">輸出 Token</th>
              <th class="num sortable" data-sort="cost">花費 &#9660;</th>
              <th class="num">快取命中</th>
            </tr>
          </thead>
          <tbody id="model-tbody"></tbody>
        </table>
      </div>
    </div>
  </section>
</div>

<script src="static/js/dashboard.js"></script>
</body>
</html>
