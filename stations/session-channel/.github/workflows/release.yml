# Release workflow — session-channel
#
# Fires on every `v*` tag push and builds pre-compiled binaries for four
# target triples, then attaches them as assets to the GitHub Release.
#
# Cross-compilation strategy for aarch64-unknown-linux-gnu:
#   We install `cross` (the Rust cross-compilation tool by cross-rs/cross)
#   rather than `taiki-e/upload-rust-binary-action` so we avoid adding an
#   unaudited third-party action. cross wraps cargo with a Docker toolchain
#   image that already has the correct gcc linker — the only extra steps are
#   `cargo install cross` and using `cross build` instead of `cargo build`.
#
# All four jobs share the same upload step (softprops/action-gh-release@v2)
# which creates the GitHub Release if it does not already exist and appends
# the tarball as an asset.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required by softprops/action-gh-release to create/update releases

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both macOS triples build on macos-14 (Apple Silicon). The x86_64
          # target is produced via Apple's native cross-compile path (rustc
          # supports darwin→darwin cross natively, no QEMU / cross-rs needed).
          # macos-13 (Intel) was dropped because GitHub-hosted Intel runners
          # routinely sit in queue for 30+ minutes on free quota.
          - target: x86_64-apple-darwin
            os: macos-14
            use_cross: false

          - target: aarch64-apple-darwin
            os: macos-14
            use_cross: false

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false

          # aarch64 Linux: native runner not available; use cross (Docker-based)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install the stable Rust toolchain with the specific cross-compilation target.
      # dtolnay/rust-toolchain is the idiomatic lightweight action for this.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache Cargo registry + compiled deps to speed up repeat tag builds.
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # Install `cross` only for the aarch64-linux target.
      # cross v0.2 ships its own Docker images with the right gcc linkers baked in.
      - name: Install cross (aarch64-linux only)
        if: matrix.use_cross == true
        run: cargo install cross --locked

      # Build all workspace binaries in release mode.
      # `--bins` compiles every [[bin]] entry in Cargo.toml (channel + channel-service).
      - name: Build binaries (cargo)
        if: matrix.use_cross == false
        run: cargo build --release --bins --target ${{ matrix.target }}

      - name: Build binaries (cross)
        if: matrix.use_cross == true
        run: cross build --release --bins --target ${{ matrix.target }}

      # Derive the tag name from the GITHUB_REF (e.g. refs/tags/v0.1.0 → v0.1.0).
      - name: Derive tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      # Bundle binaries + LICENSE + README into a single tarball plus a SHA256
      # checksum file. The checksum is required by the Homebrew tap formula
      # (operonlab/homebrew-tap) for automated version bumps.
      # Name format: session-channel-<tag>-<triple>.tar.gz
      - name: Bundle tarball
        id: bundle
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.TAG }}"
          TRIPLE="${{ matrix.target }}"
          ARCHIVE="session-channel-${TAG}-${TRIPLE}.tar.gz"
          BIN_DIR="target/${TRIPLE}/release"
          STAGE="$(mktemp -d)"
          cp "${BIN_DIR}/channel" "${BIN_DIR}/channel-service" "${STAGE}/"
          cp LICENSE README.md "${STAGE}/"
          tar -czf "${ARCHIVE}" -C "${STAGE}" .
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "CHECKSUM=${ARCHIVE}.sha256" >> "$GITHUB_OUTPUT"

      # Upload tarball + checksum as release assets. softprops/action-gh-release@v2
      # creates the Release automatically from the tag if one does not exist yet.
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.bundle.outputs.ARCHIVE }}
            ${{ steps.bundle.outputs.CHECKSUM }}
          generate_release_notes: true
          body: |
            ## Install

            ### Docker (recommended)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/operonlab/session-channel/main/docker-compose.yml -o docker-compose.yml
            echo "SESSION_CHANNEL_KEY=$(openssl rand -hex 32)" > .env
            docker compose up -d
            ```

            ### Homebrew (macOS / Linux)
            ```bash
            brew install operonlab/tap/session-channel
            ```

            ### One-line installer (any *nix)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/operonlab/session-channel/main/install.sh | bash
            ```

            ### Manual
            Download the tarball for your platform below, verify with the `.sha256`, and place `channel` + `channel-service` on your `$PATH`.

            ---
            <!-- generate_release_notes auto-appends commit log below -->

