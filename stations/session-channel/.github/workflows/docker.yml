name: Docker

# Build and publish the channel-service container image to GHCR.
#
# Triggers:
#   - On `v*` tag push: build + push as :latest, :<MAJOR>, :<MAJOR.MINOR>,
#     :<MAJOR.MINOR.PATCH>, and :sha-<short>.
#   - On `main` push: build + push as :main + :sha-<short> (sanity check
#     that the Dockerfile still builds).
#   - On workflow_dispatch: manual trigger for ad-hoc rebuilds.
#
# The image is hosted at ghcr.io/operonlab/session-channel and must be
# manually flipped to public visibility on first push (GitHub Packages
# defaults new packages to private). Same one-time step as memvault-os.

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: operonlab/session-channel

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=session-channel
            org.opencontainers.image.description=Cross-pane, cross-CLI pub-sub bus over tmux + Redis Streams
            org.opencontainers.image.source=https://github.com/operonlab/session-channel
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
