name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Syntax-check shell wrappers
        run: |
          bash -n wrappers/codex-with-channel.sh
          bash -n wrappers/gemini-with-channel.sh
          bash -n install.sh

      - name: Run pytest
        env:
          SESSION_CHANNEL_PORT: 10101
          REDIS_URL: redis://127.0.0.1:6379/0
        run: pytest tests/ -v
