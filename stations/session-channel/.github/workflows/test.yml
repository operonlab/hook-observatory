name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: cargo fmt + clippy + test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    env:
      SESSION_CHANNEL_REDIS_URL: redis://127.0.0.1:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test (default suite)
        run: cargo test --tests

      # `test_agents_active_parity` is marked #[ignore] because it reads the
      # shared `ws:channel:agents` stream and is host-pollution-prone on dev
      # boxes with live session-channel wrappers running. CI runs it
      # explicitly against the isolated Redis service container.
      - name: cargo test (ignored / parity)
        run: cargo test --tests -- --ignored --test-threads=1
