<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Session Channel</title>
<style>
  :root {
    --base: #1e1e2e; --surface: #181825; --overlay: #313244;
    --text: #cdd6f4; --subtext: #a6adc8; --blue: #89b4fa;
    --green: #a6e3a1; --peach: #fab387; --red: #f38ba8;
    --mauve: #cba6f7; --teal: #94e2d5; --yellow: #f9e2af;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--base); color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
    height: 100vh; display: flex; flex-direction: column;
  }

  /* ── Header ─────────────────────────────────── */
  header {
    background: var(--surface); padding: 8px 16px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--overlay); flex-shrink: 0;
  }
  header h1 { font-size: 14px; color: var(--blue); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.connected { background: var(--green); }
  .status-dot.disconnected { background: var(--red); }
  select, input, button {
    background: var(--overlay); color: var(--text);
    border: 1px solid var(--overlay); border-radius: 4px;
    padding: 4px 8px; font-family: inherit; font-size: 12px;
  }
  button { cursor: pointer; background: var(--blue); color: var(--base); font-weight: 600; }
  button:hover { opacity: 0.85; }
  button.secondary { background: var(--overlay); color: var(--subtext); }
  .counter { color: var(--subtext); font-size: 11px; margin-left: auto; }

  /* ── Two-column body ────────────────────────── */
  #main {
    flex: 1; display: flex; overflow: hidden;
  }

  /* ── Left: Agent timeline ──────────────────── */
  #senders-pane {
    width: 300px; flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--overlay);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #senders-pane h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--subtext); padding: 8px 12px 6px;
    border-bottom: 1px solid var(--overlay); flex-shrink: 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  #senders-pane h2 .agent-count { color: var(--blue); font-weight: 600; }
  #senders-list {
    overflow-y: auto; flex: 1; padding: 6px 8px; display: flex;
    flex-direction: column; gap: 5px;
  }
  .sender-card {
    position: relative; background: var(--overlay);
    border: 1px solid var(--overlay); border-radius: 6px;
    padding: 8px 10px 8px 16px;
    cursor: pointer; transition: background 0.15s, opacity 0.3s;
    overflow: hidden;
  }
  .sender-card:hover { background: #3a3a52; }
  .sender-card.selected { background: #2a2a44; border-color: var(--blue); }
  .sender-card.stale { opacity: 0.35; }
  .sender-card .light {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; border-radius: 6px 0 0 6px;
  }
  .sender-card .s-line1 {
    display: flex; align-items: baseline; gap: 6px; font-size: 12px;
  }
  .sender-card .s-icon { font-size: 13px; }
  .sender-card .s-name {
    font-weight: 600; color: var(--mauve);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1;
  }
  .sender-card .s-role {
    font-size: 10px; color: var(--subtext);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .sender-card .s-role.main { color: var(--blue); font-weight: 600; }
  .sender-card .s-ctx {
    font-size: 11px; font-weight: 600; tabular-nums: yes;
  }
  .sender-card .s-ctx.ok    { color: var(--green); }
  .sender-card .s-ctx.warn  { color: var(--yellow); }
  .sender-card .s-ctx.danger { color: var(--red); }
  .sender-card .s-ctx.unknown { color: var(--subtext); }
  .sender-card .s-line2 {
    font-size: 11px; color: var(--subtext); margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sender-card .s-line2 .branch { color: var(--teal); }
  .sender-card .s-line2 .cwd    { color: var(--subtext); }
  .sender-card .s-line3 {
    display: flex; justify-content: space-between; gap: 6px;
    font-size: 11px; color: var(--subtext); margin-top: 3px;
  }
  .sender-card .s-task {
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1;
  }
  .sender-card .s-time { color: var(--subtext); flex-shrink: 0; }

  /* light colours */
  .light.active   { background: var(--green); }
  .light.idle     { background: var(--yellow); }
  .light.inactive { background: #585b70; }

  /* ── Right: Message log ─────────────────────── */
  #log-pane {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  #log {
    flex: 1; overflow-y: auto; padding: 8px 16px;
  }
  .msg { padding: 3px 0; line-height: 1.5; border-left: 3px solid transparent; padding-left: 8px; }
  .msg.high { border-left-color: var(--peach); }
  .msg .time { color: var(--subtext); }
  .msg .sender { color: var(--mauve); font-weight: 600; }
  .msg .topic { color: var(--teal); }
  .msg .tag { color: var(--yellow); font-size: 11px; }
  .msg .text { color: var(--text); }

  /* ── Footer ─────────────────────────────────── */
  footer {
    background: var(--surface); padding: 8px 16px;
    display: flex; gap: 8px; border-top: 1px solid var(--overlay);
    flex-shrink: 0;
  }
  footer input { flex: 1; }
  #topic-input { width: 120px; flex: none; }
</style>
</head>
<body>
<header>
  <h1>Session Channel</h1>
  <div class="status-dot disconnected" id="status-dot" title="SSE status"></div>
  <select id="topic-filter"><option value="">All Topics</option></select>
  <button class="secondary" id="pause-btn">Pause</button>
  <span class="counter" id="counter">0 msgs</span>
</header>

<div id="main">
  <!-- Left: agent timeline -->
  <div id="senders-pane">
    <h2><span>Agents</span><span class="agent-count" id="agent-count">0</span></h2>
    <div id="senders-list"></div>
  </div>

  <!-- Right: message log -->
  <div id="log-pane">
    <div id="log"></div>
  </div>
</div>

<footer>
  <input id="topic-input" placeholder="topic" value="broadcasts">
  <input id="msg-input" placeholder="message...">
  <select id="priority-select"><option value="normal">normal</option><option value="high">high</option></select>
  <button id="send-btn">Send</button>
</footer>

<script>
(function() {
  const log        = document.getElementById('log');
  const dot        = document.getElementById('status-dot');
  const filter     = document.getElementById('topic-filter');
  const pauseBtn   = document.getElementById('pause-btn');
  const counter    = document.getElementById('counter');
  const topicInput = document.getElementById('topic-input');
  const msgInput   = document.getElementById('msg-input');
  const prioritySel= document.getElementById('priority-select');
  const sendBtn    = document.getElementById('send-btn');
  const sendersList= document.getElementById('senders-list');

  let paused = false, msgCount = 0, autoScroll = true;
  let selectedSender = null;
  const seenTopics = new Set();
  // localhost-direct dashboard: server injects <meta name="local-key">
  // so JS can auth fetch + SSE without a workshop_session cookie.
  const _metaKeyEl = document.querySelector('meta[name="local-key"]');
  const LOCAL_KEY = _metaKeyEl ? _metaKeyEl.getAttribute('content') : '';
  const FETCH_OPTS = {
    credentials: 'same-origin',
    headers: LOCAL_KEY ? { 'X-Local-Key': LOCAL_KEY } : {},
  };
  const agentCountEl = document.getElementById('agent-count');

  // agent state: Map<agentKey, { lastTs, lastText, lastTag, sender, meta, cardEl }>
  // key = "host:pane" if _meta present, else sender string
  const senderMap = new Map();

  const STALE_AFTER_MS = 5 * 60 * 1000;
  const DROP_AFTER_MS  = 30 * 60 * 1000;
  const CLI_ICON = { claude: '🔷', codex: '🔶', gemini: '💎' };

  // ── Helpers ──────────────────────────────────────────────────────────
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s == null ? '' : String(s);
    return d.innerHTML;
  }

  function relTime(ms) {
    const s = Math.floor((Date.now() - ms) / 1000);
    if (s < 60)  return s + 's';
    if (s < 3600) return Math.floor(s / 60) + 'm';
    return Math.floor(s / 3600) + 'h';
  }

  function lightClass(ms) {
    const s = (Date.now() - ms) / 1000;
    if (s < 60)  return 'active';
    if (s < 300) return 'idle';
    return 'inactive';
  }

  function ctxClass(pct) {
    if (pct == null || isNaN(pct)) return 'unknown';
    if (pct < 50) return 'ok';
    if (pct < 80) return 'warn';
    return 'danger';
  }

  function shortPane(p) {
    if (!p) return '?';
    return String(p).replace(/^pid-/, 'p').replace(/^%/, '').slice(0, 8);
  }

  function agentKey(d) {
    const m = d && d._meta;
    if (m && (m.host || m.pane)) return `${m.host || '?'}:${m.pane || '?'}`;
    return d && d.sender ? `s:${d.sender}` : '?';
  }

  // ── Agent cards ──────────────────────────────────────────────────────
  function getSenderCard(d) {
    const key = agentKey(d);
    if (senderMap.has(key)) return senderMap.get(key);
    const card = document.createElement('div');
    card.className = 'sender-card';
    card.innerHTML = `
      <div class="light inactive"></div>
      <div class="s-line1">
        <span class="s-icon">·</span>
        <span class="s-name">—</span>
        <span class="s-role"></span>
        <span class="s-ctx unknown">—</span>
      </div>
      <div class="s-line2"></div>
      <div class="s-line3">
        <span class="s-task"></span>
        <span class="s-time">—</span>
      </div>
    `;
    card.addEventListener('click', () => toggleSenderFilter(d.sender || key, card));
    const entry = {
      key, lastTs: Date.now(), lastText: '', lastTag: '',
      sender: d.sender || key, meta: null, cardEl: card,
    };
    senderMap.set(key, entry);
    sendersList.prepend(card);
    return entry;
  }

  function paintCard(entry) {
    const card = entry.cardEl;
    const m = entry.meta || {};
    const cli = (m.cli || 'claude').toLowerCase();
    const icon = CLI_ICON[cli] || '·';
    const role = m.role || '';
    const branch = m.branch || '';
    const cwd = m.cwd || '';
    const task = entry.lastText || m.task || '';
    const ctx = m.ctx_pct;
    const paneLabel = shortPane(m.pane) || entry.sender;
    const sidLabel = m.sid ? `·${m.sid.slice(0, 4)}` : '';

    card.querySelector('.s-icon').textContent = icon;
    card.querySelector('.s-name').textContent = `${paneLabel}${sidLabel}`;
    const roleEl = card.querySelector('.s-role');
    roleEl.textContent = role ? `▸ ${role}` : '';
    roleEl.className = 's-role' + (role === 'main' ? ' main' : '');

    const ctxEl = card.querySelector('.s-ctx');
    ctxEl.className = 's-ctx ' + ctxClass(ctx);
    ctxEl.textContent = (ctx == null) ? '—' : `${Math.round(parseFloat(ctx))}%`;

    const line2 = card.querySelector('.s-line2');
    line2.innerHTML = '';
    if (branch) line2.innerHTML += `<span class="branch">⎇ ${esc(branch)}</span>`;
    if (cwd)    line2.innerHTML += `${branch ? ' · ' : ''}<span class="cwd">${esc(cwd)}</span>`;
    if (!branch && !cwd) line2.textContent = entry.sender;

    card.querySelector('.s-task').textContent = task ? `➤ ${task}` : '';
    card.querySelector('.s-time').textContent = relTime(entry.lastTs);
    card.querySelector('.light').className = 'light ' + lightClass(entry.lastTs);

    const ageMs = Date.now() - entry.lastTs;
    card.classList.toggle('stale', ageMs > STALE_AFTER_MS);
  }

  function updateSenderCard(d) {
    if (d && d.tag === 'leave') {
      const k = agentKey(d);
      const e = senderMap.get(k);
      if (e) {
        try { e.cardEl.remove(); } catch (_) {}
        senderMap.delete(k);
        agentCountEl.textContent = senderMap.size;
      }
      return;
    }

    const entry = getSenderCard(d);
    // prefer event ts from server if present; fall back to client time
    const serverTs = d._meta && d._meta.ts ? d._meta.ts * 1000 : null;
    entry.lastTs   = serverTs || Date.now();
    entry.lastText = d.text || '';
    entry.lastTag  = d.tag  || '';
    entry.sender   = d.sender || entry.sender;
    if (d._meta && typeof d._meta === 'object') entry.meta = d._meta;

    paintCard(entry);
    sendersList.prepend(entry.cardEl);
    agentCountEl.textContent = senderMap.size;
  }

  function toggleSenderFilter(sender, card) {
    if (selectedSender === sender) {
      selectedSender = null;
      card.classList.remove('selected');
    } else {
      if (selectedSender) {
        senderMap.forEach((e) => e.cardEl.classList.remove('selected'));
      }
      selectedSender = sender;
      card.classList.add('selected');
    }
    rebuildLog();
  }

  // ── Tick: refresh time labels, stale, and GC dropped cards ───────────
  setInterval(() => {
    const now = Date.now();
    const drop = [];
    senderMap.forEach((entry, key) => {
      const card = entry.cardEl;
      const age = now - entry.lastTs;
      card.querySelector('.s-time').textContent = relTime(entry.lastTs);
      card.querySelector('.light').className = 'light ' + lightClass(entry.lastTs);
      card.classList.toggle('stale', age > STALE_AFTER_MS);
      if (age > DROP_AFTER_MS) drop.push(key);
    });
    drop.forEach(k => {
      const e = senderMap.get(k);
      if (e) { try { e.cardEl.remove(); } catch (_) {} senderMap.delete(k); }
    });
    if (drop.length) agentCountEl.textContent = senderMap.size;
  }, 1000);

  // ── Message buffering & log rendering ────────────────────────────────
  const allMsgs = []; // full buffer for re-render on filter change

  function msgMatchesFilter(d) {
    const topicF  = filter.value;
    const senderF = selectedSender;
    if (topicF  && d.topic  !== topicF)  return false;
    if (senderF && d.sender !== senderF) return false;
    return true;
  }

  function renderMsgEl(d) {
    const div = document.createElement('div');
    div.className = 'msg' + (d.priority === 'high' ? ' high' : '');
    const ts = new Date(d._clientTs || Date.now()).toLocaleTimeString('en-GB', { hour12: false });
    let html = `<span class="time">${ts}</span> <span class="sender">${esc(d.sender || '?')}</span> <span class="topic">[${esc(d.topic || '?')}]</span>`;
    if (d.tag) html += ` <span class="tag">#${esc(d.tag)}</span>`;
    html += ` <span class="text">${esc(d.text || '')}</span>`;
    div.innerHTML = html;
    return div;
  }

  function rebuildLog() {
    log.innerHTML = '';
    msgCount = 0;
    allMsgs.filter(msgMatchesFilter).forEach(d => {
      log.appendChild(renderMsgEl(d));
      msgCount++;
    });
    counter.textContent = msgCount + ' msgs';
    if (autoScroll) log.scrollTop = log.scrollHeight;
  }

  function handleMsg(d) {
    // ensure topic in dropdown
    if (d.topic && !seenTopics.has(d.topic)) {
      seenTopics.add(d.topic);
      const opt = document.createElement('option');
      opt.value = d.topic; opt.textContent = d.topic;
      filter.appendChild(opt);
    }
    if (paused) return;

    d._clientTs = d._clientTs || Date.now();

    // route agents-topic messages to the agent panel only (don't flood the log)
    if (d.topic === 'agents') {
      updateSenderCard(d);
      return;
    }

    allMsgs.push(d);
    if (allMsgs.length > 2000) allMsgs.splice(0, allMsgs.length - 2000);

    updateSenderCard(d);

    if (msgMatchesFilter(d)) {
      log.appendChild(renderMsgEl(d));
      msgCount++;
      counter.textContent = msgCount + ' msgs';
      if (autoScroll) log.scrollTop = log.scrollHeight;
    }
  }

  // ── SSE ──────────────────────────────────────────────────────────────
  let es = null, reconnectDelay = 1000;
  const RECONNECT_MAX = 30000;

  function connectSSE() {
    try { if (es) es.close(); } catch (_) {}
    const sseUrl = '/api/stream' + (LOCAL_KEY ? `?key=${encodeURIComponent(LOCAL_KEY)}` : '');
    es = new EventSource(sseUrl);
    es.onopen = () => {
      dot.className = 'status-dot connected';
      dot.title = 'Connected';
      reconnectDelay = 1000;
    };
    es.onerror = () => {
      dot.className = 'status-dot disconnected';
      dot.title = 'Reconnecting in ' + Math.round(reconnectDelay / 1000) + 's…';
      try { es.close(); } catch (_) {}
      setTimeout(connectSSE, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, RECONNECT_MAX);
    };
    es.onmessage = (e) => {
      try { handleMsg(JSON.parse(e.data)); } catch (err) { console.error(err); }
    };
  }

  // ── Pause ─────────────────────────────────────────────────────────────
  pauseBtn.onclick = () => {
    paused = !paused;
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
  };

  // ── Auto-scroll detection ─────────────────────────────────────────────
  log.addEventListener('scroll', () => {
    autoScroll = (log.scrollTop + log.clientHeight >= log.scrollHeight - 30);
  });

  // ── Topic filter change → rebuild log ────────────────────────────────
  filter.addEventListener('change', () => {
    rebuildLog();
  });

  // ── ESC → clear sender selection ─────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && selectedSender) {
      const prev = senderMap.get(selectedSender);
      if (prev) prev.cardEl.classList.remove('selected');
      selectedSender = null;
      rebuildLog();
    }
  });

  // ── Send ─────────────────────────────────────────────────────────────
  async function doSend() {
    const topic = topicInput.value.trim();
    const text  = msgInput.value.trim();
    if (!topic || !text) return;
    sendBtn.disabled = true;
    try {
      const sendHeaders = { 'Content-Type': 'application/json' };
      if (LOCAL_KEY) sendHeaders['X-Local-Key'] = LOCAL_KEY;
      await fetch('/api/messages', {
        method: 'POST', credentials: 'same-origin',
        headers: sendHeaders,
        body: JSON.stringify({ topic, text, sender: 'dashboard', priority: prioritySel.value }),
      });
      msgInput.value = '';
    } catch (e) { console.error(e); }
    sendBtn.disabled = false;
    msgInput.focus();
  }
  sendBtn.onclick = doSend;
  msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSend(); });

  // ── Bootstrap: load active agents + populate topic filter ───────────
  async function bootstrap() {
    // 1. seed agent cards from /api/agents/active
    try {
      const r = await fetch('/api/agents/active?within=1800', FETCH_OPTS);
      const data = await r.json();
      (data.agents || []).forEach(a => updateSenderCard(a));
    } catch (_) {}

    // 2. populate topic filter
    try {
      const r = await fetch('/api/topics', FETCH_OPTS);
      const data = await r.json();
      (data.topics || []).forEach(t => {
        if (!seenTopics.has(t.topic)) {
          seenTopics.add(t.topic);
          const opt = document.createElement('option');
          opt.value = t.topic; opt.textContent = `${t.topic} (${t.count})`;
          filter.appendChild(opt);
        }
      });
    } catch (_) {}
  }

  bootstrap();
  connectSSE();
})();
</script>
</body>
</html>
