<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Session Channel</title>
<style>
  :root {
    --base: #1e1e2e; --surface: #181825; --overlay: #313244;
    --text: #cdd6f4; --subtext: #a6adc8; --blue: #89b4fa;
    --green: #a6e3a1; --peach: #fab387; --red: #f38ba8;
    --mauve: #cba6f7; --teal: #94e2d5; --yellow: #f9e2af;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--base); color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
    height: 100vh; display: flex; flex-direction: column;
  }

  /* ── Header ─────────────────────────────────── */
  header {
    background: var(--surface); padding: 8px 16px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--overlay); flex-shrink: 0;
  }
  header h1 { font-size: 14px; color: var(--blue); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.connected { background: var(--green); }
  .status-dot.disconnected { background: var(--red); }
  select, input, button {
    background: var(--overlay); color: var(--text);
    border: 1px solid var(--overlay); border-radius: 4px;
    padding: 4px 8px; font-family: inherit; font-size: 12px;
  }
  button { cursor: pointer; background: var(--blue); color: var(--base); font-weight: 600; }
  button:hover { opacity: 0.85; }
  button.secondary { background: var(--overlay); color: var(--subtext); }
  .counter { color: var(--subtext); font-size: 11px; margin-left: auto; }

  /* ── Two-column body ────────────────────────── */
  #main {
    flex: 1; display: flex; overflow: hidden;
  }

  /* ── Left: Sender timeline ──────────────────── */
  #senders-pane {
    width: 280px; flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--overlay);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #senders-pane h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--subtext); padding: 8px 12px 6px;
    border-bottom: 1px solid var(--overlay); flex-shrink: 0;
  }
  #senders-list {
    overflow-y: auto; flex: 1; padding: 6px 8px; display: flex;
    flex-direction: column; gap: 5px;
  }
  .sender-card {
    position: relative; background: var(--overlay);
    border: 1px solid var(--overlay); border-radius: 6px;
    padding: 8px 10px 8px 16px;
    cursor: pointer; transition: background 0.15s;
    overflow: hidden;
  }
  .sender-card:hover { background: #3a3a52; }
  .sender-card.selected { background: #2a2a44; border-color: var(--blue); }
  .sender-card .light {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; border-radius: 6px 0 0 6px;
  }
  .sender-card .s-name {
    font-weight: 600; color: var(--mauve); font-size: 12px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sender-card .s-time {
    font-size: 11px; color: var(--subtext); margin-top: 2px;
  }
  .sender-card .s-preview {
    font-size: 11px; color: var(--subtext); margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sender-card .s-preview .preview-tag { color: var(--yellow); }

  /* light colours */
  .light.active   { background: var(--green); }
  .light.idle     { background: var(--yellow); }
  .light.inactive { background: #585b70; }

  /* ── Right: Message log ─────────────────────── */
  #log-pane {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  #log {
    flex: 1; overflow-y: auto; padding: 8px 16px;
  }
  .msg { padding: 3px 0; line-height: 1.5; border-left: 3px solid transparent; padding-left: 8px; }
  .msg.high { border-left-color: var(--peach); }
  .msg .time { color: var(--subtext); }
  .msg .sender { color: var(--mauve); font-weight: 600; }
  .msg .topic { color: var(--teal); }
  .msg .tag { color: var(--yellow); font-size: 11px; }
  .msg .text { color: var(--text); }

  /* ── Footer ─────────────────────────────────── */
  footer {
    background: var(--surface); padding: 8px 16px;
    display: flex; gap: 8px; border-top: 1px solid var(--overlay);
    flex-shrink: 0;
  }
  footer input { flex: 1; }
  #topic-input { width: 120px; flex: none; }
</style>
</head>
<body>
<header>
  <h1>Session Channel</h1>
  <div class="status-dot disconnected" id="status-dot" title="SSE status"></div>
  <select id="topic-filter"><option value="">All Topics</option></select>
  <button class="secondary" id="pause-btn">Pause</button>
  <span class="counter" id="counter">0 msgs</span>
</header>

<div id="main">
  <!-- Left: sender timeline -->
  <div id="senders-pane">
    <h2>Senders</h2>
    <div id="senders-list"></div>
  </div>

  <!-- Right: message log -->
  <div id="log-pane">
    <div id="log"></div>
  </div>
</div>

<footer>
  <input id="topic-input" placeholder="topic" value="broadcast">
  <input id="msg-input" placeholder="message...">
  <select id="priority-select"><option value="normal">normal</option><option value="high">high</option></select>
  <button id="send-btn">Send</button>
</footer>

<script>
(function() {
  const log        = document.getElementById('log');
  const dot        = document.getElementById('status-dot');
  const filter     = document.getElementById('topic-filter');
  const pauseBtn   = document.getElementById('pause-btn');
  const counter    = document.getElementById('counter');
  const topicInput = document.getElementById('topic-input');
  const msgInput   = document.getElementById('msg-input');
  const prioritySel= document.getElementById('priority-select');
  const sendBtn    = document.getElementById('send-btn');
  const sendersList= document.getElementById('senders-list');

  let paused = false, msgCount = 0, autoScroll = true;
  let selectedSender = null;
  const seenTopics = new Set();
  const FETCH_OPTS  = { credentials: 'same-origin' };

  // sender state: Map<senderKey, { lastTs, lastText, lastTag, cardEl }>
  const senderMap = new Map();

  // ── Helpers ──────────────────────────────────────────────────────────
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s == null ? '' : String(s);
    return d.innerHTML;
  }

  function relTime(ms) {
    const s = Math.floor((Date.now() - ms) / 1000);
    if (s < 60)  return s + 's ago';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    return Math.floor(s / 3600) + 'h ago';
  }

  function lightClass(ms) {
    const s = (Date.now() - ms) / 1000;
    if (s < 60)  return 'active';
    if (s < 300) return 'idle';
    return 'inactive';
  }

  // ── Sender cards ─────────────────────────────────────────────────────
  function getSenderCard(sender) {
    if (senderMap.has(sender)) return senderMap.get(sender);
    // create card
    const card = document.createElement('div');
    card.className = 'sender-card';
    card.innerHTML = `
      <div class="light inactive"></div>
      <div class="s-name">${esc(sender)}</div>
      <div class="s-time">—</div>
      <div class="s-preview"></div>
    `;
    card.addEventListener('click', () => toggleSenderFilter(sender, card));
    const entry = { lastTs: Date.now(), lastText: '', lastTag: '', cardEl: card };
    senderMap.set(sender, entry);
    sendersList.prepend(card);
    return entry;
  }

  function updateSenderCard(d) {
    const sender = d.sender || '?';
    const entry  = getSenderCard(sender);
    entry.lastTs   = Date.now();
    entry.lastText = d.text || '';
    entry.lastTag  = d.tag  || '';

    const card = entry.cardEl;
    card.querySelector('.s-time').textContent = relTime(entry.lastTs);
    const preview = card.querySelector('.s-preview');
    const tagPart = entry.lastTag ? `<span class="preview-tag">#${esc(entry.lastTag)}</span> ` : '';
    preview.innerHTML = tagPart + esc(entry.lastText);
    card.querySelector('.light').className = 'light ' + lightClass(entry.lastTs);

    // re-sort: bring to top
    sendersList.prepend(card);
  }

  function toggleSenderFilter(sender, card) {
    if (selectedSender === sender) {
      selectedSender = null;
      card.classList.remove('selected');
    } else {
      // deselect previous
      if (selectedSender) {
        const prev = senderMap.get(selectedSender);
        if (prev) prev.cardEl.classList.remove('selected');
      }
      selectedSender = sender;
      card.classList.add('selected');
    }
    rebuildLog();
  }

  // ── Tick: update relative times + light colours every second ─────────
  setInterval(() => {
    senderMap.forEach((entry, _sender) => {
      const card = entry.cardEl;
      card.querySelector('.s-time').textContent = relTime(entry.lastTs);
      card.querySelector('.light').className = 'light ' + lightClass(entry.lastTs);
    });
  }, 1000);

  // ── Message buffering & log rendering ────────────────────────────────
  const allMsgs = []; // full buffer for re-render on filter change

  function msgMatchesFilter(d) {
    const topicF  = filter.value;
    const senderF = selectedSender;
    if (topicF  && d.topic  !== topicF)  return false;
    if (senderF && d.sender !== senderF) return false;
    return true;
  }

  function renderMsgEl(d) {
    const div = document.createElement('div');
    div.className = 'msg' + (d.priority === 'high' ? ' high' : '');
    const ts = new Date(d._clientTs || Date.now()).toLocaleTimeString('en-GB', { hour12: false });
    let html = `<span class="time">${ts}</span> <span class="sender">${esc(d.sender || '?')}</span> <span class="topic">[${esc(d.topic || '?')}]</span>`;
    if (d.tag) html += ` <span class="tag">#${esc(d.tag)}</span>`;
    html += ` <span class="text">${esc(d.text || '')}</span>`;
    div.innerHTML = html;
    return div;
  }

  function rebuildLog() {
    log.innerHTML = '';
    msgCount = 0;
    allMsgs.filter(msgMatchesFilter).forEach(d => {
      log.appendChild(renderMsgEl(d));
      msgCount++;
    });
    counter.textContent = msgCount + ' msgs';
    if (autoScroll) log.scrollTop = log.scrollHeight;
  }

  function handleMsg(d) {
    // ensure topic in dropdown
    if (d.topic && !seenTopics.has(d.topic)) {
      seenTopics.add(d.topic);
      const opt = document.createElement('option');
      opt.value = d.topic; opt.textContent = d.topic;
      filter.appendChild(opt);
    }
    if (paused) return;

    d._clientTs = d._clientTs || Date.now();
    allMsgs.push(d);
    // keep buffer bounded
    if (allMsgs.length > 2000) allMsgs.splice(0, allMsgs.length - 2000);

    // update sender card
    updateSenderCard(d);

    // append to log if passes filter
    if (msgMatchesFilter(d)) {
      log.appendChild(renderMsgEl(d));
      msgCount++;
      counter.textContent = msgCount + ' msgs';
      if (autoScroll) log.scrollTop = log.scrollHeight;
    }
  }

  // ── SSE ──────────────────────────────────────────────────────────────
  let es = null, reconnectDelay = 1000;
  const RECONNECT_MAX = 30000;

  function connectSSE() {
    try { if (es) es.close(); } catch (_) {}
    es = new EventSource('/api/stream');
    es.onopen = () => {
      dot.className = 'status-dot connected';
      dot.title = 'Connected';
      reconnectDelay = 1000;
    };
    es.onerror = () => {
      dot.className = 'status-dot disconnected';
      dot.title = 'Reconnecting in ' + Math.round(reconnectDelay / 1000) + 's…';
      try { es.close(); } catch (_) {}
      setTimeout(connectSSE, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, RECONNECT_MAX);
    };
    es.onmessage = (e) => {
      try { handleMsg(JSON.parse(e.data)); } catch (err) { console.error(err); }
    };
  }

  // ── Pause ─────────────────────────────────────────────────────────────
  pauseBtn.onclick = () => {
    paused = !paused;
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
  };

  // ── Auto-scroll detection ─────────────────────────────────────────────
  log.addEventListener('scroll', () => {
    autoScroll = (log.scrollTop + log.clientHeight >= log.scrollHeight - 30);
  });

  // ── Topic filter change → rebuild log ────────────────────────────────
  filter.addEventListener('change', () => {
    rebuildLog();
  });

  // ── ESC → clear sender selection ─────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && selectedSender) {
      const prev = senderMap.get(selectedSender);
      if (prev) prev.cardEl.classList.remove('selected');
      selectedSender = null;
      rebuildLog();
    }
  });

  // ── Send ─────────────────────────────────────────────────────────────
  async function doSend() {
    const topic = topicInput.value.trim();
    const text  = msgInput.value.trim();
    if (!topic || !text) return;
    sendBtn.disabled = true;
    try {
      await fetch('/api/messages', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topic, text, sender: 'dashboard', priority: prioritySel.value }),
      });
      msgInput.value = '';
    } catch (e) { console.error(e); }
    sendBtn.disabled = false;
    msgInput.focus();
  }
  sendBtn.onclick = doSend;
  msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSend(); });

  // ── Bootstrap: fetch top-3 topics → seed left panel ─────────────────
  async function bootstrap() {
    try {
      const r    = await fetch('/api/topics', FETCH_OPTS);
      const data = await r.json();
      const topics = (data.topics || [])
        .sort((a, b) => (b.count || 0) - (a.count || 0))
        .slice(0, 3);

      // populate dropdown
      topics.forEach(t => {
        if (!seenTopics.has(t.topic)) {
          seenTopics.add(t.topic);
          const opt = document.createElement('option');
          opt.value = t.topic; opt.textContent = `${t.topic} (${t.count})`;
          filter.appendChild(opt);
        }
      });

      // fetch messages per topic to seed sender cards
      for (const t of topics) {
        try {
          const mr   = await fetch(`/api/messages/${encodeURIComponent(t.topic)}?count=100`, FETCH_OPTS);
          const mdata= await mr.json();
          (mdata.messages || []).forEach(m => {
            m._clientTs = Date.now();
            // only update sender cards, do NOT push to allMsgs (avoid log flood on load)
            if (m.sender) updateSenderCard(m);
          });
        } catch (_) {}
      }
    } catch (_) {}
  }

  bootstrap();
  connectSSE();
})();
</script>
</body>
</html>
