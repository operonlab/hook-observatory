port: 10101
host: "127.0.0.1"
redis_url: "redis://127.0.0.1:6379/0"
secret_key: "change-me-in-production"
session_cookie_name: "workshop_session"
session_max_age: 604800

stream_prefix: "ws:channel:"
topics_key: "ws:channel:__topics"
ttl_seconds: 1800
trim_interval: 60
max_stream_len: 500

# CORS allow_origins. The current server port is auto-appended at runtime,
# so listing it explicitly is optional. Override via env var:
#   SESSION_CHANNEL_ALLOWED_ORIGINS="https://a.example,https://b.example"
allowed_origins:
  - "http://localhost:3000"
  - "http://localhost:10101"
  - "https://workshop.joneshong.com"

# Relay pool supervisor configuration.
# supervisor.py reads this to know which pane should run which worker.
#
# To disable respawn for a pane (user wants it idle): set enabled: false,
# or touch /tmp/session-channel-supervisor-disable-<pane_id>.flag
# (e.g.  touch /tmp/session-channel-supervisor-disable-%5.flag)
relay_pool:
  # Grace period after a worker exits before supervisor will respawn it.
  # Prevents immediate re-launch when the user manually exits (Ctrl+C / /exit).
  grace_seconds: 120

  # Whether supervisor publishes its own heartbeat to channel agents topic.
  supervisor_announce: false

  workers:
    - pane_id: "%5"
      cli_type: claude
      enabled: true
    - pane_id: "%6"
      cli_type: codex
      enabled: true
    - pane_id: "%7"
      cli_type: gemini
      enabled: true
    - pane_id: "%8"
      cli_type: claude
      enabled: true
