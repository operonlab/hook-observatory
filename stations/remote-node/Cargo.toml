[package]
name = "remote-node"
version = "0.1.0"
edition = "2021"
description = "Workshop remote-node — HTTP proxy to Windows GPU server"
license = "MIT"

[[bin]]
name = "remote-node"
path = "src/main.rs"

[dependencies]
workshop-log = { path = "../../libs/workshop-log-rs" }
tokio = { version = "1", features = ["full"] }
axum = { version = "0.7", features = ["macros"] }
tower-http = { version = "0.5", features = ["trace"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
base64 = "0.22"
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
shellexpand = "3"
clap = { version = "4", features = ["derive"] }

[dev-dependencies]
wiremock = "0.6"
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
