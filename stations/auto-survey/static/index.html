<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>自動填表</title>
  <meta name="theme-color" content="#4f46e5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="static/manifest.json">
  <link rel="apple-touch-icon" href="static/icon-192.png" sizes="192x192">
  <link rel="icon" type="image/svg+xml" href="static/icon.svg">
  <link rel="stylesheet" href="static/tailwind.css">
  <style>[x-cloak]{display:none!important}</style>
</head>
<body class="bg-gray-50 min-h-screen" style="padding-top:env(safe-area-inset-top)">
<div x-data="app()" x-init="init()" x-cloak>

  <!-- ─── Header ─── -->
  <header class="sticky top-0 z-50 bg-gradient-to-r from-indigo-600 to-violet-600 text-white shadow-lg"
          style="padding-top:env(safe-area-inset-top)">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <h1 class="text-lg font-bold flex items-center gap-2">
        <img src="static/icon.svg" class="w-7 h-7 rounded-lg" alt="">
        自動填表
      </h1>
      <nav class="flex gap-1 bg-white/20 rounded-lg p-0.5">
        <button @click="switchTab('calendar')"
                :class="tab==='calendar' ? 'bg-white text-indigo-700 shadow' : 'text-white/80 hover:text-white'"
                class="px-3 py-1.5 text-sm font-medium rounded-md transition">行事曆</button>
        <button @click="switchTab('people')"
                :class="tab==='people' ? 'bg-white text-indigo-700 shadow' : 'text-white/80 hover:text-white'"
                class="px-3 py-1.5 text-sm font-medium rounded-md transition">人員管理</button>
      </nav>
    </div>
  </header>

  <!-- ═══ Calendar Tab ═══ -->
  <main x-show="tab==='calendar'" class="max-w-3xl mx-auto px-4 py-4 space-y-4">

    <!-- Month Navigation -->
    <div class="flex items-center justify-between">
      <button @click="prevMonth()" class="p-2 hover:bg-gray-200 rounded-lg transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <div class="flex items-center gap-3">
        <h2 class="text-lg font-bold" x-text="monthLabel"></h2>
        <button @click="goToToday()" class="text-xs px-2 py-1 bg-indigo-100 text-indigo-700 rounded-md hover:bg-indigo-200 transition">今天</button>
      </div>
      <button @click="nextMonth()" class="p-2 hover:bg-gray-200 rounded-lg transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>

    <!-- Calendar Grid -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="grid grid-cols-7 bg-gray-50 border-b border-gray-100">
        <template x-for="d in ['日','一','二','三','四','五','六']" :key="d">
          <div class="py-2 text-center text-xs font-medium text-gray-500" x-text="d"></div>
        </template>
      </div>
      <div class="grid grid-cols-7">
        <template x-for="(cell, i) in calendarGrid" :key="i">
          <div @click="cell && selectDay(dateStr(cell))"
               :class="{
                 'bg-indigo-600 text-white font-bold': isSelected(cell),
                 'bg-indigo-50 font-semibold text-indigo-700': isToday(cell) && !isSelected(cell),
                 'hover:bg-gray-50 cursor-pointer': cell && !isSelected(cell),
               }"
               class="relative py-2 sm:py-3 text-center text-sm transition select-none border-b border-r border-gray-50">
            <span x-text="cell || ''"></span>
            <div x-show="cell && dayStatus(cell)"
                 :class="{
                   'bg-green-500': dayStatus(cell)==='completed',
                   'bg-red-500': dayStatus(cell)==='failed',
                   'bg-blue-500 animate-pulse': dayStatus(cell)==='running',
                   'bg-gray-400': dayStatus(cell)==='pending',
                 }"
                 class="w-1.5 h-1.5 rounded-full mx-auto mt-0.5"></div>
          </div>
        </template>
      </div>
    </div>

    <!-- Legend -->
    <div class="flex flex-wrap gap-x-4 gap-y-1 justify-center text-xs text-gray-500">
      <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-500 inline-block"></span>已完成</span>
      <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-red-500 inline-block"></span>失敗</span>
      <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-blue-500 inline-block"></span>執行中</span>
      <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-gray-400 inline-block"></span>等待中</span>
    </div>

    <!-- ─── Day Detail Panel ─── -->
    <div x-show="selectedDate" x-transition.opacity class="space-y-3">

      <!-- Loading spinner -->
      <div x-show="loadingDay" class="bg-white rounded-xl shadow-sm border p-8 text-center text-gray-400">
        <svg class="animate-spin h-6 w-6 mx-auto mb-2 text-indigo-500" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>載入中...
      </div>

      <template x-if="!loadingDay && dayDetail">
        <div class="space-y-3">

          <!-- Date Header + Status -->
          <div class="bg-white rounded-xl shadow-sm border p-4">
            <div class="flex items-center justify-between mb-1">
              <h3 class="font-bold text-gray-800" x-text="formatDate(selectedDate)"></h3>
              <span x-show="dayDetail.run"
                    :class="{
                      'bg-green-100 text-green-700': dayDetail.run?.status==='completed',
                      'bg-red-100 text-red-700': dayDetail.run?.status==='failed',
                      'bg-blue-100 text-blue-700': dayDetail.run?.status==='running',
                      'bg-gray-100 text-gray-600': dayDetail.run?.status==='pending',
                    }"
                    class="px-2.5 py-1 text-xs font-medium rounded-full"
                    x-text="statusLabel(dayDetail.run?.status)"></span>
            </div>
            <p x-show="dayDetail.run?.result_summary"
               class="text-sm text-gray-600 bg-gray-50 rounded-lg px-3 py-2 mt-2"
               x-text="dayDetail.run?.result_summary"></p>
            <div x-show="dayDetail.run?.status==='running'" class="flex items-center gap-2 text-sm text-blue-600 mt-2">
              <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>管線執行中，即時更新...
            </div>
            <p x-show="!dayDetail.run && !isSelectedToday" class="text-sm text-gray-400 mt-1">當天無執行紀錄</p>
          </div>

          <!-- Start Run Form (today only) -->
          <div x-show="canStartRun" class="bg-white rounded-xl shadow-sm border p-4 space-y-3">
            <h4 class="text-sm font-semibold text-gray-700">開始今日填表</h4>
            <div class="space-y-2">
              <input x-model="attendUrl" type="url" placeholder="簽到表 URL"
                     class="w-full px-3 py-2 text-sm border rounded-lg focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
              <input x-model="quizUrl" type="url" placeholder="測驗卷 URL"
                     class="w-full px-3 py-2 text-sm border rounded-lg focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none">
            </div>
            <button @click="startRun()" :disabled="starting || (!attendUrl && !quizUrl)"
                    :class="starting || (!attendUrl && !quizUrl) ? 'bg-gray-300 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700'"
                    class="w-full text-white py-2 rounded-lg text-sm font-medium transition">
              <span x-show="!starting">開始填表</span>
              <span x-show="starting" class="inline-flex items-center gap-2">
                <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>提交中...
              </span>
            </button>
          </div>

          <!-- Submissions -->
          <div x-show="dayDetail.submissions.length > 0" class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <h4 class="px-4 py-3 text-sm font-semibold text-gray-700 border-b bg-gray-50">
              提交紀錄 <span class="text-gray-400 font-normal" x-text="'(' + dayDetail.submissions.length + ')'"></span>
            </h4>
            <!-- Desktop table -->
            <div class="hidden sm:block overflow-x-auto">
              <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-600 text-xs uppercase">
                  <tr>
                    <th class="px-4 py-2 text-left">姓名</th>
                    <th class="px-4 py-2 text-center">簽到</th>
                    <th class="px-4 py-2 text-center">測驗</th>
                    <th class="px-4 py-2 text-center">分數</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                  <template x-for="s in dayDetail.submissions" :key="s.person_name">
                    <tr class="hover:bg-gray-50">
                      <td class="px-4 py-2.5 font-medium">
                        <span x-text="s.person_name"></span>
                        <span x-show="s.is_pathfinder" class="ml-1 inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium bg-amber-100 text-amber-700">先行者</span>
                      </td>
                      <td class="px-4 py-2.5 text-center" x-text="s.attendance==='success' ? '✅' : s.attendance ? '❌' : '—'"></td>
                      <td class="px-4 py-2.5 text-center" x-text="s.quiz==='success' ? '✅' : s.quiz ? '❌' : '—'"></td>
                      <td class="px-4 py-2.5 text-center font-mono" x-text="s.score!=null ? s.score : '—'"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
            <!-- Mobile cards -->
            <div class="sm:hidden divide-y divide-gray-100">
              <template x-for="s in dayDetail.submissions" :key="s.person_name">
                <div class="px-4 py-3 flex items-center justify-between">
                  <span class="font-medium text-sm">
                    <span x-text="s.person_name"></span>
                    <span x-show="s.is_pathfinder" class="ml-1 inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium bg-amber-100 text-amber-700">先行者</span>
                  </span>
                  <div class="flex items-center gap-3 text-sm">
                    <span class="text-xs text-gray-400">簽到<span x-text="s.attendance==='success' ? '✅' : s.attendance ? '❌' : '—'"></span></span>
                    <span class="text-xs text-gray-400">測驗<span x-text="s.quiz==='success' ? '✅' : s.quiz ? '❌' : '—'"></span></span>
                    <span x-show="s.score!=null" class="font-mono" x-text="s.score + '分'"></span>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Q&A Section -->
          <div x-show="dayDetail.questions.length > 0" class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <h4 class="px-4 py-3 text-sm font-semibold text-gray-700 border-b bg-gray-50">
              測驗 Q&amp;A <span class="text-gray-400 font-normal" x-text="'(' + dayDetail.questions.length + ' 題)'"></span>
            </h4>
            <div class="divide-y divide-gray-100">
              <template x-for="(q, qi) in dayDetail.questions" :key="q.id">
                <div class="px-4 py-3 space-y-2">
                  <p class="text-sm font-medium text-gray-800">
                    <span class="text-indigo-500 mr-1" x-text="'Q' + (qi+1)"></span>
                    <span x-text="q.question_text"></span>
                  </p>
                  <div class="ml-6 space-y-1">
                    <template x-for="(opt, oi) in q.options" :key="oi">
                      <div class="flex items-start gap-2 text-sm"
                           :class="opt===q.correct_answer ? 'text-green-700 font-medium' : 'text-gray-500'">
                        <span class="shrink-0 mt-0.5" x-text="opt===q.correct_answer ? '✅' : '○'"></span>
                        <span x-text="opt"></span>
                      </div>
                    </template>
                  </div>
                  <!-- Per-person answers -->
                  <div x-show="hasAnswerData(q.subject_id)" class="ml-6 mt-1 pt-2 border-t border-dashed border-gray-200">
                    <p class="text-xs text-gray-400 mb-1">答題紀錄</p>
                    <div class="space-y-0.5">
                      <template x-for="a in submissionsWithAnswers(q.subject_id)" :key="a.person_name">
                        <div class="text-xs flex items-center gap-1.5">
                          <span class="text-gray-600 w-16 truncate" x-text="a.person_name"></span>
                          <span class="text-gray-300">&rarr;</span>
                          <span :class="a.correct ? 'text-green-600' : 'text-red-500'" x-text="a.answer"></span>
                          <span x-text="a.correct ? '✅' : '❌'"></span>
                        </div>
                      </template>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </div>

        </div>
      </template>
    </div>
  </main>

  <!-- ═══ People Tab ═══ -->
  <main x-show="tab==='people'" class="max-w-3xl mx-auto px-4 py-4 space-y-4">

    <!-- Add/Edit Form -->
    <div x-show="showForm" x-transition class="bg-white rounded-xl shadow-sm border p-4 space-y-3">
      <h4 class="font-semibold text-gray-700" x-text="editing ? '編輯人員' : '新增人員'"></h4>
      <div class="grid gap-2 sm:grid-cols-3">
        <input x-model="form.name" placeholder="姓名" class="px-3 py-2 text-sm border rounded-lg focus:ring-2 focus:ring-indigo-300 outline-none">
        <input x-model="form.email" placeholder="Email" type="email" class="px-3 py-2 text-sm border rounded-lg focus:ring-2 focus:ring-indigo-300 outline-none">
        <input x-model="form.company" placeholder="公司" class="px-3 py-2 text-sm border rounded-lg focus:ring-2 focus:ring-indigo-300 outline-none">
      </div>
      <div class="flex gap-2">
        <button @click="savePerson()" class="px-4 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700 transition">
          <span x-text="editing ? '更新' : '新增'"></span>
        </button>
        <button @click="resetForm()" class="px-4 py-2 bg-gray-100 text-gray-600 text-sm rounded-lg hover:bg-gray-200 transition">取消</button>
      </div>
    </div>

    <!-- Add Button -->
    <button x-show="!showForm" @click="showForm=true"
            class="w-full py-2.5 border-2 border-dashed border-gray-300 text-gray-500 rounded-xl hover:border-indigo-400 hover:text-indigo-600 text-sm transition">
      + 新增人員
    </button>

    <!-- People List -->
    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
      <div class="px-4 py-3 bg-gray-50 border-b">
        <h4 class="text-sm font-semibold text-gray-700">
          人員名單 <span class="text-gray-400 font-normal" x-text="'(' + people.length + ')'"></span>
        </h4>
      </div>
      <div class="hidden sm:block">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-gray-600 text-xs uppercase">
            <tr>
              <th class="px-4 py-2 text-left">姓名</th>
              <th class="px-4 py-2 text-left">Email</th>
              <th class="px-4 py-2 text-left">公司</th>
              <th class="px-4 py-2 text-center">狀態</th>
              <th class="px-4 py-2 text-right">操作</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
            <template x-for="p in people" :key="p.id">
              <tr class="hover:bg-gray-50">
                <td class="px-4 py-2.5 font-medium" x-text="p.name"></td>
                <td class="px-4 py-2.5 text-gray-500" x-text="p.email"></td>
                <td class="px-4 py-2.5 text-gray-500" x-text="p.company"></td>
                <td class="px-4 py-2.5 text-center">
                  <button @click="toggleActive(p)"
                          :class="p.active ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'"
                          class="px-2 py-0.5 rounded-full text-xs cursor-pointer hover:opacity-80"
                          x-text="p.active ? '啟用' : '停用'"></button>
                </td>
                <td class="px-4 py-2.5 text-right space-x-1">
                  <button @click="editPerson(p)" class="text-indigo-600 hover:text-indigo-800 text-xs">編輯</button>
                  <button @click="deletePerson(p.id)" class="text-red-500 hover:text-red-700 text-xs">刪除</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
      <div class="sm:hidden divide-y divide-gray-100">
        <template x-for="p in people" :key="p.id">
          <div class="px-4 py-3 space-y-1">
            <div class="flex items-center justify-between">
              <span class="font-medium text-sm" x-text="p.name"></span>
              <div class="flex items-center gap-2">
                <button @click="toggleActive(p)"
                        :class="p.active ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'"
                        class="px-2 py-0.5 rounded-full text-xs"
                        x-text="p.active ? '啟用' : '停用'"></button>
                <button @click="editPerson(p)" class="text-indigo-600 text-xs">編輯</button>
                <button @click="deletePerson(p.id)" class="text-red-500 text-xs">刪除</button>
              </div>
            </div>
            <div class="text-xs text-gray-500">
              <span x-text="p.email"></span> · <span x-text="p.company"></span>
            </div>
          </div>
        </template>
      </div>
      <div x-show="people.length===0" class="px-4 py-8 text-center text-gray-400 text-sm">尚未新增人員</div>
    </div>
  </main>

</div>

<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}</script>
<script>
function app() {
  return {
    tab: 'calendar',

    // Calendar
    year: new Date().getFullYear(),
    month: new Date().getMonth() + 1,
    runDays: {},
    selectedDate: null,
    dayDetail: null,
    loadingDay: false,
    eventSource: null,

    // Run form
    attendUrl: '',
    quizUrl: '',
    starting: false,

    // People
    people: [],
    editing: null,
    showForm: false,
    form: { name: '', email: '', company: '' },

    async init() {
      await this.fetchCalendar();
      this.selectDay(this.todayStr());
    },

    switchTab(t) {
      this.tab = t;
      if (t === 'people') this.fetchPeople();
    },

    // ── Calendar helpers ──

    todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    },

    get monthLabel() { return `${this.year} 年 ${this.month} 月`; },

    get calendarGrid() {
      const first = new Date(this.year, this.month - 1, 1).getDay();
      const days = new Date(this.year, this.month, 0).getDate();
      const cells = [];
      for (let i = 0; i < first; i++) cells.push(null);
      for (let d = 1; d <= days; d++) cells.push(d);
      while (cells.length % 7 !== 0) cells.push(null);
      return cells;
    },

    dateStr(day) {
      if (!day) return '';
      return `${this.year}-${String(this.month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    },

    isToday(day) { return day && this.dateStr(day) === this.todayStr(); },
    isSelected(day) { return day && this.dateStr(day) === this.selectedDate; },
    get isSelectedToday() { return this.selectedDate === this.todayStr(); },
    dayStatus(day) { return day ? (this.runDays[this.dateStr(day)] || null) : null; },

    get canStartRun() {
      if (!this.isSelectedToday) return false;
      if (!this.dayDetail?.run) return true;
      return this.dayDetail.run.status === 'pending' || this.dayDetail.run.status === 'failed';
    },

    statusLabel(s) {
      return { completed: '已完成', failed: '失敗', running: '執行中', pending: '等待中' }[s] || s || '';
    },

    formatDate(ds) {
      if (!ds) return '';
      const d = new Date(ds + 'T00:00:00');
      const wd = ['日','一','二','三','四','五','六'];
      return `${d.getMonth()+1} 月 ${d.getDate()} 日（${wd[d.getDay()]}）`;
    },

    hasAnswerData(subjectId) {
      return this.dayDetail?.submissions.some(s => s.answers_snapshot?.[subjectId]) || false;
    },

    submissionsWithAnswers(subjectId) {
      if (!this.dayDetail) return [];
      const q = this.dayDetail.questions.find(q => q.subject_id === subjectId);
      return this.dayDetail.submissions
        .filter(s => s.answers_snapshot?.[subjectId])
        .map(s => ({
          person_name: s.person_name,
          answer: s.answers_snapshot[subjectId],
          correct: q ? s.answers_snapshot[subjectId] === q.correct_answer : false,
        }));
    },

    // ── Calendar actions ──

    async prevMonth() {
      if (this.month === 1) { this.year--; this.month = 12; } else this.month--;
      this.selectedDate = null; this.dayDetail = null; this.stopSSE();
      await this.fetchCalendar();
    },

    async nextMonth() {
      if (this.month === 12) { this.year++; this.month = 1; } else this.month++;
      this.selectedDate = null; this.dayDetail = null; this.stopSSE();
      await this.fetchCalendar();
    },

    async goToToday() {
      const d = new Date();
      this.year = d.getFullYear(); this.month = d.getMonth() + 1;
      await this.fetchCalendar();
      this.selectDay(this.todayStr());
    },

    async fetchCalendar() {
      try {
        const res = await fetch(`api/calendar?year=${this.year}&month=${this.month}`);
        const data = await res.json();
        this.runDays = {};
        data.forEach(r => this.runDays[r.date] = r.status);
      } catch (e) { console.error('fetchCalendar:', e); }
    },

    async selectDay(ds) {
      this.selectedDate = ds;
      this.stopSSE();
      await this.fetchDayDetail(ds);
      this.maybeStartSSE();
    },

    async fetchDayDetail(ds) {
      this.loadingDay = true;
      try {
        const res = await fetch(`api/day/${ds}`);
        this.dayDetail = await res.json();
      } catch (e) {
        this.dayDetail = { run: null, submissions: [], questions: [] };
      }
      this.loadingDay = false;
    },

    maybeStartSSE() {
      const runId = this.dayDetail?.run?.id;
      if (runId && this.dayDetail?.run?.status === 'running' && this.isSelectedToday) {
        this.stopSSE();
        this.eventSource = new EventSource(`api/runs/${runId}/events`);
        this.eventSource.onmessage = (e) => {
          try { this.dayDetail = JSON.parse(e.data); } catch {}
        };
        this.eventSource.addEventListener('done', async () => {
          this.stopSSE();
          await this.fetchCalendar();
        });
        this.eventSource.onerror = () => {
          this.stopSSE();
        };
      }
    },

    stopSSE() {
      if (this.eventSource) { this.eventSource.close(); this.eventSource = null; }
    },

    async startRun() {
      if (!this.attendUrl && !this.quizUrl) return;
      this.starting = true;
      try {
        const res = await fetch('api/runs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ attend_url: this.attendUrl || null, quiz_url: this.quizUrl || null }),
        });
        if (res.ok) {
          this.attendUrl = ''; this.quizUrl = '';
          await this.fetchCalendar();
          await this.selectDay(this.todayStr());
        }
      } finally { this.starting = false; }
    },

    // ── People actions ──

    async fetchPeople() {
      try { this.people = await (await fetch('api/people')).json(); }
      catch (e) { console.error('fetchPeople:', e); }
    },

    editPerson(p) {
      this.editing = p.id;
      this.form = { name: p.name, email: p.email, company: p.company };
      this.showForm = true;
    },

    resetForm() {
      this.editing = null;
      this.form = { name: '', email: '', company: '' };
      this.showForm = false;
    },

    async savePerson() {
      const { name, email, company } = this.form;
      if (!name || !email || !company) return;
      try {
        if (this.editing) {
          await fetch(`api/people/${this.editing}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, email, company }) });
        } else {
          await fetch('api/people', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, email, company }) });
        }
        this.resetForm();
        await this.fetchPeople();
      } catch (e) { console.error('savePerson:', e); }
    },

    async deletePerson(id) {
      if (!confirm('確定要刪除此人員？')) return;
      try { await fetch(`api/people/${id}`, { method: 'DELETE' }); await this.fetchPeople(); }
      catch (e) { console.error('deletePerson:', e); }
    },

    async toggleActive(p) {
      try {
        await fetch(`api/people/${p.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ active: !p.active }) });
        await this.fetchPeople();
      } catch (e) { console.error('toggleActive:', e); }
    },
  }
}
</script>
