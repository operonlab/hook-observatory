# Workshop Port Registry — Cross-Language Single Source of Truth
#
# Consumed by:
#   - libs/sdk-client/sdk_client/port_registry.py        (Python, runtime load)
#   - libs/port-registry/build.rs                    (Rust, build-time codegen)
#   - (v2) libs/go-port-registry                          (Go, //go:generate)
#
# Schema mirrors port_registry.py:23-44 ServicePort dataclass.
# Port range convention (10000+, self-managed services):
#   10000-10099   Core Services
#   10100-10199   Stations: Infra & Ops
#   10200-10299   Stations: AI & Media
#   10300-10399   Stations: Business & Tools
#   10500-10599   Frontend
# Third-party / Docker services keep their standard ports.

host: 127.0.0.1

services:
  # ── Core ──
  - name: core
    port: 10000
    group: core
    health_path: /health
    env_var: CORE_API_URL
    nginx_path: ""
    optional: false
  - name: paper
    port: 10010
    group: core
    health_path: /health
    env_var: PAPER_SVC_URL
    nginx_path: /api/paper/
    optional: false
  - name: intelflow
    port: 10011
    group: core
    health_path: /health
    env_var: INTELFLOW_SVC_URL
    nginx_path: /api/intelflow/
    optional: false
  - name: invest
    port: 10012
    group: core
    health_path: /health
    env_var: INVEST_SVC_URL
    nginx_path: /api/invest/
    optional: false

  # ── Stations: Infra & Ops ──
  - name: hook-observatory
    port: 10100
    group: station-infra
    health_path: /
    env_var: HOOK_OBS_URL
    nginx_path: /apps/hook/
