[project]
name = "workshop"
version = "0.0.1"
description = "Modular Monolith + Event-Driven workspace"
requires-python = ">=3.12"

[tool.uv.workspace]
members = [
    "core",
    "core/services/*",
    "libs/python",
]

[tool.hatch.build.targets.wheel]
packages = []

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["core/src", "mcp", "scripts", "libs/python"]
extend-exclude = [".claude/worktrees", ".worktrees"]

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "S",     # flake8-bandit (security)
    "ASYNC", # flake8-async
    "RUF",   # ruff-specific
]
ignore = [
    "B008",  # function-call-in-default-argument (FastAPI Depends/Query pattern)
    "RUF012",# mutable-class-default (SQLAlchemy relationship/column defaults)
    "S101",  # assert usage (OK in tests)
    "S104",  # bind to 0.0.0.0 (handled by Nginx)
]

[tool.ruff.lint.per-file-ignores]
"core/migrations/**" = ["E501"]  # alembic auto-generated
"mcp/**/server.py" = ["RUF001", "E501"]  # Chinese descriptions + long inputSchema lines
"core/src/config.py" = ["S105"]  # pydantic-settings defaults, not real secrets
"core/src/modules/auth/oauth.py" = ["S106"]  # OAuth URL param named access_token_url
"core/src/modules/memvault/kg_services.py" = ["E402"]  # conditional import after type definitions
"core/src/shared/services.py" = ["UP046"]  # Generic[] syntax for BaseCRUDService readability
"stations/hook-observatory/handlers/auto_format.py" = ["S603", "S607"]  # trusted hardcoded subprocess calls
"stations/hook-observatory/handlers/base.py" = ["S603"]  # trusted subprocess utility
"stations/hook-observatory/handlers/relay_signal.py" = ["S108", "S110"]  # /tmp advisory cache + fail-open
"stations/hook-observatory/handlers/sentinel_notify.py" = ["S110", "S310"]  # fail-open + localhost URL
"stations/hook-observatory/handlers/session_pipeline.py" = ["S110", "S603"]  # fail-open + trusted subprocess
"stations/hook-observatory/handlers/verify_commit.py" = ["S108"]  # /tmp state file
"stations/hook-observatory/handlers/voice_notify.py" = ["RUF001", "S108", "S110", "S310", "S311", "S603", "S607"]  # Chinese TTS + trusted subprocess + /tmp audio
"scripts/workshop_services.py" = ["S603", "S607"]  # trusted service management subprocess calls
"stations/sentinel/prompt_templates.py" = ["E501", "RUF001"]  # long prompt template strings + Chinese
"stations/sentinel/main.py" = ["E501", "S603", "S607"]  # Claude CLI subprocess + long strings
"stations/sentinel/remediation.py" = ["E501", "S603", "S607"]  # service restart subprocess + long strings
"stations/sentinel/checker.py" = ["ASYNC109"]  # timeout in async health checks is intentional
"mcp/memvault/pipelines/cluster_pipeline.py" = ["N806", "S310", "S603", "B905"]  # ML matrix vars + trusted subprocess + oMLX URL

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
