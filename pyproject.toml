[project]
name = "workshop"
version = "0.0.1"
description = "Modular Monolith + Event-Driven workspace"
requires-python = ">=3.12"

[tool.uv.workspace]
members = [
    "core",
    "core/services/*",
    "libs/python",
]

[tool.hatch.build.targets.wheel]
packages = []

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["core/src", "mcp", "scripts", "libs/python"]

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "S",     # flake8-bandit (security)
    "ASYNC", # flake8-async
    "RUF",   # ruff-specific
]
ignore = [
    "B008",  # function-call-in-default-argument (FastAPI Depends/Query pattern)
    "RUF012",# mutable-class-default (SQLAlchemy relationship/column defaults)
    "S101",  # assert usage (OK in tests)
    "S104",  # bind to 0.0.0.0 (handled by Nginx)
]

[tool.ruff.lint.per-file-ignores]
"core/migrations/**" = ["E501"]  # alembic auto-generated
"mcp/**/server.py" = ["RUF001", "E501"]  # Chinese descriptions + long inputSchema lines
"core/src/config.py" = ["S105"]  # pydantic-settings defaults, not real secrets
"core/src/modules/auth/oauth.py" = ["S106"]  # OAuth URL param named access_token_url
"core/src/modules/memvault/kg_services.py" = ["E402"]  # conditional import after type definitions
"core/src/shared/services.py" = ["UP046"]  # Generic[] syntax for BaseCRUDService readability

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
